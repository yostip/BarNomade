<!DOCTYPE html>
<!--
===============================================================================
  GESTION DES FÛTS - BARS NOMADES - HELLFEST
  Application reconstruite proprement (remplace la version V16-V23 minifiée).

  ÉTAT : MODULES 1 + 2 + 3A + 3B-1
  Contenu actuel :
    - démarrage, Firebase, authentification anonyme             (module 1)
    - écran d'accueil (prénom), connexion utilisateur           (module 1)
    - gestion des BARS : créer, renommer, supprimer             (module 2)
    - gestion des FÛTS : attribuer, retourner, stock            (module 2)
    - gestion des JOURS et des CRÉNEAUX horaires                (module 3A)
    - SAISIE DES VENTES cas simple + tableau bar x créneau      (module 3B-1)

  Pas encore inclus : PAD en panne / succession de PAD / clôture / annulation
  (module 3B-2), planning, dashboard, exports.

  PRINCIPE D'ARCHITECTURE
    - Un seul fichier HTML. Code lisible, commenté en français, non minifié.
    - Une seule "session" pour tout le festival (sessions/festival).
    - 4 rôles : visiteur, secretaire, admin, superadmin.
    - AUCUN mot de passe dans ce fichier. Droits = rôle stocké en base.

  NOTE DÉVELOPPEURS — JOURS ET CRÉNEAUX (module 3A)
    Le festival a un NOMBRE DE JOURS réglable (paramètre nombreJours).
    Chaque jour a SA PROPRE liste de créneaux horaires : un jour peut avoir
    des créneaux différents d'un autre. Les créneaux d'un jour sont stockés
    sous sessions/festival/creneaux/jour<N>.
    Un créneau = { id (clé unique Firebase), libelle (texte affiché) }.
    Le "jour actif" (jourActuel) est partagé par tous : il pilote ce que
    voient les utilisateurs. Modifiable par admin/superadmin.
===============================================================================
-->
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="theme-color" content="#39ff14" />
  <title>Bars Nomades — Gestion des Fûts</title>

  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>

  <style>
    * { -webkit-tap-highlight-color: transparent; }
    body { background: #000; overscroll-behavior: none; }
  </style>
</head>

<body class="bg-black">
  <div id="root"></div>

  <script>
  /* =========================================================================
     OUTILS RACCOURCIS REACT
  ========================================================================= */
  const { useState, useEffect } = React;

  /* =========================================================================
     CONFIGURATION FIREBASE
     Coordonnées du projet. Non secrètes : la sécurité repose sur les RÈGLES.
  ========================================================================= */
  const firebaseConfig = {
    apiKey: "AIzaSyCgl30syyCEJif9q96E2jzv-aTXxXgvgv0",
    authDomain: "gestion-futs-hellfest.firebaseapp.com",
    databaseURL: "https://gestion-futs-hellfest-default-rtdb.europe-west1.firebasedatabase.app",
    projectId: "gestion-futs-hellfest",
    storageBucket: "gestion-futs-hellfest.firebasestorage.app",
    messagingSenderId: "107509834680",
    appId: "1:107509834680:web:3a58295d3268b5d19f654d"
  };

  firebase.initializeApp(firebaseConfig);
  const db = firebase.database();
  const auth = firebase.auth();

  /* =========================================================================
     CONSTANTES DE L'APPLICATION
  ========================================================================= */
  const ID_SESSION = "festival";

  const ROLES = {
    VISITEUR: "visiteur",
    SECRETAIRE: "secretaire",
    ADMIN: "admin",
    SUPERADMIN: "superadmin"
  };

  const TYPE_BAR = {
    BIERE: "biere",
    CIDRE: "cidre"
  };

  /* Façons de retourner un fût. */
  const RETOUR = {
    VIDE: "vide",
    CASSE: "casse",
    NON_TERMINE: "non_termine",
    PLEIN: "plein"
  };

  /* Réglages par défaut (le super admin les changera au module 4). */
  const PARAMS_DEFAUT = {
    stockInitialBiere: 50,
    stockInitialCidre: 20,
    maxFutsParBar: 3,
    nombreJours: 4
  };

  const STOCKAGE = { PRENOM: "barnomade_prenom" };

  /* =========================================================================
     SECTION 1 — AUTHENTIFICATION
  ========================================================================= */
  function obtenirBadgeAnonyme() {
    return auth.signInAnonymously();
  }

  /* =========================================================================
     SECTION 2 — RÉFÉRENCES À LA BASE
  ========================================================================= */
  const Base = {
    utilisateur: function (prenom) {
      return db.ref("sessions/" + ID_SESSION + "/users/" + prenom);
    },
    bars: function () {
      return db.ref("sessions/" + ID_SESSION + "/bars");
    },
    bar: function (idBar) {
      return db.ref("sessions/" + ID_SESSION + "/bars/" + idBar);
    },
    futsDuBar: function (idBar) {
      return db.ref("sessions/" + ID_SESSION + "/bars/" + idBar + "/futs");
    },
    historiqueFuts: function () {
      return db.ref("sessions/" + ID_SESSION + "/historiqueFuts");
    },
    /* Les paramètres généraux (stock initial, nombre de jours...). */
    params: function () {
      return db.ref("sessions/" + ID_SESSION + "/params");
    },
    /* Le jour actuellement actif (un simple nombre, partagé par tous). */
    jourActuel: function () {
      return db.ref("sessions/" + ID_SESSION + "/jourActuel");
    },
    /* Les créneaux d'un jour donné (numéro du jour). */
    creneauxDuJour: function (numeroJour) {
      return db.ref("sessions/" + ID_SESSION + "/creneaux/jour" + numeroJour);
    },
    /* ----- VENTES (module 3B) -----
       Une "case de vente" = un bar + un créneau + un jour. Elle est rangée
       sous ventes/jour<N>/<idBar>/<idCreneau>. Chaque case contient :
         - cloturee : true/false (drapeau de clôture explicite — option A)
         - saisies  : la liste des saisies PAD (clés uniques), ajoutée en 3B-2
       En 3B-1 on gère le cas simple : une seule saisie, PAD OK. */
    casesVentesDuJour: function (numeroJour) {
      return db.ref("sessions/" + ID_SESSION + "/ventes/jour" + numeroJour);
    },
    caseVente: function (numeroJour, idBar, idCreneau) {
      return db.ref("sessions/" + ID_SESSION + "/ventes/jour" + numeroJour +
        "/" + idBar + "/" + idCreneau);
    }
  };

  /* =========================================================================
     SECTION 3 — ÉCRANS UTILITAIRES
  ========================================================================= */
  function EcranChargement({ message }) {
    return React.createElement(
      "div",
      { className: "min-h-screen flex flex-col items-center justify-center bg-black text-green-400" },
      React.createElement("p", { className: "text-lg" }, "Chargement…"),
      React.createElement("p", { className: "text-xs text-neutral-500 mt-2" }, message || "")
    );
  }

  function EcranErreur({ details }) {
    return React.createElement(
      "div",
      { className: "min-h-screen flex flex-col items-center justify-center bg-black text-red-400 p-6 text-center" },
      React.createElement("p", { className: "text-lg font-bold mb-2" }, "Impossible de démarrer l'application"),
      React.createElement("p", { className: "text-sm text-neutral-400" }, details || "Erreur inconnue."),
      React.createElement("p", { className: "text-xs text-neutral-600 mt-4" },
        "Vérifiez votre connexion internet, puis rechargez la page.")
    );
  }

  /* =========================================================================
     SECTION 4 — ÉCRAN D'ACCUEIL
  ========================================================================= */
  function EcranAccueil({ onEntrer }) {
    const [prenom, setPrenom] = useState("");

    useEffect(function () {
      const memorise = localStorage.getItem(STOCKAGE.PRENOM);
      if (memorise) setPrenom(memorise);
    }, []);

    function valider() {
      const valeur = prenom.trim();
      if (!valeur) return;
      localStorage.setItem(STOCKAGE.PRENOM, valeur);
      onEntrer(valeur);
    }

    return React.createElement(
      "div",
      { className: "min-h-screen flex items-center justify-center bg-black p-4" },
      React.createElement(
        "div",
        { className: "w-full max-w-sm" },
        React.createElement(
          "div",
          { className: "text-center mb-8" },
          React.createElement("h1", { className: "text-2xl font-bold text-white" }, "Bars Nomades"),
          React.createElement("p", { className: "text-green-400 font-bold mt-1" }, "Gestion des Fûts")
        ),
        React.createElement(
          "div",
          { className: "space-y-4" },
          React.createElement("label", { className: "block text-neutral-400 text-sm" }, "Ton prénom ou surnom"),
          React.createElement("input", {
            type: "text",
            value: prenom,
            onChange: function (e) { setPrenom(e.target.value); },
            onKeyDown: function (e) { if (e.key === "Enter") valider(); },
            placeholder: "Ex : Kevin",
            className: "w-full px-4 py-3 bg-neutral-900 border border-neutral-700 rounded-xl text-white text-lg",
            autoFocus: true
          }),
          React.createElement(
            "button",
            {
              onClick: valider,
              className: "w-full py-4 bg-red-600 hover:bg-red-700 text-white rounded-xl font-bold text-lg transition-colors"
            },
            "Entrer"
          )
        )
      )
    );
  }

  /* =========================================================================
     SECTION 5 — DROITS
     Conforme au tableau des permissions gelé.
  ========================================================================= */
  const Droits = {
    /* Gérer les fûts : secrétaire et plus. */
    peutGererFuts: function (role) {
      return role === ROLES.SECRETAIRE || role === ROLES.ADMIN || role === ROLES.SUPERADMIN;
    },
    /* Gérer les bars : admin et plus. */
    peutGererBars: function (role) {
      return role === ROLES.ADMIN || role === ROLES.SUPERADMIN;
    },
    /* Changer le jour actif : admin et plus. */
    peutChangerJour: function (role) {
      return role === ROLES.ADMIN || role === ROLES.SUPERADMIN;
    },
    /* Configurer les créneaux horaires : super admin uniquement
       (conforme au tableau gelé). */
    peutGererCreneaux: function (role) {
      return role === ROLES.SUPERADMIN;
    },
    /* Saisir les ventes : secrétaire et plus (module 3B). */
    peutSaisirVentes: function (role) {
      return role === ROLES.SECRETAIRE || role === ROLES.ADMIN || role === ROLES.SUPERADMIN;
    }
  };

  /* =========================================================================
     SECTION 6 — ACTIONS SUR LES BARS
  ========================================================================= */
  const ActionsBars = {
    creer: function (nom, type) {
      const nomPropre = (nom || "").trim();
      if (!nomPropre) return Promise.reject(new Error("Nom de bar vide"));
      return Base.bars().push({ nom: nomPropre, type: type });
    },
    renommer: function (idBar, nouveauNom) {
      const nomPropre = (nouveauNom || "").trim();
      if (!nomPropre) return Promise.reject(new Error("Nom de bar vide"));
      return Base.bar(idBar).child("nom").set(nomPropre);
    },
    supprimer: function (bar) {
      const nbFuts = bar.futs ? Object.keys(bar.futs).length : 0;
      if (nbFuts > 0) {
        return Promise.reject(new Error("Ce bar a encore " + nbFuts + " fût(s). Retournez-les d'abord."));
      }
      return Base.bar(bar.id).remove();
    }
  };

  /* =========================================================================
     SECTION 7 — ACTIONS SUR LES FÛTS
     L'attribution utilise une TRANSACTION (anti-concurrence).
  ========================================================================= */
  const ActionsFuts = {
    attribuer: function (bar, type, maxFuts, prenomUtilisateur) {
      const nbFutsActuels = bar.futs ? Object.keys(bar.futs).length : 0;
      if (nbFutsActuels >= maxFuts) {
        return Promise.reject(new Error("Ce bar a déjà le maximum de fûts (" + maxFuts + ")."));
      }
      const referenceFuts = Base.futsDuBar(bar.id);
      return referenceFuts.transaction(function (futsActuels) {
        const futs = futsActuels || {};
        if (Object.keys(futs).length >= maxFuts) return;
        const cleNouveauFut = referenceFuts.push().key;
        futs[cleNouveauFut] = {
          type: type,
          dateAttribution: Date.now(),
          attribuePar: prenomUtilisateur
        };
        return futs;
      }).then(function (resultat) {
        if (!resultat.committed) {
          throw new Error("Ce bar vient d'atteindre son maximum de fûts.");
        }
        return Base.historiqueFuts().push({
          mouvement: "attribution",
          typeFut: type,
          idBar: bar.id,
          nomBar: bar.nom,
          par: prenomUtilisateur,
          date: Date.now()
        });
      });
    },
    retourner: function (bar, idFut, fut, motif, commentaire, prenomUtilisateur) {
      return Base.futsDuBar(bar.id).child(idFut).remove().then(function () {
        return Base.historiqueFuts().push({
          mouvement: "retour",
          motifRetour: motif,
          typeFut: fut.type,
          idBar: bar.id,
          nomBar: bar.nom,
          commentaire: (commentaire || "").trim(),
          par: prenomUtilisateur,
          date: Date.now()
        });
      });
    }
  };

  /* =========================================================================
     SECTION 8 — ACTIONS SUR LES JOURS ET LES CRÉNEAUX (module 3A)
  ========================================================================= */
  const ActionsCreneaux = {

    /* Change le jour actif (le nombre partagé par tous). */
    definirJourActuel: function (numeroJour) {
      return Base.jourActuel().set(numeroJour);
    },

    /* Ajoute un créneau à un jour. push() = clé unique. */
    ajouter: function (numeroJour, libelle) {
      const texte = (libelle || "").trim();
      if (!texte) return Promise.reject(new Error("Libellé de créneau vide"));
      return Base.creneauxDuJour(numeroJour).push({ libelle: texte });
    },

    /* Renomme un créneau existant. */
    renommer: function (numeroJour, idCreneau, nouveauLibelle) {
      const texte = (nouveauLibelle || "").trim();
      if (!texte) return Promise.reject(new Error("Libellé de créneau vide"));
      return Base.creneauxDuJour(numeroJour).child(idCreneau).child("libelle").set(texte);
    },

    /* Supprime un créneau.
       NOTE : en 3B (saisie des ventes), on ajoutera un garde-fou pour
       empêcher de supprimer un créneau qui a déjà des ventes saisies.
       Pour l'instant (3A) il n'y a pas encore de ventes : suppression libre. */
    supprimer: function (numeroJour, idCreneau) {
      return Base.creneauxDuJour(numeroJour).child(idCreneau).remove();
    },

    /* Copie tous les créneaux d'un jour vers un autre.
       Pratique quand deux journées ont les mêmes horaires : évite de tout
       retaper. Les créneaux du jour de destination sont remplacés. */
    copierDepuisJour: function (jourSource, jourDestination) {
      return Base.creneauxDuJour(jourSource).once("value").then(function (instantane) {
        const creneauxSource = instantane.val();
        if (!creneauxSource) {
          return Promise.reject(new Error("Le jour " + jourSource + " n'a aucun créneau à copier."));
        }
        /* On recrée chaque créneau dans le jour de destination, avec de
           nouvelles clés uniques (on ne réutilise pas les clés source). */
        const refDestination = Base.creneauxDuJour(jourDestination);
        const nouveau = {};
        Object.keys(creneauxSource).forEach(function (idSource) {
          const cleNeuve = refDestination.push().key;
          nouveau[cleNeuve] = { libelle: creneauxSource[idSource].libelle };
        });
        return refDestination.set(nouveau);
      });
    }
  };

  /* =========================================================================
     SECTION 8bis — ACTIONS SUR LES VENTES (module 3B-1)

     RAPPEL DU MODÈLE (décision gelée)
       Une "case de vente" = bar + créneau + jour.
       Elle contient :
         - cloturee : drapeau de clôture (option A). false par défaut.
         - saisies  : liste de saisies PAD (clés uniques).
       Chaque saisie PAD contient :
         - montant, nbPintes, nbPichets, nbGobelets, commentaire
         - padEnDefaut : true/false   (en 3B-1, toujours false)
         - numeroPad, donneesPartielles : utilisés en 3B-2
         - par, date : qui a saisi et quand (traçabilité)
       Le TOTAL d'une case = somme des montants de toutes ses saisies.

     3B-1 ne gère que le CAS SIMPLE : PAD OK, une saisie par case.
     PAD en panne, succession de PAD, clôture, annulation : module 3B-2.
  ========================================================================= */
  const ActionsVentes = {

    /* Enregistre une saisie de vente dans une case bar+créneau.
       En 3B-1 : padEnDefaut est toujours false. */
    saisir: function (numeroJour, idBar, idCreneau, donneesSaisie, prenomUtilisateur) {
      const refCase = Base.caseVente(numeroJour, idBar, idCreneau);
      /* On ajoute une saisie comme enfant unique sous "saisies". */
      const refSaisies = refCase.child("saisies");
      const nouvelleSaisie = {
        montant: donneesSaisie.montant,
        nbPintes: donneesSaisie.nbPintes,
        nbPichets: donneesSaisie.nbPichets,
        nbGobelets: donneesSaisie.nbGobelets,
        commentaire: (donneesSaisie.commentaire || "").trim(),
        padEnDefaut: false,
        par: prenomUtilisateur,
        date: Date.now()
      };
      return refSaisies.push(nouvelleSaisie);
    }
  };

  /* Calcule le total (en euros) et le nombre de saisies d'une case de vente.
     "uneCase" est l'objet stocké en base (ou null si rien saisi). */
  function calculerTotalCase(uneCase) {
    if (!uneCase || !uneCase.saisies) {
      return { total: 0, nbSaisies: 0, cloturee: false };
    }
    let total = 0;
    let nb = 0;
    Object.keys(uneCase.saisies).forEach(function (cle) {
      const s = uneCase.saisies[cle];
      total = total + (s.montant || 0);
      nb = nb + 1;
    });
    return {
      total: total,
      nbSaisies: nb,
      cloturee: uneCase.cloturee === true
    };
  }

  /* Détermine l'état d'affichage d'une case (pour la couleur du tableau).
       "vide"     : rien saisi
       "saisie"   : au moins une saisie, pas encore clôturée
       "cloturee" : case clôturée */
  function etatCase(uneCase) {
    const info = calculerTotalCase(uneCase);
    if (info.cloturee) return "cloturee";
    if (info.nbSaisies > 0) return "saisie";
    return "vide";
  }

  /* =========================================================================
     SECTION 9 — CALCUL DU STOCK
  ========================================================================= */
  function calculerStock(historique, params) {
    let stockBiere = params.stockInitialBiere;
    let stockCidre = params.stockInitialCidre;
    historique.forEach(function (mvt) {
      if (mvt.mouvement === "attribution") {
        if (mvt.typeFut === TYPE_BAR.BIERE) stockBiere = stockBiere - 1;
        if (mvt.typeFut === TYPE_BAR.CIDRE) stockCidre = stockCidre - 1;
      } else if (mvt.mouvement === "retour" && mvt.motifRetour === RETOUR.PLEIN) {
        if (mvt.typeFut === TYPE_BAR.BIERE) stockBiere = stockBiere + 1;
        if (mvt.typeFut === TYPE_BAR.CIDRE) stockCidre = stockCidre + 1;
      }
    });
    return { biere: stockBiere, cidre: stockCidre };
  }

  /* =========================================================================
     SECTION 10 — FENÊTRE DE RETOUR D'UN FÛT
  ========================================================================= */
  function FenetreRetourFut({ bar, idFut, fut, onConfirmer, onAnnuler }) {
    const [motif, setMotif] = useState("");
    const [commentaire, setCommentaire] = useState("");

    function confirmer() {
      if (!motif) return;
      if (motif === RETOUR.CASSE && !commentaire.trim()) {
        alert("Merci de décrire le problème pour un fût cassé.");
        return;
      }
      onConfirmer(motif, commentaire);
    }

    function boutonMotif(valeur, libelle, couleur) {
      const actif = motif === valeur;
      return React.createElement(
        "button",
        {
          onClick: function () { setMotif(valeur); },
          className: "w-full py-3 rounded-lg font-medium text-left px-4 " +
            (actif ? couleur + " text-white" : "bg-neutral-800 text-neutral-300")
        },
        libelle
      );
    }

    return React.createElement(
      "div",
      { className: "fixed inset-0 bg-black/80 flex items-center justify-center p-4 z-50" },
      React.createElement(
        "div",
        { className: "bg-neutral-900 rounded-2xl w-full max-w-sm p-6" },
        React.createElement("h3", { className: "text-xl font-bold text-white mb-1" }, "Retour de fût"),
        React.createElement("p", { className: "text-neutral-400 text-sm mb-4" },
          bar.nom + " — fût " + (fut.type === TYPE_BAR.BIERE ? "bière" : "cidre")),
        React.createElement(
          "div",
          { className: "space-y-2" },
          boutonMotif(RETOUR.VIDE, "Fût vide (entièrement consommé)", "bg-blue-600"),
          boutonMotif(RETOUR.CASSE, "Fût cassé / endommagé", "bg-red-600"),
          boutonMotif(RETOUR.NON_TERMINE, "Non terminé (reprise demain)", "bg-purple-600"),
          boutonMotif(RETOUR.PLEIN, "Fût plein (jamais entamé, retour stock)", "bg-green-600")
        ),
        React.createElement(
          "div",
          { className: "mt-4" },
          React.createElement("label", { className: "block text-sm text-neutral-400 mb-1" },
            "Commentaire" + (motif === RETOUR.CASSE ? " (obligatoire)" : " (facultatif)")),
          React.createElement("textarea", {
            value: commentaire,
            onChange: function (e) { setCommentaire(e.target.value); },
            rows: 2,
            className: "w-full px-3 py-2 bg-neutral-800 rounded-lg text-white text-sm",
            placeholder: motif === RETOUR.CASSE ? "Ex : valve cassée, fût percé…" : ""
          })
        ),
        React.createElement(
          "div",
          { className: "flex gap-2 mt-6" },
          React.createElement(
            "button",
            { onClick: onAnnuler, className: "flex-1 py-3 bg-neutral-700 text-white rounded-lg" },
            "Annuler"
          ),
          React.createElement(
            "button",
            {
              onClick: confirmer,
              disabled: !motif,
              className: "flex-1 py-3 rounded-lg font-medium " +
                (motif ? "bg-red-600 text-white" : "bg-neutral-800 text-neutral-600")
            },
            "Confirmer"
          )
        )
      )
    );
  }

  /* =========================================================================
     SECTION 11 — FENÊTRE D'AJOUT D'UN BAR
  ========================================================================= */
  function FenetreAjoutBar({ onConfirmer, onAnnuler }) {
    const [nom, setNom] = useState("");
    const [type, setType] = useState(TYPE_BAR.BIERE);

    function confirmer() {
      if (!nom.trim()) return;
      onConfirmer(nom, type);
    }

    return React.createElement(
      "div",
      { className: "fixed inset-0 bg-black/80 flex items-center justify-center p-4 z-50" },
      React.createElement(
        "div",
        { className: "bg-neutral-900 rounded-2xl w-full max-w-sm p-6" },
        React.createElement("h3", { className: "text-xl font-bold text-white mb-4" }, "Nouveau bar"),

  /* =========================================================================
     SECTION 12 — FENÊTRE DE GESTION DES CRÉNEAUX (module 3A)
     Réservée au super admin. Permet de définir les créneaux du jour affiché,
     et de copier les créneaux d'un autre jour.
  ========================================================================= */
  function FenetreCreneaux({ jourActuel, nombreJours, creneaux, onFermer }) {
    /* Champ de saisie d'un nouveau créneau. */
    const [nouveauLibelle, setNouveauLibelle] = useState("");
    /* Le créneau en cours de renommage (son id), ou null. */
    const [enRenommage, setEnRenommage] = useState(null);
    const [libelleRenomme, setLibelleRenomme] = useState("");

    /* Liste des créneaux du jour, transformée en tableau. */
    const listeCreneaux = Object.keys(creneaux || {}).map(function (id) {
      return { id: id, libelle: creneaux[id].libelle };
    });

    function ajouter() {
      if (!nouveauLibelle.trim()) return;
      ActionsCreneaux.ajouter(jourActuel, nouveauLibelle)
        .then(function () { setNouveauLibelle(""); })
        .catch(function (e) { alert(e.message); });
    }

    function supprimer(idCreneau) {
      if (!confirm("Supprimer ce créneau ?")) return;
      ActionsCreneaux.supprimer(jourActuel, idCreneau)
        .catch(function (e) { alert(e.message); });
    }

    function lancerRenommage(creneau) {
      setEnRenommage(creneau.id);
      setLibelleRenomme(creneau.libelle);
    }

    function validerRenommage() {
      ActionsCreneaux.renommer(jourActuel, enRenommage, libelleRenomme)
        .then(function () { setEnRenommage(null); })
        .catch(function (e) { alert(e.message); });
    }

    function copierDepuis(jourSource) {
      if (jourSource === jourActuel) return;
      if (!confirm("Copier les créneaux du jour " + jourSource +
          " ? Les créneaux actuels du jour " + jourActuel + " seront remplacés.")) return;
      ActionsCreneaux.copierDepuisJour(jourSource, jourActuel)
        .catch(function (e) { alert(e.message); });
    }

    /* Liste des autres jours, pour proposer la copie. */
    const autresJours = [];
    for (let n = 1; n <= nombreJours; n++) {
      if (n !== jourActuel) autresJours.push(n);
    }

    return React.createElement(
      "div",
      { className: "fixed inset-0 bg-black/80 flex items-center justify-center p-4 z-50" },
      React.createElement(
        "div",
        { className: "bg-neutral-900 rounded-2xl w-full max-w-md p-6 max-h-[90vh] overflow-y-auto" },

        React.createElement("h3", { className: "text-xl font-bold text-white mb-1" },
          "Créneaux du jour " + jourActuel),
        React.createElement("p", { className: "text-neutral-500 text-sm mb-4" },
          "Définissez les tranches horaires de cette journée."),

        /* Liste des créneaux existants. */
        listeCreneaux.length === 0
          ? React.createElement("p", { className: "text-neutral-500 text-sm mb-3" },
              "Aucun créneau pour ce jour.")
          : React.createElement(
              "div",
              { className: "space-y-2 mb-4" },
              listeCreneaux.map(function (creneau) {
                /* Si ce créneau est en cours de renommage : champ d'édition. */
                if (enRenommage === creneau.id) {
                  return React.createElement(
                    "div",
                    { key: creneau.id, className: "flex gap-2 items-center bg-neutral-800 rounded-lg p-2" },
                    React.createElement("input", {
                      type: "text",
                      value: libelleRenomme,
                      onChange: function (e) { setLibelleRenomme(e.target.value); },
                      className: "flex-1 px-2 py-1 bg-neutral-700 rounded text-white text-sm",
                      autoFocus: true
                    }),
                    React.createElement(
                      "button",
                      { onClick: validerRenommage, className: "px-2 py-1 bg-green-600 text-white rounded text-sm" },
                      "OK"
                    ),
                    React.createElement(
                      "button",
                      { onClick: function () { setEnRenommage(null); },
                        className: "px-2 py-1 bg-neutral-600 text-white rounded text-sm" },
                      "Annuler"
                    )
                  );
                }
                /* Sinon : affichage normal. */
                return React.createElement(
                  "div",
                  { key: creneau.id, className: "flex gap-2 items-center bg-neutral-800 rounded-lg p-2" },
                  React.createElement("span", { className: "flex-1 text-white text-sm px-1" }, creneau.libelle),
                  React.createElement(
                    "button",
                    { onClick: function () { lancerRenommage(creneau); },
                      className: "px-2 py-1 bg-neutral-700 text-white rounded text-sm" },
                    "Renommer"
                  ),
                  React.createElement(
                    "button",
                    { onClick: function () { supprimer(creneau.id); },
                      className: "px-2 py-1 bg-red-900 text-white rounded text-sm" },
                    "Suppr."
                  )
                );
              })
            ),

        /* Ajout d'un créneau. */
        React.createElement(
          "div",
          { className: "flex gap-2 mb-5" },
          React.createElement("input", {
            type: "text",
            value: nouveauLibelle,
            onChange: function (e) { setNouveauLibelle(e.target.value); },
            onKeyDown: function (e) { if (e.key === "Enter") ajouter(); },
            placeholder: "Ex : 15h - 18h",
            className: "flex-1 px-3 py-2 bg-neutral-800 rounded-lg text-white text-sm"
          }),
          React.createElement(
            "button",
            {
              onClick: ajouter,
              disabled: !nouveauLibelle.trim(),
              className: "px-4 py-2 rounded-lg font-medium text-sm " +
                (nouveauLibelle.trim() ? "bg-emerald-600 text-white" : "bg-neutral-800 text-neutral-600")
            },
            "Ajouter"
          )
        ),

        /* Copie depuis un autre jour. */
        autresJours.length > 0
          ? React.createElement(
              "div",
              { className: "border-t border-neutral-800 pt-4 mb-4" },
              React.createElement("p", { className: "text-sm text-neutral-400 mb-2" },
                "Copier les créneaux d'un autre jour :"),
              React.createElement(
                "div",
                { className: "flex flex-wrap gap-2" },
                autresJours.map(function (n) {
                  return React.createElement(
                    "button",
                    {
                      key: n,
                      onClick: function () { copierDepuis(n); },
                      className: "px-3 py-1.5 bg-neutral-800 hover:bg-neutral-700 text-neutral-200 rounded-lg text-sm"
                    },
                    "Depuis jour " + n
                  );
                })
              )
            )
          : null,

        React.createElement(
          "button",
          { onClick: onFermer, className: "w-full py-3 bg-neutral-700 text-white rounded-lg" },
          "Fermer"
        )
      )
    );
  }

  /* =========================================================================
     SECTION 13 — CARTE D'UN BAR
  ========================================================================= */
  function CarteBar({ bar, role, maxFuts, prenom, onAttribuer, onDemanderRetour, onSupprimer }) {
    const futs = bar.futs || {};

    return React.createElement(
      "div",
      { className: "rounded-xl border p-3 " +
          (estBiere ? "border-amber-800 bg-amber-950/30" : "border-green-800 bg-green-950/30") },
      React.createElement(
        "div",
        { className: "flex items-center justify-between mb-2" },
        React.createElement(
          "div",
          null,
          React.createElement("span", { className: "font-bold text-white" }, bar.nom),
          React.createElement("span", { className: "ml-2 text-xs text-neutral-400" },
            estBiere ? "Bière" : "Cidre")
        ),
        React.createElement(
          "span",
          { className: "text-sm font-bold px-2 py-0.5 rounded " +
              (barComplet ? "bg-red-700 text-white" : "bg-neutral-700 text-neutral-200") },
          nbFuts + " / " + maxFuts
        )
      ),
      listeFuts.length === 0
        ? React.createElement("p", { className: "text-neutral-500 text-sm" }, "Aucun fût en cours")
        : React.createElement(
            "div",
            { className: "space-y-1" },
            listeFuts.map(function (f) {
              return React.createElement(
                "div",
                { key: f.id, className: "flex items-center justify-between bg-black/40 rounded px-2 py-1.5" },
                React.createElement("span", { className: "text-sm text-neutral-200" },
                  "Fût " + (f.donnees.type === TYPE_BAR.BIERE ? "bière" : "cidre")),
                peutGererFuts
                  ? React.createElement(
                      "button",
                      {
                        onClick: function () { onDemanderRetour(bar, f.id, f.donnees); },
                        className: "text-xs px-2 py-1 bg-neutral-700 hover:bg-neutral-600 text-white rounded"
                      },
                      "Retour"
                    )
                  : null
              );
            })
          ),
      React.createElement(
        "div",
        { className: "flex gap-2 mt-3" },
        peutGererFuts
          ? React.createElement(
              "button",
              {
                onClick: function () { onAttribuer(bar); },
                disabled: barComplet,
                className: "flex-1 py-2 rounded-lg text-sm font-medium " +
                  (barComplet
                    ? "bg-neutral-800 text-neutral-600"

              },
              barComplet ? "Bar complet" : "+ Attribuer un fût"
            )
          : null,
        peutGererBars
          ? React.createElement(
              "button",
              {
                onClick: function () { onSupprimer(bar); },
                className: "py-2 px-3 rounded-lg text-sm bg-neutral-800 hover:bg-red-900 text-neutral-400"
              },
              "Supprimer"
            )
          : null
      )
    );
  }

  /* =========================================================================
     SECTION 14bis — FENÊTRE DE SAISIE D'UNE VENTE (module 3B-1)
     S'ouvre quand on clique sur une case bar+créneau du tableau.
     En 3B-1 : cas simple uniquement (PAD OK). On saisit montant + quantités.
  ========================================================================= */
  function FenetreSaisieVente({ bar, creneau, onConfirmer, onAnnuler }) {
    /* Champs de saisie. On les garde en texte puis on convertit à la
       validation : ça évite les soucis de champ vide. */
    const [montant, setMontant] = useState("");
    const [pintes, setPintes] = useState("");
    const [pichets, setPichets] = useState("");
    const [gobelets, setGobelets] = useState("");
    const [commentaire, setCommentaire] = useState("");

    /* Convertit un texte en nombre. Vide ou invalide => 0. */
    function versNombre(texte) {
      const n = parseFloat((texte || "").replace(",", "."));
      return isNaN(n) ? 0 : n;
    }
    function versEntier(texte) {
      const n = parseInt(texte, 10);
      return isNaN(n) ? 0 : n;
    }

    function confirmer() {
      const m = versNombre(montant);
      const p = versEntier(pintes);
      const pi = versEntier(pichets);
      const g = versEntier(gobelets);

      /* Garde-fou : on refuse une saisie totalement vide. */
      if (m <= 0 && p <= 0 && pi <= 0 && g <= 0) {
        alert("Saisissez au moins un montant ou une quantité.");
        return;
      }
      /* Garde-fou : pas de nombres négatifs. */
      if (m < 0 || p < 0 || pi < 0 || g < 0) {
        alert("Les valeurs ne peuvent pas être négatives.");
        return;
      }

      onConfirmer({
        montant: m,
        nbPintes: p,
        nbPichets: pi,
        nbGobelets: g,
        commentaire: commentaire
      });
    }

    /* Petit champ numérique réutilisable. */
    function champNombre(libelle, valeur, onChange) {
      return React.createElement(
        "div",
        null,
        React.createElement("label", { className: "block text-xs text-neutral-400 mb-1" }, libelle),
        React.createElement("input", {
          type: "number",
          inputMode: "decimal",
          value: valeur,
          onChange: function (e) { onChange(e.target.value); },
          className: "w-full px-3 py-2 bg-neutral-800 rounded-lg text-white text-sm",
          placeholder: "0"
        })
      );
    }

    return React.createElement(
      "div",
      { className: "fixed inset-0 bg-black/80 flex items-center justify-center p-4 z-50" },
      React.createElement(
        "div",
        { className: "bg-neutral-900 rounded-2xl w-full max-w-sm p-6 max-h-[90vh] overflow-y-auto" },

        React.createElement("h3", { className: "text-xl font-bold text-white mb-1" }, "Saisie d'une vente"),
        React.createElement("p", { className: "text-neutral-400 text-sm mb-4" },
          bar.nom + " — " + creneau.libelle),

        /* Montant en euros. */
        React.createElement(
          "div",
          { className: "mb-3" },
          React.createElement("label", { className: "block text-xs text-neutral-400 mb-1" }, "Montant total (€)"),
          React.createElement("input", {
            type: "number",
            inputMode: "decimal",
            value: montant,
            onChange: function (e) { setMontant(e.target.value); },
            className: "w-full px-3 py-2 bg-neutral-800 rounded-lg text-white",
            placeholder: "0.00",
            autoFocus: true
          })
        ),

        /* Quantités. */
        React.createElement(
          "div",
          { className: "grid grid-cols-3 gap-2 mb-3" },
          champNombre("Pintes", pintes, setPintes),
          champNombre("Pichets", pichets, setPichets),
          champNombre("Gobelets", gobelets, setGobelets)
        ),

        /* Commentaire. */
        React.createElement(
          "div",
          { className: "mb-5" },
          React.createElement("label", { className: "block text-xs text-neutral-400 mb-1" }, "Commentaire (facultatif)"),
          React.createElement("textarea", {
            value: commentaire,
            onChange: function (e) { setCommentaire(e.target.value); },
            rows: 2,
            className: "w-full px-3 py-2 bg-neutral-800 rounded-lg text-white text-sm"
          })
        ),

        React.createElement(
          "div",
          { className: "flex gap-2" },
          React.createElement(
            "button",
            { onClick: onAnnuler, className: "flex-1 py-3 bg-neutral-700 text-white rounded-lg" },
            "Annuler"
          ),
          React.createElement(
            "button",
            { onClick: confirmer, className: "flex-1 py-3 bg-emerald-600 text-white rounded-lg font-medium" },
            "Enregistrer"
          )
        )
      )
    );
  }

  /* =========================================================================
     SECTION 14ter — ÉCRAN DE SAISIE DES VENTES (module 3B-1)
     Tableau bar × créneau du jour actif. Chaque case montre l'état et le
     total. Cliquer une case ouvre la fenêtre de saisie.
  ========================================================================= */
  function EcranVentes({ prenom, role, jourActuel, bars, creneaux, casesVentes, onFermer }) {
    const [saisieEnCours, setSaisieEnCours] = useState(null);

    const peutSaisir = Droits.peutSaisirVentes(role);

    /* Liste des créneaux du jour, en tableau. */
    const listeCreneaux = Object.keys(creneaux || {}).map(function (id) {
      return { id: id, libelle: creneaux[id].libelle };
    });

    /* Récupère la case de vente pour un bar + créneau donné (ou null). */
    function getCase(idBar, idCreneau) {
      if (!casesVentes || !casesVentes[idBar]) return null;
      return casesVentes[idBar][idCreneau] || null;
    }

    /* Couleur de fond d'une case selon son état. */
    function couleurCase(uneCase) {
      const etat = etatCase(uneCase);
      if (etat === "cloturee") return "bg-neutral-700";
      if (etat === "saisie") return "bg-emerald-800";
      return "bg-neutral-900 border border-neutral-700";
    }

    /* Enregistre une saisie. */
    function enregistrerSaisie(donnees) {
      const s = saisieEnCours;
      ActionsVentes.saisir(jourActuel, s.bar.id, s.creneau.id, donnees, prenom)
        .then(function () { setSaisieEnCours(null); })
        .catch(function (e) { alert(e.message); });
    }

    return React.createElement(
      "div",
      { className: "fixed inset-0 bg-black z-40 flex flex-col" },

      /* En-tête. */
      React.createElement(
        "div",
        { className: "p-4 border-b border-neutral-800 flex items-center justify-between" },
        React.createElement(
          "div",
          null,
          React.createElement("h2", { className: "text-lg font-bold text-emerald-400" }, "Saisie des ventes"),
          React.createElement("p", { className: "text-xs text-neutral-500" }, "Jour " + jourActuel)
        ),
        React.createElement(
          "button",
          { onClick: onFermer, className: "text-xs px-3 py-1.5 bg-neutral-800 text-neutral-300 rounded-lg" },
          "Fermer"
        )
      ),

      /* Corps : tableau bar × créneau. */
      React.createElement(
        "div",
        { className: "flex-1 overflow-auto p-3" },

        listeCreneaux.length === 0
          ? React.createElement("p", { className: "text-amber-400 text-sm text-center py-8" },
              "Aucun créneau défini pour le jour " + jourActuel +
              ". Le super admin doit les configurer avant de saisir des ventes.")
          : bars.length === 0
            ? React.createElement("p", { className: "text-neutral-500 text-sm text-center py-8" },
                "Aucun bar. Un administrateur doit en créer.")
            : React.createElement(
                "div",
                { className: "space-y-4" },
                /* Un bloc par bar, contenant ses créneaux. */
                bars.map(function (bar) {
                  return React.createElement(
                    "div",
                    { key: bar.id, className: "rounded-xl border border-neutral-800 overflow-hidden" },
                    React.createElement(
                      "div",
                      { className: "px-3 py-2 bg-neutral-900 font-bold text-white" },
                      bar.nom +
                        " (" + (bar.type === TYPE_BAR.BIERE ? "bière" : "cidre") + ")"
                    ),
                    React.createElement(
                      "div",
                      { className: "p-2 grid grid-cols-2 gap-2" },
                      listeCreneaux.map(function (creneau) {
                        const uneCase = getCase(bar.id, creneau.id);
                        const info = calculerTotalCase(uneCase);
                        const etat = etatCase(uneCase);

                        return React.createElement(
                          "button",
                          {
                            key: creneau.id,
                            onClick: function () {
                              if (!peutSaisir) return;
                              if (etat === "cloturee") {
                                alert("Ce créneau est clôturé.");
                                return;
                              }
                              setSaisieEnCours({ bar: bar, creneau: creneau });
                            },
                            className: "text-left rounded-lg p-2 " + couleurCase(uneCase) +
                              (peutSaisir && etat !== "cloturee" ? " active:opacity-80" : " cursor-default")
                          },
                          React.createElement("div", { className: "text-xs text-neutral-300" }, creneau.libelle),
                          React.createElement("div", { className: "text-sm font-bold text-white mt-1" },
                            info.total.toFixed(2) + " €"),
                          React.createElement("div", { className: "text-xs mt-0.5 " +
                              (etat === "cloturee" ? "text-neutral-400"
                                : etat === "saisie" ? "text-emerald-200"
                                : "text-neutral-500") },
                            etat === "cloturee" ? "Clôturé"
                              : etat === "saisie" ? (info.nbSaisies + " saisie(s)")
                              : "À saisir")
                        );
                      })
                    )
                  );
                })
              )
      ),

      /* Fenêtre de saisie. */
      saisieEnCours
        ? React.createElement(FenetreSaisieVente, {
            bar: saisieEnCours.bar,
            creneau: saisieEnCours.creneau,
            onConfirmer: enregistrerSaisie,
            onAnnuler: function () { setSaisieEnCours(null); }
          })
        : null
    );
  }

  /* =========================================================================
     SECTION 15 — ÉCRAN PRINCIPAL
  ========================================================================= */
  function EcranPrincipal({ prenom, role, onDeconnexion }) {
    const [bars, setBars] = useState([]);
    const [historique, setHistorique] = useState([]);
    const [params, setParams] = useState(PARAMS_DEFAUT);
    const [jourActuel, setJourActuel] = useState(1);
    const [creneaux, setCreneaux] = useState({});
    const [fenetreAjoutBar, setFenetreAjoutBar] = useState(false);
    const [retourEnCours, setRetourEnCours] = useState(null);
    const [fenetreCreneaux, setFenetreCreneaux] = useState(false);
    const [casesVentes, setCasesVentes] = useState({});
    const [ecranVentes, setEcranVentes] = useState(false);

    const peutGererBars = Droits.peutGererBars(role);

    /* Abonnement temps réel : bars, historique, params, jour actif. */
    useEffect(function () {
      const refBars = Base.bars();
      const refHisto = Base.historiqueFuts();
      const refParams = Base.params();
      const refJour = Base.jourActuel();

      function surBars(s) {
        const v = s.val() || {};
        setBars(Object.keys(v).map(function (id) { return Object.assign({ id: id }, v[id]); }));
      }
      function surHisto(s) {
        const v = s.val() || {};
        setHistorique(Object.keys(v).map(function (cle) { return v[cle]; }));
      }
      function surParams(s) {
        const v = s.val();
        /* On fusionne avec les valeurs par défaut : si un paramètre manque
           en base, on garde la valeur par défaut. */
        if (v) setParams(Object.assign({}, PARAMS_DEFAUT, v));
      }
      function surJour(s) {
        const v = s.val();
        if (v) setJourActuel(v);
      }

      refBars.on("value", surBars);
      refHisto.on("value", surHisto);
      refParams.on("value", surParams);
      refJour.on("value", surJour);

      return function () {
        refBars.off("value", surBars);
        refHisto.off("value", surHisto);
        refParams.off("value", surParams);
        refJour.off("value", surJour);
      };
    }, []);

    /* Abonnement aux créneaux : dépend du jour actif, donc recalculé à
       chaque changement de jour. */
    useEffect(function () {
      const refCreneaux = Base.creneauxDuJour(jourActuel);
      function surCreneaux(s) {
        setCreneaux(s.val() || {});
      }
      refCreneaux.on("value", surCreneaux);
      return function () {
        refCreneaux.off("value", surCreneaux);
      };
    }, [jourActuel]);

    /* Abonnement aux cases de ventes du jour actif (module 3B). */
    useEffect(function () {
      const refVentes = Base.casesVentesDuJour(jourActuel);
      function surVentes(s) {
        setCasesVentes(s.val() || {});
      }
      refVentes.on("value", surVentes);
      return function () {
        refVentes.off("value", surVentes);
      };
    }, [jourActuel]);

    const stock = calculerStock(historique, params);

    function creerBar(nom, type) {
      ActionsBars.creer(nom, type)
        .then(function () { setFenetreAjoutBar(false); })
        .catch(function (e) { alert(e.message); });
    }

    function supprimerBar(bar) {
      if (!confirm("Supprimer le bar « " + bar.nom + " » ?")) return;
      ActionsBars.supprimer(bar).catch(function (e) { alert(e.message); });
    }

    function attribuerFut(bar) {
      const stockDispo = bar.type === TYPE_BAR.BIERE ? stock.biere : stock.cidre;
      if (stockDispo <= 0) {
        alert("Stock épuisé pour ce type de boisson.");
        return;
      }
      ActionsFuts.attribuer(bar, bar.type, params.maxFutsParBar, prenom)
        .catch(function (e) { alert(e.message); });
    }

    function confirmerRetour(motif, commentaire) {
      const r = retourEnCours;
      ActionsFuts.retourner(r.bar, r.idFut, r.fut, motif, commentaire, prenom)
        .then(function () { setRetourEnCours(null); })
        .catch(function (e) { alert(e.message); });
    }

    function changerJour(nouveauJour) {
      if (nouveauJour < 1 || nouveauJour > params.nombreJours) return;
      ActionsCreneaux.definirJourActuel(nouveauJour)
        .catch(function (e) { alert(e.message); });
    }

    /* Nombre de créneaux du jour, pour l'affichage d'information. */
    const nbCreneaux = Object.keys(creneaux).length;

    return React.createElement(
      "div",
      { className: "min-h-screen bg-black text-white" },

      /* Bandeau du haut. */
      React.createElement(
        "div",
        { className: "p-4 border-b border-neutral-800 flex items-center justify-between" },
        React.createElement(
          "div",
          null,
          React.createElement("h1", { className: "text-lg font-bold text-green-400" }, "Bars Nomades"),
          React.createElement("p", { className: "text-xs text-neutral-500" }, prenom + " — " + role)
        ),
        React.createElement(
          "button",
          {
            onClick: onDeconnexion,
            className: "text-xs px-3 py-1.5 bg-neutral-800 text-neutral-300 rounded-lg"
          },
          "Quitter"
        )
      ),

      /* Bandeau du jour. */
      React.createElement(BandeauJour, {
        jourActuel: jourActuel,
        nombreJours: params.nombreJours,
        role: role,
        onChangerJour: changerJour,
        onOuvrirCreneaux: function () { setFenetreCreneaux(true); }
      }),

      /* Information sur les créneaux du jour. */
      React.createElement(
        "div",
        { className: "px-3 py-2 text-xs " +
            (nbCreneaux === 0 ? "text-amber-400" : "text-neutral-500") },
        nbCreneaux === 0
          ? "Aucun créneau défini pour le jour " + jourActuel +
            (Droits.peutGererCreneaux(role)
              ? " — utilisez « Créneaux du jour » pour les créer."
              : " — le super admin doit les configurer.")
          : nbCreneaux + " créneau(x) défini(s) pour le jour " + jourActuel
      ),

      /* Bandeau de stock. */
      React.createElement(
        "div",
        { className: "grid grid-cols-2 gap-2 p-3" },
        React.createElement(
          "div",
          { className: "bg-amber-950/40 border border-amber-800 rounded-lg p-3 text-center" },
          React.createElement("div", { className: "text-2xl font-bold text-amber-400" }, stock.biere),
          React.createElement("div", { className: "text-xs text-amber-200" }, "Fûts bière en stock")
        ),
        React.createElement(
          "div",
          { className: "bg-green-950/40 border border-green-800 rounded-lg p-3 text-center" },
          React.createElement("div", { className: "text-2xl font-bold text-green-400" }, stock.cidre),
          React.createElement("div", { className: "text-xs text-green-200" }, "Fûts cidre en stock")
        )
      ),

      /* Bouton d'ajout de bar (admin et plus). */
      peutGererBars
        ? React.createElement(
            "div",
            { className: "px-3 pb-2" },
            React.createElement(
              "button",
              {
                onClick: function () { setFenetreAjoutBar(true); },
                className: "w-full py-2.5 bg-neutral-800 hover:bg-neutral-700 text-white rounded-lg text-sm font-medium"
              },
              "+ Ajouter un bar"
            )
          )
        : null,

      /* Bouton Saisie des ventes (secrétaire et plus). */
      Droits.peutSaisirVentes(role)
        ? React.createElement(
            "div",
            { className: "px-3 pb-2" },
            React.createElement(
              "button",
              {
                onClick: function () { setEcranVentes(true); },
                className: "w-full py-2.5 bg-emerald-800 hover:bg-emerald-700 text-white rounded-lg text-sm font-medium"
              },
              "Saisie des ventes"
            )
          )
        : null,

      /* Liste des bars. */
      React.createElement(
        "div",
        { className: "p-3 space-y-3" },
        bars.length === 0
          ? React.createElement(
              "div",
              { className: "text-center py-10 text-neutral-500" },
              React.createElement("p", null, "Aucun bar pour l'instant."),
              peutGererBars
                ? React.createElement("p", { className: "text-sm mt-1" },
                    "Utilisez « Ajouter un bar » pour commencer.")
                : React.createElement("p", { className: "text-sm mt-1" },
                    "Un administrateur doit créer les bars.")
            )
          : bars.map(function (bar) {
              return React.createElement(CarteBar, {
                key: bar.id,
                bar: bar,
                role: role,
                maxFuts: params.maxFutsParBar,
                prenom: prenom,
                onAttribuer: attribuerFut,
                onDemanderRetour: function (b, idFut, fut) {
                  setRetourEnCours({ bar: b, idFut: idFut, fut: fut });
                },
                onSupprimer: supprimerBar
              });
            })
      ),

      /* Fenêtres. */
      fenetreAjoutBar
        ? React.createElement(FenetreAjoutBar, {
            onConfirmer: creerBar,
            onAnnuler: function () { setFenetreAjoutBar(false); }
          })
        : null,

      retourEnCours
        ? React.createElement(FenetreRetourFut, {
            bar: retourEnCours.bar,
            idFut: retourEnCours.idFut,
            fut: retourEnCours.fut,
            onConfirmer: confirmerRetour,
            onAnnuler: function () { setRetourEnCours(null); }
          })
        : null,

      fenetreCreneaux
        ? React.createElement(FenetreCreneaux, {
            jourActuel: jourActuel,
            nombreJours: params.nombreJours,
            creneaux: creneaux,
            onFermer: function () { setFenetreCreneaux(false); }
          })
        : null,

      /* Écran de saisie des ventes (plein écran). */
      ecranVentes
        ? React.createElement(EcranVentes, {
            prenom: prenom,
            role: role,
            jourActuel: jourActuel,
            bars: bars,
            creneaux: creneaux,
            casesVentes: casesVentes,
            onFermer: function () { setEcranVentes(false); }
          })
        : null
    );
  }

  /* =========================================================================
     SECTION 16 — COMPOSANT PRINCIPAL : L'APPLICATION
  ========================================================================= */
  function Application() {
    const [etape, setEtape] = useState("demarrage");
    const [erreur, setErreur] = useState("");
    const [prenom, setPrenom] = useState("");
    const [role, setRole] = useState(ROLES.VISITEUR);

    useEffect(function () {
      obtenirBadgeAnonyme()
        .then(function () { setEtape("accueil"); })
        .catch(function (e) {
          setErreur("L'authentification a échoué. (" + (e && e.code ? e.code : "inconnu") + ")");
          setEtape("erreur");
        });
    }, []);

    function entrerDansApp(prenomSaisi) {
      setPrenom(prenomSaisi);
      setEtape("connexion");
      const refUtilisateur = Base.utilisateur(prenomSaisi);
      refUtilisateur.once("value").then(function (instantane) {
        const existant = instantane.val();
        const roleConserve = (existant && existant.role) ? existant.role : ROLES.VISITEUR;
        return refUtilisateur.update({
          prenom: prenomSaisi,
          derniereConnexion: Date.now(),
          role: roleConserve
        }).then(function () {
          setRole(roleConserve);
          setEtape("pret");
        });
      }).catch(function (e) {
        setErreur("Impossible d'enregistrer la connexion. (" + (e && e.code ? e.code : "inconnu") + ")");
        setEtape("erreur");
      });
    }

    function seDeconnecter() {
      setPrenom("");
      setRole(ROLES.VISITEUR);
      setEtape("accueil");
    }

    if (etape === "erreur") return React.createElement(EcranErreur, { details: erreur });
    if (etape === "demarrage") return React.createElement(EcranChargement, { message: "Connexion sécurisée…" });
    if (etape === "connexion") return React.createElement(EcranChargement, { message: "Enregistrement…" });
    if (etape === "accueil") return React.createElement(EcranAccueil, { onEntrer: entrerDansApp });

    return React.createElement(EcranPrincipal, {
      prenom: prenom,
      role: role,
      onDeconnexion: seDeconnecter
    });
  }

  /* =========================================================================
     DÉMARRAGE
  ========================================================================= */
  ReactDOM.createRoot(document.getElementById("root")).render(
    React.createElement(Application)
  );
  </script>
</body>
</html>
