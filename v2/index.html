<!DOCTYPE html>
<!--
===============================================================================
  GESTION DES FÛTS - BARS NOMADES - HELLFEST
  Application reconstruite proprement (remplace la version V16-V23 minifiée).

  ÉTAT : MODULE 1 + MODULE 2
  Contenu actuel :
    - démarrage, connexion Firebase, authentification anonyme   (module 1)
    - écran d'accueil (prénom), connexion utilisateur           (module 1)
    - gestion des BARS : créer, renommer, supprimer             (module 2)
    - gestion des FÛTS : attribuer, retourner                   (module 2)
    - suivi du STOCK bière / cidre                              (module 2)

  Pas encore inclus : ventes, planning, dashboard (modules 3 et 4).

  PRINCIPE D'ARCHITECTURE
    - Un seul fichier HTML. Code lisible, commenté en français, non minifié.
    - Une seule "session" pour tout le festival (sessions/festival).
    - 4 rôles : visiteur, secretaire, admin, superadmin.
    - AUCUN mot de passe dans ce fichier. Les droits viennent du rôle stocké
      en base, protégé par les règles de sécurité Firebase.

  NOTE DÉVELOPPEURS — STOCKAGE DES FÛTS
    Chaque fût d'un bar est un ENFANT INDÉPENDANT sous une clé unique générée
    par Firebase (push). PAS de tableau indexé : sinon deux attributions
    simultanées s'écrasent (un fût "disparaît"). Voir SECTION 7.
===============================================================================
-->
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="theme-color" content="#39ff14" />
  <title>Bars Nomades — Gestion des Fûts</title>

  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>

  <style>
    * { -webkit-tap-highlight-color: transparent; }
    body { background: #000; overscroll-behavior: none; }
  </style>
</head>

<body class="bg-black">
  <div id="root"></div>

  <script>
  /* =========================================================================
     OUTILS RACCOURCIS REACT
  ========================================================================= */
  const { useState, useEffect } = React;

  /* =========================================================================
     CONFIGURATION FIREBASE
     Coordonnées du projet. Non secrètes : la sécurité repose sur les RÈGLES.
  ========================================================================= */
  const firebaseConfig = {
    apiKey: "AIzaSyCgl30syyCEJif9q96E2jzv-aTXxXgvgv0",
    authDomain: "gestion-futs-hellfest.firebaseapp.com",
    databaseURL: "https://gestion-futs-hellfest-default-rtdb.europe-west1.firebasedatabase.app",
    projectId: "gestion-futs-hellfest",
    storageBucket: "gestion-futs-hellfest.firebasestorage.app",
    messagingSenderId: "107509834680",
    appId: "1:107509834680:web:3a58295d3268b5d19f654d"
  };

  firebase.initializeApp(firebaseConfig);
  const db = firebase.database();
  const auth = firebase.auth();

  /* =========================================================================
     CONSTANTES DE L'APPLICATION
  ========================================================================= */
  const ID_SESSION = "festival";

  const ROLES = {
    VISITEUR: "visiteur",
    SECRETAIRE: "secretaire",
    ADMIN: "admin",
    SUPERADMIN: "superadmin"
  };

  const TYPE_BAR = {
    BIERE: "biere",
    CIDRE: "cidre"
  };

  /* Façons de retourner un fût.
       VIDE        : entièrement consommé (compte dans le volume vendu).
       CASSE       : incident. PAS d'estimation de volume (décision validée).
       NON_TERMINE : reste de la boisson, gardé pour le lendemain.
       PLEIN       : jamais entamé, remis au stock. */
  const RETOUR = {
    VIDE: "vide",
    CASSE: "casse",
    NON_TERMINE: "non_termine",
    PLEIN: "plein"
  };

  /* Réglages par défaut (le super admin les changera au module 4). */
  const PARAMS_DEFAUT = {
    stockInitialBiere: 50,
    stockInitialCidre: 20,
    maxFutsParBar: 3
  };

  const STOCKAGE = { PRENOM: "barnomade_prenom" };

  /* =========================================================================
     SECTION 1 — AUTHENTIFICATION
  ========================================================================= */
  function obtenirBadgeAnonyme() {
    return auth.signInAnonymously();
  }

  /* =========================================================================
     SECTION 2 — RÉFÉRENCES À LA BASE
     Centralisées : si l'organisation de la base change, on corrige ici.
  ========================================================================= */
  const Base = {
    utilisateur: function (prenom) {
      return db.ref("sessions/" + ID_SESSION + "/users/" + prenom);
    },
    bars: function () {
      return db.ref("sessions/" + ID_SESSION + "/bars");
    },
    bar: function (idBar) {
      return db.ref("sessions/" + ID_SESSION + "/bars/" + idBar);
    },
    futsDuBar: function (idBar) {
      return db.ref("sessions/" + ID_SESSION + "/bars/" + idBar + "/futs");
    },
    historiqueFuts: function () {
      return db.ref("sessions/" + ID_SESSION + "/historiqueFuts");
    }
  };

  /* =========================================================================
     SECTION 3 — ÉCRANS UTILITAIRES
  ========================================================================= */
  function EcranChargement({ message }) {
    return React.createElement(
      "div",
      { className: "min-h-screen flex flex-col items-center justify-center bg-black text-green-400" },
      React.createElement("p", { className: "text-lg" }, "Chargement…"),
      React.createElement("p", { className: "text-xs text-neutral-500 mt-2" }, message || "")
    );
  }

  function EcranErreur({ details }) {
    return React.createElement(
      "div",
      { className: "min-h-screen flex flex-col items-center justify-center bg-black text-red-400 p-6 text-center" },
      React.createElement("p", { className: "text-lg font-bold mb-2" }, "Impossible de démarrer l'application"),
      React.createElement("p", { className: "text-sm text-neutral-400" }, details || "Erreur inconnue."),
      React.createElement("p", { className: "text-xs text-neutral-600 mt-4" },
        "Vérifiez votre connexion internet, puis rechargez la page.")
    );
  }

  /* =========================================================================
     SECTION 4 — ÉCRAN D'ACCUEIL
  ========================================================================= */
  function EcranAccueil({ onEntrer }) {
    const [prenom, setPrenom] = useState("");

    useEffect(function () {
      const memorise = localStorage.getItem(STOCKAGE.PRENOM);
      if (memorise) setPrenom(memorise);
    }, []);

    function valider() {
      const valeur = prenom.trim();
      if (!valeur) return;
      localStorage.setItem(STOCKAGE.PRENOM, valeur);
      onEntrer(valeur);
    }

    return React.createElement(
      "div",
      { className: "min-h-screen flex items-center justify-center bg-black p-4" },
      React.createElement(
        "div",
        { className: "w-full max-w-sm" },
        React.createElement(
          "div",
          { className: "text-center mb-8" },
          React.createElement("h1", { className: "text-2xl font-bold text-white" }, "Bars Nomades"),
          React.createElement("p", { className: "text-green-400 font-bold mt-1" }, "Gestion des Fûts")
        ),
        React.createElement(
          "div",
          { className: "space-y-4" },
          React.createElement("label", { className: "block text-neutral-400 text-sm" }, "Ton prénom ou surnom"),
          React.createElement("input", {
            type: "text",
            value: prenom,
            onChange: function (e) { setPrenom(e.target.value); },
            onKeyDown: function (e) { if (e.key === "Enter") valider(); },
            placeholder: "Ex : Kevin",
            className: "w-full px-4 py-3 bg-neutral-900 border border-neutral-700 rounded-xl text-white text-lg",
            autoFocus: true
          }),
          React.createElement(
            "button",
            {
              onClick: valider,
              className: "w-full py-4 bg-red-600 hover:bg-red-700 text-white rounded-xl font-bold text-lg transition-colors"
            },
            "Entrer"
          )
        )
      )
    );
  }

  /* =========================================================================
     SECTION 5 — DROITS
     Fonction de référence unique. Conforme au tableau des permissions gelé.
  ========================================================================= */
  const Droits = {
    /* Gérer les fûts (attribuer, retourner) : secrétaire et plus. */
    peutGererFuts: function (role) {
      return role === ROLES.SECRETAIRE || role === ROLES.ADMIN || role === ROLES.SUPERADMIN;
    },
    /* Gérer les bars (créer, renommer, supprimer) : admin et plus. */
    peutGererBars: function (role) {
      return role === ROLES.ADMIN || role === ROLES.SUPERADMIN;
    }
  };

  /* =========================================================================
     SECTION 6 — ACTIONS SUR LES BARS
  ========================================================================= */
  const ActionsBars = {

    /* Crée un bar. push() génère une clé unique : pas de collision. */
    creer: function (nom, type) {
      const nomPropre = (nom || "").trim();
      if (!nomPropre) return Promise.reject(new Error("Nom de bar vide"));
      return Base.bars().push({ nom: nomPropre, type: type });
    },

    renommer: function (idBar, nouveauNom) {
      const nomPropre = (nouveauNom || "").trim();
      if (!nomPropre) return Promise.reject(new Error("Nom de bar vide"));
      return Base.bar(idBar).child("nom").set(nomPropre);
    },

    /* Supprime un bar. Refuse si le bar a encore des fûts (pour ne pas les
       perdre dans la nature). */
    supprimer: function (bar) {
      const nbFuts = bar.futs ? Object.keys(bar.futs).length : 0;
      if (nbFuts > 0) {
        return Promise.reject(new Error("Ce bar a encore " + nbFuts + " fût(s). Retournez-les d'abord."));
      }
      return Base.bar(bar.id).remove();
    }
  };

  /* =========================================================================
     SECTION 7 — ACTIONS SUR LES FÛTS
     L'ATTRIBUTION UTILISE UNE TRANSACTION : même si deux personnes
     attribuent au même instant, les opérations sont traitées proprement,
     sans s'écraser. C'est la correction du bug de concurrence.
  ========================================================================= */
  const ActionsFuts = {

    /* Attribue un fût au bar. */
    attribuer: function (bar, type, maxFuts, prenomUtilisateur) {
      const nbFutsActuels = bar.futs ? Object.keys(bar.futs).length : 0;
      if (nbFutsActuels >= maxFuts) {
        return Promise.reject(new Error("Ce bar a déjà le maximum de fûts (" + maxFuts + ")."));
      }

      const referenceFuts = Base.futsDuBar(bar.id);

      return referenceFuts.transaction(function (futsActuels) {
        const futs = futsActuels || {};
        if (Object.keys(futs).length >= maxFuts) {
          /* Renvoyer undefined annule la transaction (bar rempli entre-temps). */
          return;
        }
        const cleNouveauFut = referenceFuts.push().key;
        futs[cleNouveauFut] = {
          type: type,
          dateAttribution: Date.now(),
          attribuePar: prenomUtilisateur
        };
        return futs;
      }).then(function (resultat) {
        if (!resultat.committed) {
          throw new Error("Ce bar vient d'atteindre son maximum de fûts.");
        }
        return Base.historiqueFuts().push({
          mouvement: "attribution",
          typeFut: type,
          idBar: bar.id,
          nomBar: bar.nom,
          par: prenomUtilisateur,
          date: Date.now()
        });
      });
    },

    /* Retourne un fût avec un motif (RETOUR.VIDE / CASSE / ...). */
    retourner: function (bar, idFut, fut, motif, commentaire, prenomUtilisateur) {
      return Base.futsDuBar(bar.id).child(idFut).remove().then(function () {
        return Base.historiqueFuts().push({
          mouvement: "retour",
          motifRetour: motif,
          typeFut: fut.type,
          idBar: bar.id,
          nomBar: bar.nom,
          commentaire: (commentaire || "").trim(),
          par: prenomUtilisateur,
          date: Date.now()
        });
      });
    }
  };

  /* =========================================================================
     SECTION 8 — CALCUL DU STOCK
     Stock restant = stock initial - fûts sortis + fûts revenus pleins.
     Recalculé depuis l'historique : toujours juste.
  ========================================================================= */
  function calculerStock(historique, params) {
    let stockBiere = params.stockInitialBiere;
    let stockCidre = params.stockInitialCidre;

    historique.forEach(function (mvt) {
      if (mvt.mouvement === "attribution") {
        if (mvt.typeFut === TYPE_BAR.BIERE) stockBiere = stockBiere - 1;
        if (mvt.typeFut === TYPE_BAR.CIDRE) stockCidre = stockCidre - 1;
      } else if (mvt.mouvement === "retour" && mvt.motifRetour === RETOUR.PLEIN) {
        if (mvt.typeFut === TYPE_BAR.BIERE) stockBiere = stockBiere + 1;
        if (mvt.typeFut === TYPE_BAR.CIDRE) stockCidre = stockCidre + 1;
      }
    });

    return { biere: stockBiere, cidre: stockCidre };
  }

  /* =========================================================================
     SECTION 9 — FENÊTRE DE RETOUR D'UN FÛT
  ========================================================================= */
  function FenetreRetourFut({ bar, idFut, fut, onConfirmer, onAnnuler }) {
    const [motif, setMotif] = useState("");
    const [commentaire, setCommentaire] = useState("");

    function confirmer() {
      if (!motif) return;
      if (motif === RETOUR.CASSE && !commentaire.trim()) {
        alert("Merci de décrire le problème pour un fût cassé.");
        return;
      }
      onConfirmer(motif, commentaire);
    }

    function boutonMotif(valeur, libelle, couleur) {
      const actif = motif === valeur;
      return React.createElement(
        "button",
        {
          onClick: function () { setMotif(valeur); },
          className: "w-full py-3 rounded-lg font-medium text-left px-4 " +
            (actif ? couleur + " text-white" : "bg-neutral-800 text-neutral-300")
        },
        libelle
      );
    }

    return React.createElement(
      "div",
      { className: "fixed inset-0 bg-black/80 flex items-center justify-center p-4 z-50" },
      React.createElement(
        "div",
        { className: "bg-neutral-900 rounded-2xl w-full max-w-sm p-6" },
        React.createElement("h3", { className: "text-xl font-bold text-white mb-1" }, "Retour de fût"),
        React.createElement("p", { className: "text-neutral-400 text-sm mb-4" },
          bar.nom + " — fût " + (fut.type === TYPE_BAR.BIERE ? "bière" : "cidre")),

        React.createElement(
          "div",
          { className: "space-y-2" },
          boutonMotif(RETOUR.VIDE, "Fût vide (entièrement consommé)", "bg-blue-600"),
          boutonMotif(RETOUR.CASSE, "Fût cassé / endommagé", "bg-red-600"),
          boutonMotif(RETOUR.NON_TERMINE, "Non terminé (reprise demain)", "bg-purple-600"),
          boutonMotif(RETOUR.PLEIN, "Fût plein (jamais entamé, retour stock)", "bg-green-600")
        ),

        React.createElement(
          "div",
          { className: "mt-4" },
          React.createElement("label", { className: "block text-sm text-neutral-400 mb-1" },
            "Commentaire" + (motif === RETOUR.CASSE ? " (obligatoire)" : " (facultatif)")),
          React.createElement("textarea", {
            value: commentaire,
            onChange: function (e) { setCommentaire(e.target.value); },
            rows: 2,
            className: "w-full px-3 py-2 bg-neutral-800 rounded-lg text-white text-sm",
            placeholder: motif === RETOUR.CASSE ? "Ex : valve cassée, fût percé…" : ""
          })
        ),

        React.createElement(
          "div",
          { className: "flex gap-2 mt-6" },
          React.createElement(
            "button",
            { onClick: onAnnuler, className: "flex-1 py-3 bg-neutral-700 text-white rounded-lg" },
            "Annuler"
          ),
          React.createElement(
            "button",
            {
              onClick: confirmer,
              disabled: !motif,
              className: "flex-1 py-3 rounded-lg font-medium " +
                (motif ? "bg-red-600 text-white" : "bg-neutral-800 text-neutral-600")
            },
            "Confirmer"
          )
        )
      )
    );
  }

  /* =========================================================================
     SECTION 10 — FENÊTRE D'AJOUT D'UN BAR
  ========================================================================= */
  function FenetreAjoutBar({ onConfirmer, onAnnuler }) {
    const [nom, setNom] = useState("");
    const [type, setType] = useState(TYPE_BAR.BIERE);

    function confirmer() {
      if (!nom.trim()) return;
      onConfirmer(nom, type);
    }

    return React.createElement(
      "div",
      { className: "fixed inset-0 bg-black/80 flex items-center justify-center p-4 z-50" },
      React.createElement(
        "div",
        { className: "bg-neutral-900 rounded-2xl w-full max-w-sm p-6" },
        React.createElement("h3", { className: "text-xl font-bold text-white mb-4" }, "Nouveau bar"),

        React.createElement("label", { className: "block text-sm text-neutral-400 mb-1" }, "Nom du bar"),
        React.createElement("input", {
          type: "text",
          value: nom,
          onChange: function (e) { setNom(e.target.value); },
          placeholder: "Ex : Bar Mainstage",
          className: "w-full px-4 py-3 bg-neutral-800 rounded-lg text-white mb-4",
          autoFocus: true
        }),

        React.createElement("label", { className: "block text-sm text-neutral-400 mb-1" }, "Type de boisson"),
        React.createElement(
          "div",
          { className: "flex gap-2 mb-6" },
          React.createElement(
            "button",
            {
              onClick: function () { setType(TYPE_BAR.BIERE); },
              className: "flex-1 py-3 rounded-lg font-medium " +
                (type === TYPE_BAR.BIERE ? "bg-amber-600 text-white" : "bg-neutral-800 text-neutral-400")
            },
            "Bière"
          ),
          React.createElement(
            "button",
            {
              onClick: function () { setType(TYPE_BAR.CIDRE); },
              className: "flex-1 py-3 rounded-lg font-medium " +
                (type === TYPE_BAR.CIDRE ? "bg-green-600 text-white" : "bg-neutral-800 text-neutral-400")
            },
            "Cidre"
          )
        ),

        React.createElement(
          "div",
          { className: "flex gap-2" },
          React.createElement(
            "button",
            { onClick: onAnnuler, className: "flex-1 py-3 bg-neutral-700 text-white rounded-lg" },
            "Annuler"
          ),
          React.createElement(
            "button",
            {
              onClick: confirmer,
              disabled: !nom.trim(),
              className: "flex-1 py-3 rounded-lg font-medium " +
                (nom.trim() ? "bg-red-600 text-white" : "bg-neutral-800 text-neutral-600")
            },
            "Créer"
          )
        )
      )
    );
  }

  /* =========================================================================
     SECTION 11 — CARTE D'UN BAR
  ========================================================================= */
  function CarteBar({ bar, role, maxFuts, prenom, onAttribuer, onDemanderRetour, onSupprimer }) {
    const futs = bar.futs || {};
    const listeFuts = Object.keys(futs).map(function (idFut) {
      return { id: idFut, donnees: futs[idFut] };
    });
    const nbFuts = listeFuts.length;
    const estBiere = bar.type === TYPE_BAR.BIERE;
    const peutGererFuts = Droits.peutGererFuts(role);
    const peutGererBars = Droits.peutGererBars(role);
    const barComplet = nbFuts >= maxFuts;

    return React.createElement(
      "div",
      { className: "rounded-xl border p-3 " +
          (estBiere ? "border-amber-800 bg-amber-950/30" : "border-green-800 bg-green-950/30") },

      React.createElement(
        "div",
        { className: "flex items-center justify-between mb-2" },
        React.createElement(
          "div",
          null,
          React.createElement("span", { className: "font-bold text-white" }, bar.nom),
          React.createElement("span", { className: "ml-2 text-xs text-neutral-400" },
            estBiere ? "Bière" : "Cidre")
        ),
        React.createElement(
          "span",
          { className: "text-sm font-bold px-2 py-0.5 rounded " +
              (barComplet ? "bg-red-700 text-white" : "bg-neutral-700 text-neutral-200") },
          nbFuts + " / " + maxFuts
        )
      ),

      listeFuts.length === 0
        ? React.createElement("p", { className: "text-neutral-500 text-sm" }, "Aucun fût en cours")
        : React.createElement(
            "div",
            { className: "space-y-1" },
            listeFuts.map(function (f) {
              return React.createElement(
                "div",
                {
                  key: f.id,
                  className: "flex items-center justify-between bg-black/40 rounded px-2 py-1.5"
                },
                React.createElement("span", { className: "text-sm text-neutral-200" },
                  "Fût " + (f.donnees.type === TYPE_BAR.BIERE ? "bière" : "cidre")),
                peutGererFuts
                  ? React.createElement(
                      "button",
                      {
                        onClick: function () { onDemanderRetour(bar, f.id, f.donnees); },
                        className: "text-xs px-2 py-1 bg-neutral-700 hover:bg-neutral-600 text-white rounded"
                      },
                      "Retour"
                    )
                  : null
              );
            })
          ),

      React.createElement(
        "div",
        { className: "flex gap-2 mt-3" },
        peutGererFuts
          ? React.createElement(
              "button",
              {
                onClick: function () { onAttribuer(bar); },
                disabled: barComplet,
                className: "flex-1 py-2 rounded-lg text-sm font-medium " +
                  (barComplet
                    ? "bg-neutral-800 text-neutral-600"
                    : "bg-emerald-600 hover:bg-emerald-500 text-white")
              },
              barComplet ? "Bar complet" : "+ Attribuer un fût"
            )
          : null,
        peutGererBars
          ? React.createElement(
              "button",
              {
                onClick: function () { onSupprimer(bar); },
                className: "py-2 px-3 rounded-lg text-sm bg-neutral-800 hover:bg-red-900 text-neutral-400"
              },
              "Supprimer"
            )
          : null
      )
    );
  }

  /* =========================================================================
     SECTION 12 — ÉCRAN PRINCIPAL
  ========================================================================= */
  function EcranPrincipal({ prenom, role, onDeconnexion }) {
    const [bars, setBars] = useState([]);
    const [historique, setHistorique] = useState([]);
    const [params] = useState(PARAMS_DEFAUT);
    const [fenetreAjoutBar, setFenetreAjoutBar] = useState(false);
    const [retourEnCours, setRetourEnCours] = useState(null);

    const peutGererBars = Droits.peutGererBars(role);

    /* Abonnement temps réel : bars + historique. */
    useEffect(function () {
      const refBars = Base.bars();
      const refHisto = Base.historiqueFuts();

      function surBars(instantane) {
        const valeur = instantane.val() || {};
        const liste = Object.keys(valeur).map(function (idBar) {
          return Object.assign({ id: idBar }, valeur[idBar]);
        });
        setBars(liste);
      }
      function surHisto(instantane) {
        const valeur = instantane.val() || {};
        const liste = Object.keys(valeur).map(function (cle) {
          return valeur[cle];
        });
        setHistorique(liste);
      }

      refBars.on("value", surBars);
      refHisto.on("value", surHisto);

      return function () {
        refBars.off("value", surBars);
        refHisto.off("value", surHisto);
      };
    }, []);

    const stock = calculerStock(historique, params);

    function creerBar(nom, type) {
      ActionsBars.creer(nom, type)
        .then(function () { setFenetreAjoutBar(false); })
        .catch(function (e) { alert(e.message); });
    }

    function supprimerBar(bar) {
      if (!confirm("Supprimer le bar « " + bar.nom + " » ?")) return;
      ActionsBars.supprimer(bar).catch(function (e) { alert(e.message); });
    }

    function attribuerFut(bar) {
      const stockDispo = bar.type === TYPE_BAR.BIERE ? stock.biere : stock.cidre;
      if (stockDispo <= 0) {
        alert("Stock épuisé pour ce type de boisson.");
        return;
      }
      ActionsFuts.attribuer(bar, bar.type, params.maxFutsParBar, prenom)
        .catch(function (e) { alert(e.message); });
    }

    function confirmerRetour(motif, commentaire) {
      const r = retourEnCours;
      ActionsFuts.retourner(r.bar, r.idFut, r.fut, motif, commentaire, prenom)
        .then(function () { setRetourEnCours(null); })
        .catch(function (e) { alert(e.message); });
    }

    return React.createElement(
      "div",
      { className: "min-h-screen bg-black text-white" },

      React.createElement(
        "div",
        { className: "p-4 border-b border-neutral-800 flex items-center justify-between" },
        React.createElement(
          "div",
          null,
          React.createElement("h1", { className: "text-lg font-bold text-green-400" }, "Bars Nomades"),
          React.createElement("p", { className: "text-xs text-neutral-500" }, prenom + " — " + role)
        ),
        React.createElement(
          "button",
          {
            onClick: onDeconnexion,
            className: "text-xs px-3 py-1.5 bg-neutral-800 text-neutral-300 rounded-lg"
          },
          "Quitter"
        )
      ),

      React.createElement(
        "div",
        { className: "grid grid-cols-2 gap-2 p-3" },
        React.createElement(
          "div",
          { className: "bg-amber-950/40 border border-amber-800 rounded-lg p-3 text-center" },
          React.createElement("div", { className: "text-2xl font-bold text-amber-400" }, stock.biere),
          React.createElement("div", { className: "text-xs text-amber-200" }, "Fûts bière en stock")
        ),
        React.createElement(
          "div",
          { className: "bg-green-950/40 border border-green-800 rounded-lg p-3 text-center" },
          React.createElement("div", { className: "text-2xl font-bold text-green-400" }, stock.cidre),
          React.createElement("div", { className: "text-xs text-green-200" }, "Fûts cidre en stock")
        )
      ),

      peutGererBars
        ? React.createElement(
            "div",
            { className: "px-3 pb-2" },
            React.createElement(
              "button",
              {
                onClick: function () { setFenetreAjoutBar(true); },
                className: "w-full py-2.5 bg-neutral-800 hover:bg-neutral-700 text-white rounded-lg text-sm font-medium"
              },
              "+ Ajouter un bar"
            )
          )
        : null,

      React.createElement(
        "div",
        { className: "p-3 space-y-3" },
        bars.length === 0
          ? React.createElement(
              "div",
              { className: "text-center py-10 text-neutral-500" },
              React.createElement("p", null, "Aucun bar pour l'instant."),
              peutGererBars
                ? React.createElement("p", { className: "text-sm mt-1" },
                    "Utilisez « Ajouter un bar » pour commencer.")
                : React.createElement("p", { className: "text-sm mt-1" },
                    "Un administrateur doit créer les bars.")
            )
          : bars.map(function (bar) {
              return React.createElement(CarteBar, {
                key: bar.id,
                bar: bar,
                role: role,
                maxFuts: params.maxFutsParBar,
                prenom: prenom,
                onAttribuer: attribuerFut,
                onDemanderRetour: function (b, idFut, fut) {
                  setRetourEnCours({ bar: b, idFut: idFut, fut: fut });
                },
                onSupprimer: supprimerBar
              });
            })
      ),

      fenetreAjoutBar
        ? React.createElement(FenetreAjoutBar, {
            onConfirmer: creerBar,
            onAnnuler: function () { setFenetreAjoutBar(false); }
          })
        : null,

      retourEnCours
        ? React.createElement(FenetreRetourFut, {
            bar: retourEnCours.bar,
            idFut: retourEnCours.idFut,
            fut: retourEnCours.fut,
            onConfirmer: confirmerRetour,
            onAnnuler: function () { setRetourEnCours(null); }
          })
        : null
    );
  }

  /* =========================================================================
     SECTION 13 — COMPOSANT PRINCIPAL : L'APPLICATION
  ========================================================================= */
  function Application() {
    const [etape, setEtape] = useState("demarrage");
    const [erreur, setErreur] = useState("");
    const [prenom, setPrenom] = useState("");
    const [role, setRole] = useState(ROLES.VISITEUR);

    useEffect(function () {
      obtenirBadgeAnonyme()
        .then(function () { setEtape("accueil"); })
        .catch(function (e) {
          setErreur("L'authentification a échoué. (" + (e && e.code ? e.code : "inconnu") + ")");
          setEtape("erreur");
        });
    }, []);

    function entrerDansApp(prenomSaisi) {
      setPrenom(prenomSaisi);
      setEtape("connexion");

      const refUtilisateur = Base.utilisateur(prenomSaisi);

      /* On conserve le rôle existant si l'utilisateur revient (ne pas
         rétrograder un admin à chaque reconnexion). */
      refUtilisateur.once("value").then(function (instantane) {
        const existant = instantane.val();
        const roleConserve = (existant && existant.role) ? existant.role : ROLES.VISITEUR;

        return refUtilisateur.update({
          prenom: prenomSaisi,
          derniereConnexion: Date.now(),
          role: roleConserve
        }).then(function () {
          setRole(roleConserve);
          setEtape("pret");
        });
      }).catch(function (e) {
        setErreur("Impossible d'enregistrer la connexion. (" + (e && e.code ? e.code : "inconnu") + ")");
        setEtape("erreur");
      });
    }

    function seDeconnecter() {
      setPrenom("");
      setRole(ROLES.VISITEUR);
      setEtape("accueil");
    }

    if (etape === "erreur") return React.createElement(EcranErreur, { details: erreur });
    if (etape === "demarrage") return React.createElement(EcranChargement, { message: "Connexion sécurisée…" });
    if (etape === "connexion") return React.createElement(EcranChargement, { message: "Enregistrement…" });
    if (etape === "accueil") return React.createElement(EcranAccueil, { onEntrer: entrerDansApp });

    return React.createElement(EcranPrincipal, {
      prenom: prenom,
      role: role,
      onDeconnexion: seDeconnecter
    });
  }

  /* =========================================================================
     DÉMARRAGE
  ========================================================================= */
  ReactDOM.createRoot(document.getElementById("root")).render(
    React.createElement(Application)
  );
  </script>
</body>
