<!DOCTYPE html>
<!--
===============================================================================
  GESTION DES FÛTS - BARS NOMADES - HELLFEST
  Application reconstruite proprement (remplace la version V16-V23 minifiée).

  MODULE 1 : SQUELETTE
  Ce fichier contient pour l'instant :
    - le démarrage de l'application
    - la connexion à Firebase
    - l'authentification anonyme (le "badge" invisible qui sécurise la base)
    - l'écran d'accueil (saisie du prénom)
    - la connexion d'un utilisateur à la session unique du festival

  Ce fichier NE contient PAS encore : les fûts, les ventes, le planning,
  le dashboard. Ils seront ajoutés dans les modules 2, 3 et 4.

  PRINCIPE D'ARCHITECTURE
    - Un seul fichier HTML, comme l'ancienne app, pour rester simple à publier.
    - Mais code lisible : noms en français, sections clairement séparées,
      commentaires abondants. Pas de minification.
    - Une seule "session" pour tout le festival (pas de création/choix de
      session par l'utilisateur).
    - 4 rôles : visiteur, secretaire, admin, superadmin.
    - AUCUN mot de passe écrit dans ce fichier. Les droits viennent du rôle
      stocké dans la base Firebase, lui-même protégé par les règles serveur.

  POUR LES DÉVELOPPEURS QUI REPRENDRONT CE CODE
    Voir le document technique fourni séparément (module 6) pour l'architecture
    d'ensemble. Chaque grande section ci-dessous est encadrée par une bannière
    de commentaire.
===============================================================================
-->
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="theme-color" content="#39ff14" />
  <title>Bars Nomades — Gestion des Fûts</title>

  <!-- =======================================================================
       DÉPENDANCES EXTERNES
       React        : la bibliothèque qui construit l'interface.
       Firebase     : la base de données temps réel + l'authentification.
       Tailwind     : les styles (les classes comme "bg-black", "p-4"...).
       NOTE : on charge aussi "firebase-auth-compat", absent de l'ancienne
       app — c'est lui qui permet l'authentification.
  ======================================================================== -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>

  <style>
    * { -webkit-tap-highlight-color: transparent; }
    body { background: #000; overscroll-behavior: none; }
  </style>
</head>

<body class="bg-black">
  <!-- L'application React vient s'afficher dans cette balise. -->
  <div id="root"></div>

  <script>
  /* =========================================================================
     OUTILS RACCOURCIS REACT
     React fournit des "hooks". On leur donne ici un nom court pour alléger
     la lecture du reste du code.
       useState  : mémoriser une valeur qui peut changer (ex: le prénom saisi)
       useEffect : exécuter du code à un moment précis (ex: au démarrage)
  ========================================================================= */
  const { useState, useEffect } = React;

  /* =========================================================================
     CONFIGURATION FIREBASE
     Ces coordonnées identifient le projet Firebase "gestion-futs-hellfest".
     Ce ne sont PAS des secrets : toute app web Firebase les expose. La
     sécurité ne repose pas sur leur confidentialité, mais sur les RÈGLES
     de sécurité déposées dans la console Firebase.
  ========================================================================= */
  const firebaseConfig = {
    apiKey: "AIzaSyCgl30syyCEJif9q96E2jzv-aTXxXgvgv0",
    authDomain: "gestion-futs-hellfest.firebaseapp.com",
    databaseURL: "https://gestion-futs-hellfest-default-rtdb.europe-west1.firebasedatabase.app",
    projectId: "gestion-futs-hellfest",
    storageBucket: "gestion-futs-hellfest.firebasestorage.app",
    messagingSenderId: "107509834680",
    appId: "1:107509834680:web:3a58295d3268b5d19f654d"
  };

  /* Démarrage de Firebase. "db" = la base de données, "auth" = le service
     d'authentification. On s'en sert dans tout le reste du fichier. */
  firebase.initializeApp(firebaseConfig);
  const db = firebase.database();
  const auth = firebase.auth();

  /* =========================================================================
     CONSTANTES DE L'APPLICATION
  ========================================================================= */

  /* Identifiant de la session unique du festival. Comme il n'y a qu'une seule
     session, ce nom est fixe : toutes les données vivent sous
     sessions/festival dans la base. */
  const ID_SESSION = "festival";

  /* Les 4 rôles possibles, du moins au plus puissant. Sert de référence
     unique : tout le code se base sur ces valeurs exactes. */
  const ROLES = {
    VISITEUR: "visiteur",
    SECRETAIRE: "secretaire",
    ADMIN: "admin",
    SUPERADMIN: "superadmin"
  };

  /* Clés utilisées pour mémoriser des infos sur l'appareil de l'utilisateur
     (localStorage = petit espace de stockage propre au navigateur). Permet
     de ne pas redemander le prénom à chaque ouverture. */
  const STOCKAGE = {
    PRENOM: "barnomade_prenom"
  };

  /* =========================================================================
     SECTION 1 — AUTHENTIFICATION
     Avant toute chose, l'app obtient un "badge" anonyme auprès de Firebase.
     L'utilisateur ne voit rien : il ne saisit aucun identifiant. Mais ce
     badge donne à l'appareil une identité que les règles de sécurité
     Firebase peuvent vérifier. C'est ce qui rend la base réellement
     protégée (au lieu d'être ouverte à tous).
  ========================================================================= */

  /* Demande le badge anonyme. Renvoie une "promesse" : du code qui se
     terminera plus tard (quand Firebase aura répondu). */
  function obtenirBadgeAnonyme() {
    return auth.signInAnonymously();
  }

  /* =========================================================================
     SECTION 2 — COMPOSANT : ÉCRAN DE CHARGEMENT
     Affiché pendant que l'app obtient son badge et se prépare.
  ========================================================================= */
  function EcranChargement({ message }) {
    return React.createElement(
      "div",
      { className: "min-h-screen flex flex-col items-center justify-center bg-black text-green-400" },
      React.createElement("p", { className: "text-lg" }, "Chargement…"),
      React.createElement("p", { className: "text-xs text-neutral-500 mt-2" }, message || "")
    );
  }

  /* =========================================================================
     SECTION 3 — COMPOSANT : ÉCRAN D'ERREUR
     Affiché si quelque chose empêche l'app de démarrer (ex: pas de réseau,
     authentification refusée). On donne un message clair plutôt qu'une page
     blanche silencieuse.
  ========================================================================= */
  function EcranErreur({ details }) {
    return React.createElement(
      "div",
      { className: "min-h-screen flex flex-col items-center justify-center bg-black text-red-400 p-6 text-center" },
      React.createElement("p", { className: "text-lg font-bold mb-2" }, "Impossible de démarrer l'application"),
      React.createElement("p", { className: "text-sm text-neutral-400" }, details || "Erreur inconnue."),
      React.createElement("p", { className: "text-xs text-neutral-600 mt-4" },
        "Vérifiez votre connexion internet, puis rechargez la page.")
    );
  }

  /* =========================================================================
     SECTION 4 — COMPOSANT : ÉCRAN D'ACCUEIL
     L'utilisateur saisit son prénom (ou surnom) et entre dans l'application.
     C'est le seul écran de connexion : pas de mot de passe, pas de choix de
     session. Conforme à la décision validée.
  ========================================================================= */
  function EcranAccueil({ onEntrer }) {
    /* "prenom" mémorise ce que l'utilisateur tape dans le champ. */
    const [prenom, setPrenom] = useState("");

    /* Au premier affichage, on pré-remplit le champ si un prénom a déjà été
       utilisé sur cet appareil (confort : éviter de retaper). */
    useEffect(function () {
      const memorise = localStorage.getItem(STOCKAGE.PRENOM);
      if (memorise) setPrenom(memorise);
    }, []);

    /* Quand l'utilisateur valide. On vérifie que le champ n'est pas vide. */
    function valider() {
      const valeur = prenom.trim();
      if (!valeur) return;            // champ vide : on ne fait rien
      localStorage.setItem(STOCKAGE.PRENOM, valeur);
      onEntrer(valeur);               // on transmet le prénom à l'app
    }

    return React.createElement(
      "div",
      { className: "min-h-screen flex items-center justify-center bg-black p-4" },
      React.createElement(
        "div",
        { className: "w-full max-w-sm" },

        /* Titre */
        React.createElement(
          "div",
          { className: "text-center mb-8" },
          React.createElement("h1", { className: "text-2xl font-bold text-white" }, "Bars Nomades"),
          React.createElement("p", { className: "text-green-400 font-bold mt-1" }, "Gestion des Fûts")
        ),

        /* Champ prénom */
        React.createElement(
          "div",
          { className: "space-y-4" },
          React.createElement("label", { className: "block text-neutral-400 text-sm" }, "Ton prénom ou surnom"),
          React.createElement("input", {
            type: "text",
            value: prenom,
            onChange: function (e) { setPrenom(e.target.value); },
            onKeyDown: function (e) { if (e.key === "Enter") valider(); },
            placeholder: "Ex : Kevin",
            className: "w-full px-4 py-3 bg-neutral-900 border border-neutral-700 rounded-xl text-white text-lg",
            autoFocus: true
          }),
          React.createElement(
            "button",
            {
              onClick: valider,
              className: "w-full py-4 bg-red-600 hover:bg-red-700 text-white rounded-xl font-bold text-lg transition-colors"
            },
            "Entrer"
          )
        )
      )
    );
  }

  /* =========================================================================
     SECTION 5 — COMPOSANT : ÉCRAN PRINCIPAL (PROVISOIRE)
     Affiché une fois l'utilisateur connecté. Pour l'instant il ne montre que
     des informations de contrôle. Le vrai contenu (fûts, ventes, planning)
     sera ajouté aux modules suivants.
  ========================================================================= */
  function EcranPrincipal({ prenom, role, onDeconnexion }) {
    return React.createElement(
      "div",
      { className: "min-h-screen bg-black text-white p-4" },

      React.createElement("h1", { className: "text-xl font-bold text-green-400" }, "Bars Nomades"),

      React.createElement(
        "div",
        { className: "mt-6 p-4 bg-neutral-900 rounded-xl border border-neutral-700" },
        React.createElement("p", { className: "text-sm text-neutral-400" }, "Connecté en tant que"),
        React.createElement("p", { className: "text-lg text-white font-medium" }, prenom),
        React.createElement("p", { className: "text-sm text-neutral-400 mt-3" }, "Rôle attribué"),
        React.createElement("p", { className: "text-lg text-green-300 font-medium" }, role)
      ),

      React.createElement(
        "div",
        { className: "mt-6 p-4 bg-neutral-900 rounded-xl border border-dashed border-neutral-700 text-center" },
        React.createElement("p", { className: "text-neutral-500" }, "L'écran principal est en construction."),
        React.createElement("p", { className: "text-neutral-600 text-sm mt-1" },
          "Fûts, ventes et planning seront ajoutés aux prochaines étapes.")
      ),

      React.createElement(
        "button",
        {
          onClick: onDeconnexion,
          className: "mt-6 w-full py-3 bg-neutral-800 hover:bg-neutral-700 text-neutral-300 rounded-xl"
        },
        "Se déconnecter"
      )
    );
  }

  /* =========================================================================
     SECTION 6 — COMPOSANT PRINCIPAL : L'APPLICATION
     C'est le chef d'orchestre. Il gère les grandes étapes :
       1. obtenir le badge anonyme
       2. afficher l'accueil tant que l'utilisateur n'est pas entré
       3. une fois le prénom saisi, l'enregistrer dans la base et lui
          attribuer un rôle
       4. afficher l'écran principal
  ========================================================================= */
  function Application() {

    /* "etape" décrit où en est l'application :
         "demarrage"  : on obtient le badge
         "accueil"    : on attend que l'utilisateur saisisse son prénom
         "connexion"  : on enregistre l'utilisateur dans la base
         "pret"       : l'utilisateur est entré, on affiche l'écran principal
         "erreur"     : quelque chose a échoué */
    const [etape, setEtape] = useState("demarrage");

    /* Détail d'erreur éventuel, affiché par l'écran d'erreur. */
    const [erreur, setErreur] = useState("");

    /* Le prénom de l'utilisateur, une fois saisi. */
    const [prenom, setPrenom] = useState("");

    /* Le rôle de l'utilisateur. Par défaut "visiteur" : c'est le rôle de
       quiconque ouvre l'application sans invitation particulière. */
    const [role, setRole] = useState(ROLES.VISITEUR);

    /* ---- ÉTAPE 1 : obtenir le badge anonyme, une seule fois au démarrage. */
    useEffect(function () {
      obtenirBadgeAnonyme()
        .then(function () {
          /* Badge obtenu : on passe à l'écran d'accueil. */
          setEtape("accueil");
        })
        .catch(function (e) {
          /* Échec : souvent pas de réseau, ou domaine non autorisé dans
             la console Firebase. On affiche un écran d'erreur clair. */
          setErreur("L'authentification a échoué. (" + (e && e.code ? e.code : "inconnu") + ")");
          setEtape("erreur");
        });
    }, []);

    /* ---- ÉTAPE 3 : appelée quand l'utilisateur valide son prénom.
       On enregistre l'utilisateur dans la base, sous
       sessions/festival/users/<prenom>, avec la date de connexion.
       Le rôle, lui, sera déterminé proprement au module suivant ; pour
       l'instant tout le monde entre en "visiteur". */
    function entrerDansApp(prenomSaisi) {
      setPrenom(prenomSaisi);
      setEtape("connexion");

      const referenceUtilisateur = db.ref(
        "sessions/" + ID_SESSION + "/users/" + prenomSaisi
      );

      /* On écrit les informations de l'utilisateur dans la base. */
      referenceUtilisateur
        .update({
          prenom: prenomSaisi,
          derniereConnexion: Date.now(),
          role: ROLES.VISITEUR
        })
        .then(function () {
          setRole(ROLES.VISITEUR);
          setEtape("pret");
        })
        .catch(function (e) {
          setErreur("Impossible d'enregistrer la connexion. (" + (e && e.code ? e.code : "inconnu") + ")");
          setEtape("erreur");
        });
    }

    /* ---- Déconnexion : on revient à l'écran d'accueil. */
    function seDeconnecter() {
      setPrenom("");
      setRole(ROLES.VISITEUR);
      setEtape("accueil");
    }

    /* ---- AFFICHAGE selon l'étape en cours. */
    if (etape === "erreur") {
      return React.createElement(EcranErreur, { details: erreur });
    }
    if (etape === "demarrage") {
      return React.createElement(EcranChargement, { message: "Connexion sécurisée…" });
    }
    if (etape === "connexion") {
      return React.createElement(EcranChargement, { message: "Enregistrement…" });
    }
    if (etape === "accueil") {
      return React.createElement(EcranAccueil, { onEntrer: entrerDansApp });
    }
    /* étape === "pret" */
    return React.createElement(EcranPrincipal, {
      prenom: prenom,
      role: role,
      onDeconnexion: seDeconnecter
    });
  }

  /* =========================================================================
     DÉMARRAGE
     On affiche le composant Application dans la balise <div id="root">.
  ========================================================================= */
  ReactDOM.createRoot(document.getElementById("root")).render(
    React.createElement(Application)
  );
  </script>
</body>
</html>
