                      })
                    )
                  );
                })
              )
      ),

      /* Fenêtre de détail de case. */
      detailCase
        ? React.createElement(FenetreDetailCase, {
            bar: detailCase.bar,
            creneau: detailCase.creneau,
            uneCase: caseDetailActuelle,
            role: role,
            jourActuel: jourActuel,
            prenom: prenom,
            onDemanderSaisie: function (bar, creneau) {
              setSaisieEnCours({ bar: bar, creneau: creneau });
            },
            onFermer: function () { setDetailCase(null); }
          })
        : null,

      /* Fenêtre de saisie d'une vente. */
      saisieEnCours
        ? React.createElement(FenetreSaisieVente, {
            bar: saisieEnCours.bar,
            creneau: saisieEnCours.creneau,
            onConfirmer: enregistrerSaisie,
            onAnnuler: function () { setSaisieEnCours(null); }
          })
        : null
    );
  }

  /* =========================================================================
     SECTION 14quater — FENÊTRE DE PARAMÈTRES (module paramètres)
     Réservée admin/super admin. Permet de régler :
       - nombre de jours du festival
       - max fûts par bar
       - prix pinte, pichet, gobelet
       - volume fût bière, volume fût cidre
       - stock initial bière, stock initial cidre

     ALERTES :
       - modifier stock initial APRÈS attribution de fûts -> confirmation
         demandée (impacte le stock affiché rétroactivement).
       - modifier le nombre de jours en abaissant la valeur ALORS que des
         données existent dans les jours qui seraient "perdus" -> alerte.
  ========================================================================= */
  function FenetreParametres({ params, bars, historique, casesVentesTousJours, onFermer }) {
    /* Pour chaque paramètre, on garde une copie locale en texte (édition).
       On ne sauvegarde dans la base qu'au clic sur "Enregistrer". */
    const [nombreJours, setNombreJours] = useState(String(params.nombreJours));
    const [maxFutsParBar, setMaxFutsParBar] = useState(String(params.maxFutsParBar));
    const [prixPinte, setPrixPinte] = useState(String(params.prixPinte));
    const [prixPichet, setPrixPichet] = useState(String(params.prixPichet));
    const [prixGobelet, setPrixGobelet] = useState(String(params.prixGobelet));
    const [volumeFutBiere, setVolumeFutBiere] = useState(String(params.volumeFutBiere));
    const [volumeFutCidre, setVolumeFutCidre] = useState(String(params.volumeFutCidre));
    const [stockInitialBiere, setStockInitialBiere] = useState(String(params.stockInitialBiere));
    const [stockInitialCidre, setStockInitialCidre] = useState(String(params.stockInitialCidre));
    /* Volumes de service et seuil de tolérance (ajoutés au module paramètres). */
    const [volumePinte, setVolumePinte] = useState(String(params.volumePinte));
    const [volumePichet, setVolumePichet] = useState(String(params.volumePichet));
    const [seuilTolerancePerte, setSeuilTolerancePerte] = useState(String(params.seuilTolerancePerte));

    function versNombre(texte) {
      const n = parseFloat((texte || "").replace(",", "."));
      return isNaN(n) ? 0 : n;
    }
    function versEntier(texte) {
      const n = parseInt(texte, 10);
      return isNaN(n) ? 0 : n;
    }

    /* Renvoie true si des fûts ont déjà été attribués (= il y a au moins un
       mouvement d'attribution dans l'historique). Sert d'alerte pour les
       changements de stock initial. */
    function desFutsOntEteAttribues() {
      return historique.some(function (mvt) {
        return mvt.mouvement === "attribution";
      });
    }

    /* Renvoie le numéro maximum de jour pour lequel des données existent
       (ventes saisies ou créneaux définis). Sert d'alerte avant de réduire
       le nombre de jours. */
    function jourMaxAvecDonnees() {
      let max = 0;
      Object.keys(casesVentesTousJours || {}).forEach(function (cleJour) {
        /* Les clés sont du genre "jour3" -> on extrait le numéro. */
        const m = cleJour.match(/^jour(\d+)$/);
        if (m) {
          const n = parseInt(m[1], 10);
          if (n > max) max = n;
        }
      });
      return max;
    }

    function enregistrer() {
      const nj = versEntier(nombreJours);
      const mfpb = versEntier(maxFutsParBar);
      const pp = versNombre(prixPinte);
      const ppi = versNombre(prixPichet);
      const pg = versNombre(prixGobelet);
      const vfb = versNombre(volumeFutBiere);
      const vfc = versNombre(volumeFutCidre);
      const sib = versEntier(stockInitialBiere);
      const sic = versEntier(stockInitialCidre);
      const vp = versNombre(volumePinte);
      const vpi = versNombre(volumePichet);
      const stp = versNombre(seuilTolerancePerte);

      /* ----- Garde-fous numériques ----- */
      if (nj < 1) { alert("Le nombre de jours doit être au moins 1."); return; }
      if (mfpb < 1) { alert("Le maximum de fûts par bar doit être au moins 1."); return; }
      if (pp < 0 || ppi < 0 || pg < 0) { alert("Les prix ne peuvent pas être négatifs."); return; }
      if (vfb <= 0 || vfc <= 0) { alert("Les volumes de fûts doivent être supérieurs à 0."); return; }
      if (vp <= 0 || vpi <= 0) { alert("Les volumes pinte et pichet doivent être supérieurs à 0."); return; }
      if (stp < 0 || stp > 100) { alert("Le seuil de tolérance doit être compris entre 0 et 100 %."); return; }
      if (sib < 0 || sic < 0) { alert("Le stock initial ne peut pas être négatif."); return; }

      /* ----- Alerte rétroactive : changement de stock initial ----- */
      const stockBiereChange = sib !== params.stockInitialBiere;
      const stockCidreChange = sic !== params.stockInitialCidre;
      if ((stockBiereChange || stockCidreChange) && desFutsOntEteAttribues()) {
        const message = "Attention : des fûts ont déjà été attribués.\n\n" +
          "Modifier le stock initial va recalculer le stock affiché de façon " +
          "rétroactive (le stock restant changera).\n\n" +
          "Confirmer la modification ?";
        if (!confirm(message)) return;
      }

      /* ----- Alerte : réduction du nombre de jours avec données ----- */
      const jMax = jourMaxAvecDonnees();
      if (nj < params.nombreJours && jMax > nj) {
        const message = "Attention : vous réduisez le nombre de jours à " + nj +
          ", mais des données de vente existent jusqu'au jour " + jMax + ".\n\n" +
          "Les jours " + (nj + 1) + " à " + jMax + " ne seront plus accessibles " +
          "depuis le sélecteur (mais leurs données ne sont PAS effacées).\n\n" +
          "Continuer ?";
        if (!confirm(message)) return;
      }

      /* ----- Sauvegarde en base ----- */
      ActionsParams.sauvegarderTout({
        nombreJours: nj,
        maxFutsParBar: mfpb,
        prixPinte: pp,
        prixPichet: ppi,
        prixGobelet: pg,
        volumeFutBiere: vfb,
        volumeFutCidre: vfc,
        stockInitialBiere: sib,
        stockInitialCidre: sic,
        volumePinte: vp,
        volumePichet: vpi,
        seuilTolerancePerte: stp
      }).then(function () {
        onFermer();
      }).catch(function (e) {
        alert("Erreur lors de la sauvegarde : " + e.message);
      });
    }

    /* Petit champ de saisie réutilisable. */
    function champ(libelle, valeur, onChange, suffixe, type) {
      return React.createElement(
        "div",
        { className: "flex items-center justify-between gap-2 py-1" },
        React.createElement("label", { className: "text-sm text-neutral-300 flex-1" }, libelle),
        React.createElement(
          "div",
          { className: "flex items-center gap-1" },
          React.createElement("input", {
            type: type || "number",
            inputMode: type === "number" ? "decimal" : "text",
            value: valeur,
            onChange: function (e) { onChange(e.target.value); },
            className: "w-20 px-2 py-1 bg-neutral-800 rounded text-white text-sm text-right"
          }),
          suffixe
            ? React.createElement("span", { className: "text-xs text-neutral-500 w-6" }, suffixe)
            : null
        )
      );
    }

    return React.createElement(
      "div",
      { className: "fixed inset-0 bg-black/80 flex items-center justify-center p-4 z-50" },
      React.createElement(
        "div",
        { className: "bg-neutral-900 rounded-2xl w-full max-w-md p-6 max-h-[90vh] overflow-y-auto" },

        React.createElement("h3", { className: "text-xl font-bold text-white mb-4" }, "Paramètres"),

        /* Bloc Festival. */
        React.createElement(
          "div",
          { className: "mb-4" },
          React.createElement("p", { className: "text-xs text-neutral-500 mb-1 uppercase" }, "Festival"),
          champ("Nombre de jours", nombreJours, setNombreJours, "j", "number"),
          champ("Max fûts par bar", maxFutsParBar, setMaxFutsParBar, "", "number")
        ),

        /* Bloc Stock initial. */
        React.createElement(
          "div",
          { className: "mb-4 pt-3 border-t border-neutral-800" },
          React.createElement("p", { className: "text-xs text-neutral-500 mb-1 uppercase" }, "Stock initial"),
          champ("Bière", stockInitialBiere, setStockInitialBiere, "fûts", "number"),
          champ("Cidre", stockInitialCidre, setStockInitialCidre, "fûts", "number")
        ),

        /* Bloc Volumes. */
        React.createElement(
          "div",
          { className: "mb-4 pt-3 border-t border-neutral-800" },
          React.createElement("p", { className: "text-xs text-neutral-500 mb-1 uppercase" }, "Volume d'un fût"),
          champ("Bière", volumeFutBiere, setVolumeFutBiere, "L", "number"),
          champ("Cidre", volumeFutCidre, setVolumeFutCidre, "L", "number")
        ),

        /* Bloc Volume d'un service. Sert au contrôle de cohérence
           (volume sorti en fûts vs volume vendu en pintes/pichets). */
        React.createElement(
          "div",
          { className: "mb-4 pt-3 border-t border-neutral-800" },
          React.createElement("p", { className: "text-xs text-neutral-500 mb-1 uppercase" }, "Volume d'un service"),
          champ("Pinte", volumePinte, setVolumePinte, "cl", "number"),
          champ("Pichet", volumePichet, setVolumePichet, "cl", "number"),
          React.createElement("p", { className: "text-xs text-neutral-600 mt-2 italic" },
            "Le gobelet est un consommable vendu à part, sans volume de boisson.")
        ),

        /* Bloc Prix. */
        React.createElement(
          "div",
          { className: "mb-4 pt-3 border-t border-neutral-800" },
          React.createElement("p", { className: "text-xs text-neutral-500 mb-1 uppercase" }, "Prix unitaires"),
          champ("Pinte", prixPinte, setPrixPinte, "€", "number"),
          champ("Pichet", prixPichet, setPrixPichet, "€", "number"),
          champ("Gobelet", prixGobelet, setPrixGobelet, "€", "number"),
          React.createElement("p", { className: "text-xs text-neutral-600 mt-2 italic" },
            "Décision validée : modifier un prix après que des ventes ont été " +
            "saisies fausse les calculs théoriques d'écart. À éviter en cours de festival.")
        ),

        /* Bloc Cohérence. Seuil au-delà duquel le dashboard signalera
           un bar comme suspect (perte de volume dépassant la tolérance). */
        React.createElement(
          "div",
          { className: "mb-5 pt-3 border-t border-neutral-800" },
          React.createElement("p", { className: "text-xs text-neutral-500 mb-1 uppercase" }, "Cohérence"),
          champ("Seuil de tolérance de perte", seuilTolerancePerte, setSeuilTolerancePerte, "%", "number"),
          React.createElement("p", { className: "text-xs text-neutral-600 mt-2 italic" },
            "Utilisé dans le dashboard : un bar dépassant ce pourcentage de perte " +
            "(volume sorti vs vendu) sera signalé. Typiquement entre 5 et 10 %.")
        ),

        /* Boutons. */
        React.createElement(
          "div",
          { className: "flex gap-2" },
          React.createElement(
            "button",
            { onClick: onFermer, className: "flex-1 py-3 bg-neutral-700 text-white rounded-lg" },
            "Annuler"
          ),
          React.createElement(
            "button",
            { onClick: enregistrer, className: "flex-1 py-3 bg-emerald-600 text-white rounded-lg font-medium" },
            "Enregistrer"
          )
        )
      )
    );
  }

  /* =========================================================================
     SECTION 15 — ÉCRAN PRINCIPAL
  ========================================================================= */
  function EcranPrincipal({ prenom, role, onDeconnexion }) {
    const [bars, setBars] = useState([]);
    const [historique, setHistorique] = useState([]);
    const [params, setParams] = useState(PARAMS_DEFAUT);
    const [jourActuel, setJourActuel] = useState(1);
    const [creneaux, setCreneaux] = useState({});
    const [fenetreAjoutBar, setFenetreAjoutBar] = useState(false);
    const [retourEnCours, setRetourEnCours] = useState(null);
    const [fenetreCreneaux, setFenetreCreneaux] = useState(false);
    const [casesVentes, setCasesVentes] = useState({});
    const [ecranVentes, setEcranVentes] = useState(false);
    const [fenetreParams, setFenetreParams] = useState(false);
    /* Toutes les ventes du festival, tous jours confondus. Sert
       UNIQUEMENT à la fenêtre paramètres pour détecter les jours
       qui contiennent déjà des données (alerte avant réduction du
       nombre de jours). */
    const [casesVentesTousJours, setCasesVentesTousJours] = useState({});

    const peutGererBars = Droits.peutGererBars(role);
    const peutGererParams = Droits.peutGererParams(role);

    /* Abonnement temps réel : bars, historique, params, jour actif. */
    useEffect(function () {
      const refBars = Base.bars();
      const refHisto = Base.historiqueFuts();
      const refParams = Base.params();
      const refJour = Base.jourActuel();

      function surBars(s) {
        const v = s.val() || {};
        setBars(Object.keys(v).map(function (id) { return Object.assign({ id: id }, v[id]); }));
      }
      function surHisto(s) {
        const v = s.val() || {};
        setHistorique(Object.keys(v).map(function (cle) { return v[cle]; }));
      }
      function surParams(s) {
        const v = s.val();
        /* On fusionne avec les valeurs par défaut : si un paramètre manque
           en base, on garde la valeur par défaut. */
        if (v) setParams(Object.assign({}, PARAMS_DEFAUT, v));
      }
      function surJour(s) {
        const v = s.val();
        if (v) setJourActuel(v);
      }

      refBars.on("value", surBars);
      refHisto.on("value", surHisto);
      refParams.on("value", surParams);
      refJour.on("value", surJour);

      return function () {
        refBars.off("value", surBars);
        refHisto.off("value", surHisto);
        refParams.off("value", surParams);
        refJour.off("value", surJour);
      };
    }, []);

    /* Abonnement aux créneaux : dépend du jour actif, donc recalculé à
       chaque changement de jour. */
    useEffect(function () {
      const refCreneaux = Base.creneauxDuJour(jourActuel);
      function surCreneaux(s) {
        setCreneaux(s.val() || {});
      }
      refCreneaux.on("value", surCreneaux);
      return function () {
        refCreneaux.off("value", surCreneaux);
      };
    }, [jourActuel]);

    /* Abonnement aux cases de ventes du jour actif (module 3B). */
    useEffect(function () {
      const refVentes = Base.casesVentesDuJour(jourActuel);
      function surVentes(s) {
        setCasesVentes(s.val() || {});
      }
      refVentes.on("value", surVentes);
      return function () {
        refVentes.off("value", surVentes);
      };
    }, [jourActuel]);

    /* Abonnement aux ventes TOUS JOURS confondus.
       Utilisé uniquement par la fenêtre paramètres pour détecter les jours
       contenant des données (alerte avant réduction du nombre de jours). */
    useEffect(function () {
      const ref = db.ref("sessions/" + ID_SESSION + "/ventes");
      function surTout(s) {
        setCasesVentesTousJours(s.val() || {});
      }
      ref.on("value", surTout);
      return function () {
        ref.off("value", surTout);
      };
    }, []);

    const stock = calculerStock(historique, params);

    function creerBar(nom, type) {
      ActionsBars.creer(nom, type)
        .then(function () { setFenetreAjoutBar(false); })
        .catch(function (e) { alert(e.message); });
    }

    function supprimerBar(bar) {
      if (!confirm("Supprimer le bar « " + bar.nom + " » ?")) return;
      ActionsBars.supprimer(bar).catch(function (e) { alert(e.message); });
    }

    function attribuerFut(bar) {
      const stockDispo = bar.type === TYPE_BAR.BIERE ? stock.biere : stock.cidre;
      if (stockDispo <= 0) {
        alert("Stock épuisé pour ce type de boisson.");
        return;
      }
      ActionsFuts.attribuer(bar, bar.type, params.maxFutsParBar, prenom)
        .catch(function (e) { alert(e.message); });
    }

    function confirmerRetour(motif, commentaire) {
      const r = retourEnCours;
      ActionsFuts.retourner(r.bar, r.idFut, r.fut, motif, commentaire, prenom)
        .then(function () { setRetourEnCours(null); })
        .catch(function (e) { alert(e.message); });
    }

    function changerJour(nouveauJour) {
      if (nouveauJour < 1 || nouveauJour > params.nombreJours) return;
      ActionsCreneaux.definirJourActuel(nouveauJour)
        .catch(function (e) { alert(e.message); });
    }

    /* Nombre de créneaux du jour, pour l'affichage d'information. */
    const nbCreneaux = Object.keys(creneaux).length;

    return React.createElement(
      "div",
      { className: "min-h-screen bg-black text-white" },

      /* Bandeau du haut. */
      React.createElement(
        "div",
        { className: "p-4 border-b border-neutral-800 flex items-center justify-between" },
        React.createElement(
          "div",
          null,
          React.createElement("h1", { className: "text-lg font-bold text-green-400" }, "Bars Nomades"),
          React.createElement("p", { className: "text-xs text-neutral-500" }, prenom + " — " + role)
        ),
        React.createElement(
          "button",
          {
            onClick: onDeconnexion,
            className: "text-xs px-3 py-1.5 bg-neutral-800 text-neutral-300 rounded-lg"
          },
          "Quitter"
        )
      ),

      /* Bandeau du jour. */
      React.createElement(BandeauJour, {
        jourActuel: jourActuel,
        nombreJours: params.nombreJours,
        role: role,
        onChangerJour: changerJour,
        onOuvrirCreneaux: function () { setFenetreCreneaux(true); },
        onOuvrirParams: function () { setFenetreParams(true); }
      }),

      /* Information sur les créneaux du jour. */
      React.createElement(
        "div",
        { className: "px-3 py-2 text-xs " +
            (nbCreneaux === 0 ? "text-amber-400" : "text-neutral-500") },
        nbCreneaux === 0
          ? "Aucun créneau défini pour le jour " + jourActuel +
            (Droits.peutGererCreneaux(role)
              ? " — utilisez « Créneaux du jour » pour les créer."
              : " — le super admin doit les configurer.")
          : nbCreneaux + " créneau(x) défini(s) pour le jour " + jourActuel
      ),

      /* Bandeau de stock. */
      React.createElement(
        "div",
        { className: "grid grid-cols-2 gap-2 p-3" },
        React.createElement(
          "div",
          { className: "bg-amber-950/40 border border-amber-800 rounded-lg p-3 text-center" },
          React.createElement("div", { className: "text-2xl font-bold text-amber-400" }, stock.biere),
          React.createElement("div", { className: "text-xs text-amber-200" }, "Fûts bière en stock")
        ),
        React.createElement(
          "div",
          { className: "bg-green-950/40 border border-green-800 rounded-lg p-3 text-center" },
          React.createElement("div", { className: "text-2xl font-bold text-green-400" }, stock.cidre),
          React.createElement("div", { className: "text-xs text-green-200" }, "Fûts cidre en stock")
        )
      ),

      /* Bouton d'ajout de bar (admin et plus). */
      peutGererBars
        ? React.createElement(
            "div",
            { className: "px-3 pb-2" },
            React.createElement(
              "button",
              {
                onClick: function () { setFenetreAjoutBar(true); },
                className: "w-full py-2.5 bg-neutral-800 hover:bg-neutral-700 text-white rounded-lg text-sm font-medium"
              },
              "+ Ajouter un bar"
            )
          )
        : null,

      /* Bouton Saisie des ventes (secrétaire et plus). */
      Droits.peutSaisirVentes(role)
        ? React.createElement(
            "div",
            { className: "px-3 pb-2" },
            React.createElement(
              "button",
              {
                onClick: function () { setEcranVentes(true); },
                className: "w-full py-2.5 bg-emerald-800 hover:bg-emerald-700 text-white rounded-lg text-sm font-medium"
              },
              "Saisie des ventes"
            )
          )
        : null,

      /* Liste des bars. */
      React.createElement(
        "div",
        { className: "p-3 space-y-3" },
        bars.length === 0
          ? React.createElement(
              "div",
              { className: "text-center py-10 text-neutral-500" },
              React.createElement("p", null, "Aucun bar pour l'instant."),
              peutGererBars
                ? React.createElement("p", { className: "text-sm mt-1" },
                    "Utilisez « Ajouter un bar » pour commencer.")
                : React.createElement("p", { className: "text-sm mt-1" },
                    "Un administrateur doit créer les bars.")
            )
          : bars.map(function (bar) {
              return React.createElement(CarteBar, {
                key: bar.id,
                bar: bar,
                role: role,
                maxFuts: params.maxFutsParBar,
                prenom: prenom,
                onAttribuer: attribuerFut,
                onDemanderRetour: function (b, idFut, fut) {
                  setRetourEnCours({ bar: b, idFut: idFut, fut: fut });
                },
                onSupprimer: supprimerBar
              });
            })
      ),

      /* Fenêtres. */
      fenetreAjoutBar
        ? React.createElement(FenetreAjoutBar, {
            onConfirmer: creerBar,
            onAnnuler: function () { setFenetreAjoutBar(false); }
          })
        : null,

      retourEnCours
        ? React.createElement(FenetreRetourFut, {
            bar: retourEnCours.bar,
            idFut: retourEnCours.idFut,
            fut: retourEnCours.fut,
            onConfirmer: confirmerRetour,
            onAnnuler: function () { setRetourEnCours(null); }
          })
        : null,

      fenetreCreneaux
        ? React.createElement(FenetreCreneaux, {
            jourActuel: jourActuel,
            nombreJours: params.nombreJours,
            creneaux: creneaux,
            onFermer: function () { setFenetreCreneaux(false); }
          })
        : null,

      /* Écran de saisie des ventes (plein écran). */
      ecranVentes
        ? React.createElement(EcranVentes, {
            prenom: prenom,
            role: role,
            jourActuel: jourActuel,
            bars: bars,
            creneaux: creneaux,
            casesVentes: casesVentes,
            onFermer: function () { setEcranVentes(false); }
          })
        : null,

      /* Fenêtre paramètres (admin et plus). */
      fenetreParams
        ? React.createElement(FenetreParametres, {
            params: params,
            bars: bars,
            historique: historique,
            casesVentesTousJours: casesVentesTousJours,
            onFermer: function () { setFenetreParams(false); }
          })
        : null
    );
  }

  /* =========================================================================
     SECTION 16 — COMPOSANT PRINCIPAL : L'APPLICATION
  ========================================================================= */
  function Application() {
    const [etape, setEtape] = useState("demarrage");
    const [erreur, setErreur] = useState("");
    const [prenom, setPrenom] = useState("");
    const [role, setRole] = useState(ROLES.VISITEUR);

    useEffect(function () {
      obtenirBadgeAnonyme()
        .then(function () { setEtape("accueil"); })
        .catch(function (e) {
          setErreur("L'authentification a échoué. (" + (e && e.code ? e.code : "inconnu") + ")");
          setEtape("erreur");
        });
    }, []);

    function entrerDansApp(prenomSaisi) {
      setPrenom(prenomSaisi);
      setEtape("connexion");
      const refUtilisateur = Base.utilisateur(prenomSaisi);
      refUtilisateur.once("value").then(function (instantane) {
        const existant = instantane.val();
        const roleConserve = (existant && existant.role) ? existant.role : ROLES.VISITEUR;
        return refUtilisateur.update({
          prenom: prenomSaisi,
          derniereConnexion: Date.now(),
          role: roleConserve
        }).then(function () {
          setRole(roleConserve);
          setEtape("pret");
        });
      }).catch(function (e) {
        setErreur("Impossible d'enregistrer la connexion. (" + (e && e.code ? e.code : "inconnu") + ")");
        setEtape("erreur");
      });
    }

    function seDeconnecter() {
      setPrenom("");
      setRole(ROLES.VISITEUR);
      setEtape("accueil");
    }

    if (etape === "erreur") return React.createElement(EcranErreur, { details: erreur });
    if (etape === "demarrage") return React.createElement(EcranChargement, { message: "Connexion sécurisée…" });
    if (etape === "connexion") return React.createElement(EcranChargement, { message: "Enregistrement…" });
    if (etape === "accueil") return React.createElement(EcranAccueil, { onEntrer: entrerDansApp });

    return React.createElement(EcranPrincipal, {
      prenom: prenom,
      role: role,
      onDeconnexion: seDeconnecter
    });
  }

  /* =========================================================================
     DÉMARRAGE
  ========================================================================= */
  ReactDOM.createRoot(document.getElementById("root")).render(
    React.createElement(Application)
  );
  </script>
</body>
