        React.createElement("span", { className: "text-xs text-neutral-500" }, "/ " + nombreJours)
      ),

      /* Boutons à droite : Paramètres (admin+) et Créneaux (super admin). */
      React.createElement(
        "div",
        { className: "flex items-center gap-2" },
        peutGererParams
          ? React.createElement(
              "button",
              {
                onClick: onOuvrirParams,
                className: "text-xs px-3 py-1.5 bg-neutral-800 text-neutral-200 rounded-lg"
              },
              "Paramètres"
            )
          : null,
        peutGererCreneaux
          ? React.createElement(
              "button",
              {
                onClick: onOuvrirCreneaux,
                className: "text-xs px-3 py-1.5 bg-neutral-800 text-neutral-200 rounded-lg"
              },
              "Créneaux"
            )
          : null
      )
    );
  }

  /* =========================================================================
     SECTION 14bis — FENÊTRE DE SAISIE D'UNE VENTE (module 3B-1)
     S'ouvre quand on clique sur une case bar+créneau du tableau.
     En 3B-1 : cas simple uniquement (PAD OK). On saisit montant + quantités.
  ========================================================================= */
  function FenetreSaisieVente({ bar, creneau, onConfirmer, onAnnuler }) {
    /* Champs de saisie. Gardés en texte, convertis à la validation. */
    const [montant, setMontant] = useState("");
    const [pintes, setPintes] = useState("");
    const [pichets, setPichets] = useState("");
    const [gobelets, setGobelets] = useState("");
    const [commentaire, setCommentaire] = useState("");

    /* État PAD (module 3B-2). */
    const [padEnDefaut, setPadEnDefaut] = useState(false);
    const [numeroPad, setNumeroPad] = useState("");
    const [donneesPartielles, setDonneesPartielles] = useState(false);

    function versNombre(texte) {
      const n = parseFloat((texte || "").replace(",", "."));
      return isNaN(n) ? 0 : n;
    }
    function versEntier(texte) {
      const n = parseInt(texte, 10);
      return isNaN(n) ? 0 : n;
    }

    function confirmer() {
      const m = versNombre(montant);
      const p = versEntier(pintes);
      const pi = versEntier(pichets);
      const g = versEntier(gobelets);

      /* Pas de nombres négatifs. */
      if (m < 0 || p < 0 || pi < 0 || g < 0) {
        alert("Les valeurs ne peuvent pas être négatives.");
        return;
      }

      if (padEnDefaut) {
        /* PAD en panne : le numéro de PAD est obligatoire. */
        if (!numeroPad.trim()) {
          alert("Indiquez le numéro du PAD en panne.");
          return;
        }
        /* Si données partielles : il faut au moins une valeur récupérée. */
        if (donneesPartielles && m <= 0 && p <= 0 && pi <= 0 && g <= 0) {
          alert("Données partielles : saisissez au moins une valeur récupérée.");
          return;
        }
        /* Si données NON partielles (perdues) : on force tout à zéro,
           on ne garde que le numéro de PAD et le commentaire. */
        const donneesPerdues = !donneesPartielles;
        onConfirmer({
          montant: donneesPerdues ? 0 : m,
          nbPintes: donneesPerdues ? 0 : p,
          nbPichets: donneesPerdues ? 0 : pi,
          nbGobelets: donneesPerdues ? 0 : g,
          commentaire: commentaire,
          padEnDefaut: true,
          numeroPad: numeroPad,
          donneesPartielles: donneesPartielles
        });
        return;
      }

      /* Cas normal (PAD OK) : au moins une valeur. */
      if (m <= 0 && p <= 0 && pi <= 0 && g <= 0) {
        alert("Saisissez au moins un montant ou une quantité.");
        return;
      }
      onConfirmer({
        montant: m,
        nbPintes: p,
        nbPichets: pi,
        nbGobelets: g,
        commentaire: commentaire,
        padEnDefaut: false,
        numeroPad: "",
        donneesPartielles: false
      });
    }

    /* Champ numérique réutilisable. */
    function champNombre(libelle, valeur, onChange) {
      return React.createElement(
        "div",
        null,
        React.createElement("label", { className: "block text-xs text-neutral-400 mb-1" }, libelle),
        React.createElement("input", {
          type: "number",
          inputMode: "decimal",
          value: valeur,
          onChange: function (e) { onChange(e.target.value); },
          className: "w-full px-3 py-2 bg-neutral-800 rounded-lg text-white text-sm",
          placeholder: "0"
        })
      );
    }

    /* Faut-il afficher les champs montant/quantités ?
       - Cas normal : oui.
       - PAD en panne + données partielles : oui (on saisit ce qu'on a).
       - PAD en panne + données perdues : non (rien à saisir). */
    const afficherChampsChiffres = !padEnDefaut || donneesPartielles;

    return React.createElement(
      "div",
      { className: "fixed inset-0 bg-black/80 flex items-center justify-center p-4 z-50" },
      React.createElement(
        "div",
        { className: "bg-neutral-900 rounded-2xl w-full max-w-sm p-6 max-h-[90vh] overflow-y-auto" },

        React.createElement("h3", { className: "text-xl font-bold text-white mb-1" }, "Saisie d'une vente"),
        React.createElement("p", { className: "text-neutral-400 text-sm mb-4" },
          bar.nom + " — " + creneau.libelle),

        /* Case PAD en panne. */
        React.createElement(
          "label",
          { className: "flex items-center gap-2 mb-3 p-2 bg-neutral-800 rounded-lg cursor-pointer" },
          React.createElement("input", {
            type: "checkbox",
            checked: padEnDefaut,
            onChange: function (e) { setPadEnDefaut(e.target.checked); }
          }),
          React.createElement("span", { className: "text-sm text-amber-300" }, "Le PAD était en panne")
        ),

        /* Champs spécifiques au PAD en panne. */
        padEnDefaut
          ? React.createElement(
              "div",
              { className: "mb-3 p-3 bg-amber-950/40 border border-amber-800 rounded-lg" },
              React.createElement("label", { className: "block text-xs text-amber-300 mb-1" },
                "Numéro du PAD en panne (obligatoire)"),
              React.createElement("input", {
                type: "text",
                value: numeroPad,
                onChange: function (e) { setNumeroPad(e.target.value); },
                className: "w-full px-3 py-2 bg-neutral-800 rounded-lg text-white text-sm mb-2",
                placeholder: "Ex : PAD 4"
              }),
              React.createElement(
                "label",
                { className: "flex items-center gap-2 cursor-pointer" },
                React.createElement("input", {
                  type: "checkbox",
                  checked: donneesPartielles,
                  onChange: function (e) { setDonneesPartielles(e.target.checked); }
                }),
                React.createElement("span", { className: "text-xs text-amber-200" },
                  "J'ai pu récupérer une partie des données")
              ),
              !donneesPartielles
                ? React.createElement("p", { className: "text-xs text-amber-400 mt-2" },
                    "Données perdues : aucun montant ne sera enregistré pour ce PAD.")
                : null
            )
          : null,

        /* Montant + quantités : affichés selon le cas. */
        afficherChampsChiffres
          ? React.createElement(
              "div",
              null,
              React.createElement(
                "div",
                { className: "mb-3" },
                React.createElement("label", { className: "block text-xs text-neutral-400 mb-1" }, "Montant total (€)"),
                React.createElement("input", {
                  type: "number",
                  inputMode: "decimal",
                  value: montant,
                  onChange: function (e) { setMontant(e.target.value); },
                  className: "w-full px-3 py-2 bg-neutral-800 rounded-lg text-white",
                  placeholder: "0.00"
                })
              ),
              React.createElement(
                "div",
                { className: "grid grid-cols-3 gap-2 mb-3" },
                champNombre("Pintes", pintes, setPintes),
                champNombre("Pichets", pichets, setPichets),
                champNombre("Gobelets", gobelets, setGobelets)
              )
            )
          : null,

        /* Commentaire. */
        React.createElement(
          "div",
          { className: "mb-5" },
          React.createElement("label", { className: "block text-xs text-neutral-400 mb-1" }, "Commentaire (facultatif)"),
          React.createElement("textarea", {
            value: commentaire,
            onChange: function (e) { setCommentaire(e.target.value); },
            rows: 2,
            className: "w-full px-3 py-2 bg-neutral-800 rounded-lg text-white text-sm"
          })
        ),

        React.createElement(
          "div",
          { className: "flex gap-2" },
          React.createElement(
            "button",
            { onClick: onAnnuler, className: "flex-1 py-3 bg-neutral-700 text-white rounded-lg" },
            "Annuler"
          ),
          React.createElement(
            "button",
            { onClick: confirmer, className: "flex-1 py-3 bg-emerald-600 text-white rounded-lg font-medium" },
            "Enregistrer"
          )
        )
      )
    );
  }

  /* =========================================================================
     SECTION 14ter — ÉCRAN DE SAISIE DES VENTES (module 3B-1)
     Tableau bar × créneau du jour actif. Chaque case montre l'état et le
     total. Cliquer une case ouvre la fenêtre de saisie.
  ========================================================================= */
  /* ---- Fenêtre de DÉTAIL d'une case (module 3B-2) ----
     S'ouvre quand on clique une case du tableau. Montre toutes les saisies
     de la case, et propose : ajouter une saisie, clôturer/rouvrir,
     annuler une saisie. */
  function FenetreDetailCase({ bar, creneau, uneCase, role, jourActuel, prenom, onDemanderSaisie, onFermer }) {
    const info = calculerTotalCase(uneCase);
    const peutSaisir = Droits.peutSaisirVentes(role);
    /* Réouverture et annulation : admin et plus (décision gelée). */
    const peutAdministrer = role === ROLES.ADMIN || role === ROLES.SUPERADMIN;

    /* Liste des saisies de la case, en tableau. */
    const saisies = (uneCase && uneCase.saisies) ? uneCase.saisies : {};
    const listeSaisies = Object.keys(saisies).map(function (id) {
      return Object.assign({ id: id }, saisies[id]);
    });

    function cloturer() {
      if (!confirm("Clôturer ce créneau ? Plus aucune saisie ne sera possible.")) return;
      ActionsVentes.cloturer(jourActuel, bar.id, creneau.id)
        .catch(function (e) { alert(e.message); });
    }
    function rouvrir() {
      ActionsVentes.rouvrir(jourActuel, bar.id, creneau.id)
        .catch(function (e) { alert(e.message); });
    }
    function annuler(idSaisie) {
      if (!confirm("Annuler cette saisie ? Elle restera visible, barrée.")) return;
      ActionsVentes.annulerSaisie(jourActuel, bar.id, creneau.id, idSaisie, prenom)
        .catch(function (e) { alert(e.message); });
    }

    return React.createElement(
      "div",
      { className: "fixed inset-0 bg-black/80 flex items-center justify-center p-4 z-50" },
      React.createElement(
        "div",
        { className: "bg-neutral-900 rounded-2xl w-full max-w-sm p-6 max-h-[90vh] overflow-y-auto" },

        React.createElement("h3", { className: "text-xl font-bold text-white mb-1" },
          bar.nom + " — " + creneau.libelle),
        React.createElement("p", { className: "text-emerald-300 text-sm mb-1" },
          "Total : " + info.total.toFixed(2) + " €"),
        info.cloturee
          ? React.createElement("p", { className: "text-neutral-400 text-xs mb-3" }, "Créneau clôturé")
          : React.createElement("p", { className: "text-neutral-500 text-xs mb-3" }, "Créneau ouvert"),

        /* Liste des saisies. */
        listeSaisies.length === 0
          ? React.createElement("p", { className: "text-neutral-500 text-sm mb-4" }, "Aucune saisie pour ce créneau.")
          : React.createElement(
              "div",
              { className: "space-y-2 mb-4" },
              listeSaisies.map(function (s) {
                const estAnnulee = s.annulee === true;
                return React.createElement(
                  "div",
                  {
                    key: s.id,
                    className: "rounded-lg p-2 text-sm " +
                      (estAnnulee ? "bg-red-950/40 border border-red-900" : "bg-neutral-800")
                  },
                  React.createElement(
                    "div",
                    { className: "flex items-center justify-between" },
                    React.createElement(
                      "span",
                      { className: (estAnnulee ? "line-through text-neutral-500" : "text-white") + " font-bold" },
                      (s.montant || 0).toFixed(2) + " €"
                    ),
                    /* Bouton annuler : admin et plus, et seulement si pas
                       déjà annulée. */
                    (peutAdministrer && !estAnnulee)
                      ? React.createElement(
                          "button",
                          {
                            onClick: function () { annuler(s.id); },
                            className: "text-xs px-2 py-1 bg-red-900 text-white rounded"
                          },
                          "Annuler"
                        )
                      : null
                  ),
                  React.createElement(
                    "div",
                    { className: "text-xs text-neutral-400 mt-0.5 " + (estAnnulee ? "line-through" : "") },
                    (s.nbPintes || 0) + " pintes, " + (s.nbPichets || 0) + " pichets, " +
                      (s.nbGobelets || 0) + " gobelets"
                  ),
                  /* Mention PAD en panne. */
                  s.padEnDefaut
                    ? React.createElement(
                        "div",
                        { className: "text-xs text-amber-400 mt-0.5" },
                        "PAD en panne : " + (s.numeroPad || "?") +
                          (s.donneesPartielles ? " — données partielles" : " — données perdues")
                      )
                    : null,
                  s.commentaire
                    ? React.createElement("div", { className: "text-xs text-neutral-500 mt-0.5 italic" },
                        "« " + s.commentaire + " »")
                    : null,
                  React.createElement("div", { className: "text-xs text-neutral-600 mt-0.5" },
                    "Saisi par " + (s.par || "?")),
                  estAnnulee
                    ? React.createElement("div", { className: "text-xs text-red-400 mt-0.5" },
                        "Annulée par " + (s.annuleePar || "?"))
                    : null
                );
              })
            ),

        /* Boutons d'action. */
        React.createElement(
          "div",
          { className: "space-y-2" },

          /* Ajouter une saisie : possible si la case n'est pas clôturée. */
          (peutSaisir && !info.cloturee)
            ? React.createElement(
                "button",
                {
                  onClick: function () { onDemanderSaisie(bar, creneau); },
                  className: "w-full py-3 bg-emerald-600 text-white rounded-lg font-medium"
                },
                "+ Ajouter une saisie"
              )
            : null,

          /* Clôturer : si pas clôturée, secrétaire et plus. */
          (peutSaisir && !info.cloturee && listeSaisies.length > 0)
            ? React.createElement(
                "button",
                {
                  onClick: cloturer,
                  className: "w-full py-3 bg-neutral-700 text-white rounded-lg font-medium"
                },
                "Clôturer ce créneau"
              )
            : null,

          /* Rouvrir : si clôturée, admin et plus seulement. */
          (info.cloturee && peutAdministrer)
            ? React.createElement(
                "button",
                {
                  onClick: rouvrir,
                  className: "w-full py-3 bg-amber-800 text-white rounded-lg font-medium"
                },
                "Rouvrir ce créneau"
              )
            : null,

          /* Message si clôturé et pas le droit de rouvrir. */
          (info.cloturee && !peutAdministrer)
            ? React.createElement("p", { className: "text-xs text-neutral-500 text-center" },
                "Créneau clôturé. Seul un administrateur peut le rouvrir.")
            : null,

          React.createElement(
            "button",
            { onClick: onFermer, className: "w-full py-3 bg-neutral-800 text-neutral-300 rounded-lg" },
            "Fermer"
          )
        )
      )
    );
  }

  function EcranVentes({ prenom, role, jourActuel, bars, creneaux, casesVentes, onFermer }) {
    /* Quelle case est ouverte en détail, et quelle saisie est en cours. */
    const [detailCase, setDetailCase] = useState(null);
    const [saisieEnCours, setSaisieEnCours] = useState(null);

    const peutSaisir = Droits.peutSaisirVentes(role);

    const listeCreneaux = Object.keys(creneaux || {}).map(function (id) {
      return { id: id, libelle: creneaux[id].libelle };
    });

    function getCase(idBar, idCreneau) {
      if (!casesVentes || !casesVentes[idBar]) return null;
      return casesVentes[idBar][idCreneau] || null;
    }

    /* Couleur de fond d'une case selon son état. */
    function couleurCase(uneCase) {
      const etat = etatCase(uneCase);
      if (etat === "cloturee") return "bg-neutral-700";
      if (etat === "incident") return "bg-amber-800";
      if (etat === "saisie") return "bg-emerald-800";
      return "bg-neutral-900 border border-neutral-700";
    }

    /* Enregistre une saisie (appelée depuis la fenêtre de saisie). */
    function enregistrerSaisie(donnees) {
      const s = saisieEnCours;
      ActionsVentes.saisir(jourActuel, s.bar.id, s.creneau.id, donnees, prenom)
        .then(function () { setSaisieEnCours(null); })
        .catch(function (e) { alert(e.message); });
    }

    /* La case actuellement affichée en détail, recalculée à chaque rendu
       pour rester à jour avec la base. */
    const caseDetailActuelle = detailCase
      ? getCase(detailCase.bar.id, detailCase.creneau.id)
      : null;

    return React.createElement(
      "div",
      { className: "fixed inset-0 bg-black z-40 flex flex-col" },

      /* En-tête. */
      React.createElement(
        "div",
        { className: "p-4 border-b border-neutral-800 flex items-center justify-between" },
        React.createElement(
          "div",
          null,
          React.createElement("h2", { className: "text-lg font-bold text-emerald-400" }, "Saisie des ventes"),
          React.createElement("p", { className: "text-xs text-neutral-500" }, "Jour " + jourActuel)
        ),
        React.createElement(
          "button",
          { onClick: onFermer, className: "text-xs px-3 py-1.5 bg-neutral-800 text-neutral-300 rounded-lg" },
          "Fermer"
        )
      ),

      /* Légende des couleurs. */
      React.createElement(
        "div",
        { className: "px-3 py-2 flex flex-wrap gap-3 text-xs text-neutral-400 border-b border-neutral-800" },
        React.createElement("span", null, "Gris foncé = à saisir"),
        React.createElement("span", { className: "text-emerald-300" }, "Vert = saisi"),
        React.createElement("span", { className: "text-amber-300" }, "Orange = incident PAD"),
        React.createElement("span", { className: "text-neutral-300" }, "Gris clair = clôturé")
      ),

      /* Corps : tableau bar × créneau. */
      React.createElement(
        "div",
        { className: "flex-1 overflow-auto p-3" },

        listeCreneaux.length === 0
          ? React.createElement("p", { className: "text-amber-400 text-sm text-center py-8" },
              "Aucun créneau défini pour le jour " + jourActuel +
              ". Le super admin doit les configurer avant de saisir des ventes.")
          : bars.length === 0
            ? React.createElement("p", { className: "text-neutral-500 text-sm text-center py-8" },
                "Aucun bar. Un administrateur doit en créer.")
            : React.createElement(
                "div",
                { className: "space-y-4" },
                bars.map(function (bar) {
                  return React.createElement(
                    "div",
                    { key: bar.id, className: "rounded-xl border border-neutral-800 overflow-hidden" },
                    React.createElement(
                      "div",
                      { className: "px-3 py-2 bg-neutral-900 font-bold text-white" },
                      bar.nom + " (" + (bar.type === TYPE_BAR.BIERE ? "bière" : "cidre") + ")"
                    ),
                    React.createElement(
                      "div",
                      { className: "p-2 grid grid-cols-2 gap-2" },
                      listeCreneaux.map(function (creneau) {
                        const uneCase = getCase(bar.id, creneau.id);
                        const info = calculerTotalCase(uneCase);
                        const etat = etatCase(uneCase);

                        return React.createElement(
                          "button",
                          {
                            key: creneau.id,
                            onClick: function () {
                              /* Cliquer une case ouvre son DÉTAIL. */
                              setDetailCase({ bar: bar, creneau: creneau });
                            },
                            className: "text-left rounded-lg p-2 active:opacity-80 " + couleurCase(uneCase)
                          },
                          React.createElement("div", { className: "text-xs text-neutral-300" }, creneau.libelle),
                          React.createElement("div", { className: "text-sm font-bold text-white mt-1" },
                            info.total.toFixed(2) + " €"),
                          React.createElement("div", { className: "text-xs mt-0.5 " +
                              (etat === "cloturee" ? "text-neutral-400"
                                : etat === "incident" ? "text-amber-200"
                                : etat === "saisie" ? "text-emerald-200"
                                : "text-neutral-500") },
                            etat === "cloturee" ? "Clôturé"
                              : etat === "incident" ? ("Incident PAD (" + info.nbSaisies + ")")
                              : etat === "saisie" ? (info.nbSaisies + " saisie(s)")
                              : "À saisir")
                        );
                      })
                    )
                  );
                })
              )
      ),

      /* Fenêtre de détail de case. */
      detailCase
        ? React.createElement(FenetreDetailCase, {
            bar: detailCase.bar,
            creneau: detailCase.creneau,
            uneCase: caseDetailActuelle,
            role: role,
            jourActuel: jourActuel,
            prenom: prenom,
            onDemanderSaisie: function (bar, creneau) {
              setSaisieEnCours({ bar: bar, creneau: creneau });
            },
            onFermer: function () { setDetailCase(null); }
          })
        : null,

      /* Fenêtre de saisie d'une vente. */
      saisieEnCours
        ? React.createElement(FenetreSaisieVente, {
            bar: saisieEnCours.bar,
            creneau: saisieEnCours.creneau,
            onConfirmer: enregistrerSaisie,
            onAnnuler: function () { setSaisieEnCours(null); }
          })
        : null
    );
  }

  /* =========================================================================
     SECTION 14quater — FENÊTRE DE PARAMÈTRES (module paramètres)
     Réservée admin/super admin. Permet de régler :
       - nombre de jours du festival
       - max fûts par bar
       - prix pinte, pichet, gobelet
       - volume fût bière, volume fût cidre
       - stock initial bière, stock initial cidre

     ALERTES :
       - modifier stock initial APRÈS attribution de fûts -> confirmation
         demandée (impacte le stock affiché rétroactivement).
       - modifier le nombre de jours en abaissant la valeur ALORS que des
         données existent dans les jours qui seraient "perdus" -> alerte.
  ========================================================================= */
  function FenetreParametres({ params, bars, historique, casesVentesTousJours, onFermer }) {
    /* Pour chaque paramètre, on garde une copie locale en texte (édition).
       On ne sauvegarde dans la base qu'au clic sur "Enregistrer". */
    const [nombreJours, setNombreJours] = useState(String(params.nombreJours));
    const [maxFutsParBar, setMaxFutsParBar] = useState(String(params.maxFutsParBar));
    const [prixPinte, setPrixPinte] = useState(String(params.prixPinte));
    const [prixPichet, setPrixPichet] = useState(String(params.prixPichet));
    const [prixGobelet, setPrixGobelet] = useState(String(params.prixGobelet));
    const [volumeFutBiere, setVolumeFutBiere] = useState(String(params.volumeFutBiere));
    const [volumeFutCidre, setVolumeFutCidre] = useState(String(params.volumeFutCidre));
    const [stockInitialBiere, setStockInitialBiere] = useState(String(params.stockInitialBiere));
    const [stockInitialCidre, setStockInitialCidre] = useState(String(params.stockInitialCidre));
    /* Volumes de service et seuil de tolérance (ajoutés au module paramètres). */
    const [volumePinte, setVolumePinte] = useState(String(params.volumePinte));
    const [volumePichet, setVolumePichet] = useState(String(params.volumePichet));
    const [seuilTolerancePerte, setSeuilTolerancePerte] = useState(String(params.seuilTolerancePerte));

    function versNombre(texte) {
      const n = parseFloat((texte || "").replace(",", "."));
      return isNaN(n) ? 0 : n;
    }
    function versEntier(texte) {
      const n = parseInt(texte, 10);
      return isNaN(n) ? 0 : n;
    }

    /* Renvoie true si des fûts ont déjà été attribués (= il y a au moins un
       mouvement d'attribution dans l'historique). Sert d'alerte pour les
       changements de stock initial. */
    function desFutsOntEteAttribues() {
      return historique.some(function (mvt) {
        return mvt.mouvement === "attribution";
      });
    }

    /* Renvoie le numéro maximum de jour pour lequel des données existent
       (ventes saisies ou créneaux définis). Sert d'alerte avant de réduire
       le nombre de jours. */
    function jourMaxAvecDonnees() {
      let max = 0;
      Object.keys(casesVentesTousJours || {}).forEach(function (cleJour) {
        /* Les clés sont du genre "jour3" -> on extrait le numéro. */
        const m = cleJour.match(/^jour(\d+)$/);
        if (m) {
          const n = parseInt(m[1], 10);
          if (n > max) max = n;
        }
      });
      return max;
    }

    function enregistrer() {
      const nj = versEntier(nombreJours);
      const mfpb = versEntier(maxFutsParBar);
      const pp = versNombre(prixPinte);
      const ppi = versNombre(prixPichet);
      const pg = versNombre(prixGobelet);
      const vfb = versNombre(volumeFutBiere);
      const vfc = versNombre(volumeFutCidre);
      const sib = versEntier(stockInitialBiere);
      const sic = versEntier(stockInitialCidre);
      const vp = versNombre(volumePinte);
      const vpi = versNombre(volumePichet);
      const stp = versNombre(seuilTolerancePerte);

      /* ----- Garde-fous numériques ----- */
      if (nj < 1) { alert("Le nombre de jours doit être au moins 1."); return; }
      if (mfpb < 1) { alert("Le maximum de fûts par bar doit être au moins 1."); return; }
      if (pp < 0 || ppi < 0 || pg < 0) { alert("Les prix ne peuvent pas être négatifs."); return; }
      if (vfb <= 0 || vfc <= 0) { alert("Les volumes de fûts doivent être supérieurs à 0."); return; }
      if (vp <= 0 || vpi <= 0) { alert("Les volumes pinte et pichet doivent être supérieurs à 0."); return; }
      if (stp < 0 || stp > 100) { alert("Le seuil de tolérance doit être compris entre 0 et 100 %."); return; }
      if (sib < 0 || sic < 0) { alert("Le stock initial ne peut pas être négatif."); return; }

      /* ----- Alerte rétroactive : changement de stock initial ----- */
      const stockBiereChange = sib !== params.stockInitialBiere;
      const stockCidreChange = sic !== params.stockInitialCidre;
      if ((stockBiereChange || stockCidreChange) && desFutsOntEteAttribues()) {
        const message = "Attention : des fûts ont déjà été attribués.\n\n" +
          "Modifier le stock initial va recalculer le stock affiché de façon " +
          "rétroactive (le stock restant changera).\n\n" +
          "Confirmer la modification ?";
        if (!confirm(message)) return;
      }

      /* ----- Alerte : réduction du nombre de jours avec données ----- */
      const jMax = jourMaxAvecDonnees();
      if (nj < params.nombreJours && jMax > nj) {
        const message = "Attention : vous réduisez le nombre de jours à " + nj +
          ", mais des données de vente existent jusqu'au jour " + jMax + ".\n\n" +
          "Les jours " + (nj + 1) + " à " + jMax + " ne seront plus accessibles " +
          "depuis le sélecteur (mais leurs données ne sont PAS effacées).\n\n" +
          "Continuer ?";
        if (!confirm(message)) return;
      }

      /* ----- Sauvegarde en base ----- */
      ActionsParams.sauvegarderTout({
        nombreJours: nj,
        maxFutsParBar: mfpb,
        prixPinte: pp,
        prixPichet: ppi,
        prixGobelet: pg,
        volumeFutBiere: vfb,
        volumeFutCidre: vfc,
        stockInitialBiere: sib,
        stockInitialCidre: sic,
        volumePinte: vp,
        volumePichet: vpi,
        seuilTolerancePerte: stp
      }).then(function () {
        onFermer();
      }).catch(function (e) {
        alert("Erreur lors de la sauvegarde : " + e.message);
      });
    }

    /* Petit champ de saisie réutilisable. */
    function champ(libelle, valeur, onChange, suffixe, type) {
      return React.createElement(
        "div",
        { className: "flex items-center justify-between gap-2 py-1" },
        React.createElement("label", { className: "text-sm text-neutral-300 flex-1" }, libelle),
        React.createElement(
          "div",
          { className: "flex items-center gap-1" },
          React.createElement("input", {
            type: type || "number",
            inputMode: type === "number" ? "decimal" : "text",
            value: valeur,
            onChange: function (e) { onChange(e.target.value); },
            className: "w-20 px-2 py-1 bg-neutral-800 rounded text-white text-sm text-right"
          }),
          suffixe
            ? React.createElement("span", { className: "text-xs text-neutral-500 w-6" }, suffixe)
            : null
        )
      );
    }

    return React.createElement(
      "div",
      { className: "fixed inset-0 bg-black/80 flex items-center justify-center p-4 z-50" },
      React.createElement(
        "div",
        { className: "bg-neutral-900 rounded-2xl w-full max-w-md p-6 max-h-[90vh] overflow-y-auto" },

        React.createElement("h3", { className: "text-xl font-bold text-white mb-4" }, "Paramètres"),

        /* Bloc Festival. */
        React.createElement(
          "div",
          { className: "mb-4" },
          React.createElement("p", { className: "text-xs text-neutral-500 mb-1 uppercase" }, "Festival"),
          champ("Nombre de jours", nombreJours, setNombreJours, "j", "number"),
          champ("Max fûts par bar", maxFutsParBar, setMaxFutsParBar, "", "number")
        ),

        /* Bloc Stock initial. */
        React.createElement(
          "div",
          { className: "mb-4 pt-3 border-t border-neutral-800" },
          React.createElement("p", { className: "text-xs text-neutral-500 mb-1 uppercase" }, "Stock initial"),
          champ("Bière", stockInitialBiere, setStockInitialBiere, "fûts", "number"),
          champ("Cidre", stockInitialCidre, setStockInitialCidre, "fûts", "number")
        ),

        /* Bloc Volumes. */
        React.createElement(
          "div",
          { className: "mb-4 pt-3 border-t border-neutral-800" },
          React.createElement("p", { className: "text-xs text-neutral-500 mb-1 uppercase" }, "Volume d'un fût"),
          champ("Bière", volumeFutBiere, setVolumeFutBiere, "L", "number"),
          champ("Cidre", volumeFutCidre, setVolumeFutCidre, "L", "number")
        ),

        /* Bloc Volume d'un service. Sert au contrôle de cohérence
           (volume sorti en fûts vs volume vendu en pintes/pichets). */
        React.createElement(
          "div",
          { className: "mb-4 pt-3 border-t border-neutral-800" },
          React.createElement("p", { className: "text-xs text-neutral-500 mb-1 uppercase" }, "Volume d'un service"),
          champ("Pinte", volumePinte, setVolumePinte, "cl", "number"),
          champ("Pichet", volumePichet, setVolumePichet, "cl", "number"),
          React.createElement("p", { className: "text-xs text-neutral-600 mt-2 italic" },
            "Le gobelet est un consommable vendu à part, sans volume de boisson.")
        ),

        /* Bloc Prix. */
        React.createElement(
          "div",
          { className: "mb-4 pt-3 border-t border-neutral-800" },
          React.createElement("p", { className: "text-xs text-neutral-500 mb-1 uppercase" }, "Prix unitaires"),
          champ("Pinte", prixPinte, setPrixPinte, "€", "number"),
          champ("Pichet", prixPichet, setPrixPichet, "€", "number"),
          champ("Gobelet", prixGobelet, setPrixGobelet, "€", "number"),
          React.createElement("p", { className: "text-xs text-neutral-600 mt-2 italic" },
            "Décision validée : modifier un prix après que des ventes ont été " +
            "saisies fausse les calculs théoriques d'écart. À éviter en cours de festival.")
        ),

        /* Bloc Cohérence. Seuil au-delà duquel le dashboard signalera
           un bar comme suspect (perte de volume dépassant la tolérance). */
        React.createElement(
          "div",
          { className: "mb-5 pt-3 border-t border-neutral-800" },
          React.createElement("p", { className: "text-xs text-neutral-500 mb-1 uppercase" }, "Cohérence"),
          champ("Seuil de tolérance de perte", seuilTolerancePerte, setSeuilTolerancePerte, "%", "number"),
          React.createElement("p", { className: "text-xs text-neutral-600 mt-2 italic" },
            "Utilisé dans le dashboard : un bar dépassant ce pourcentage de perte " +
            "(volume sorti vs vendu) sera signalé. Typiquement entre 5 et 10 %.")
        ),

        /* Boutons. */
        React.createElement(
          "div",
          { className: "flex gap-2" },
          React.createElement(
            "button",
            { onClick: onFermer, className: "flex-1 py-3 bg-neutral-700 text-white rounded-lg" },
            "Annuler"
          ),
          React.createElement(
            "button",
            { onClick: enregistrer, className: "flex-1 py-3 bg-emerald-600 text-white rounded-lg font-medium" },
            "Enregistrer"
          )
        )
      )
    );
  }

  /* =========================================================================
     SECTION 14quinquies — FENÊTRE D'ÉDITION D'UN SHIFT (module planning)
     S'ouvre quand on clique sur une case bar+créneau du planning.
     Permet de saisir/modifier les 3 postes (vendeur, serveur, runner).
  ========================================================================= */
  function FenetreEditionShift({ bar, creneau, shiftActuel, planningDuJour, jourActuel, onFermer }) {
    const [vendeur, setVendeur] = useState((shiftActuel && shiftActuel.vendeur) || "");
    const [serveur, setServeur] = useState((shiftActuel && shiftActuel.serveur) || "");
    const [runner, setRunner] = useState((shiftActuel && shiftActuel.runner) || "");

    function enregistrer() {
      const nouveauShift = { vendeur: vendeur, serveur: serveur, runner: runner };
      /* Détection des conflits AVANT enregistrement (alerte bloquante). */
      const conflits = detecterConflitsShift(planningDuJour, bar.id, creneau.id, nouveauShift);
      if (conflits.length > 0) {
        alert("Conflit d'affectation détecté :\n\n• " + conflits.join("\n• ") +
          "\n\nL'enregistrement est refusé.");
        return;
      }
      ActionsPlanning.enregistrerShift(jourActuel, bar.id, creneau.id, nouveauShift)
        .then(onFermer)
        .catch(function (e) { alert("Erreur : " + e.message); });
    }

    function supprimer() {
      if (!confirm("Effacer ce shift complet (les 3 postes) ?")) return;
      ActionsPlanning.supprimerShift(jourActuel, bar.id, creneau.id)
        .then(onFermer)
        .catch(function (e) { alert("Erreur : " + e.message); });
    }

    function champ(libelle, valeur, onChange, placeholder) {
      return React.createElement(
        "div",
        { className: "mb-3" },
        React.createElement("label", { className: "block text-xs text-neutral-400 mb-1" }, libelle),
        React.createElement("input", {
          type: "text",
          value: valeur,
          onChange: function (e) { onChange(e.target.value); },
          placeholder: placeholder,
          className: "w-full px-3 py-2 bg-neutral-800 rounded-lg text-white text-sm"
        })
      );
    }

    return React.createElement(
      "div",
      { className: "fixed inset-0 bg-black/80 flex items-center justify-center p-4 z-50" },
      React.createElement(
        "div",
        { className: "bg-neutral-900 rounded-2xl w-full max-w-sm p-6 max-h-[90vh] overflow-y-auto" },
        React.createElement("h3", { className: "text-xl font-bold text-white mb-1" }, "Shift bénévoles"),
        React.createElement("p", { className: "text-neutral-400 text-sm mb-4" },
          bar.nom + " — " + creneau.libelle),

        champ("Vendeur (au PAD)", vendeur, setVendeur, "Prénom Nom"),
        champ("Serveur", serveur, setServeur, "Prénom Nom"),
        champ("Runner (approvisionnement)", runner, setRunner, "Prénom Nom"),

        React.createElement("p", { className: "text-xs text-neutral-600 italic mb-4" },
          "Postes vides autorisés. Un runner peut être affecté sur plusieurs bars " +
          "au même créneau ; vendeur et serveur doivent être uniques."),

        React.createElement(
          "div",
          { className: "flex gap-2" },
          React.createElement(
            "button",
            { onClick: onFermer, className: "flex-1 py-3 bg-neutral-700 text-white rounded-lg" },
            "Annuler"
          ),
          React.createElement(
            "button",
            { onClick: enregistrer, className: "flex-1 py-3 bg-emerald-600 text-white rounded-lg font-medium" },
            "Enregistrer"
          )
        ),
        /* Bouton supprimer affiché seulement si un shift existe déjà. */
        shiftActuel
          ? React.createElement(
              "button",
              {
                onClick: supprimer,
                className: "w-full mt-2 py-2 bg-red-900 hover:bg-red-800 text-white rounded-lg text-sm"
              },
              "Effacer ce shift"
            )
          : null
      )
    );
  }

  /* =========================================================================
     SECTION 14sexies — ÉCRAN PLANNING BÉNÉVOLES (module planning)
     Tableau bar × créneau du jour actif, affichant pour chaque case les
     3 postes (V/S/R). Cliquer une case ouvre la fenêtre d'édition.
  ========================================================================= */
  function EcranPlanning({ prenom, role, jourActuel, bars, creneaux, planningDuJour, onFermer }) {
    const [shiftEnEdition, setShiftEnEdition] = useState(null);
    const peutGerer = Droits.peutGererPlanning(role);

    const listeCreneaux = Object.keys(creneaux || {}).map(function (id) {
      return { id: id, libelle: creneaux[id].libelle };
    });

    /* Récupère le shift d'un bar+créneau, ou null. */
    function getShift(idBar, idCreneau) {
      if (!planningDuJour || !planningDuJour[idBar]) return null;
      return planningDuJour[idBar][idCreneau] || null;
    }

    /* Compte le nombre de postes remplis (0 à 3) pour un shift. */
    function nbPostesRemplis(shift) {
      if (!shift) return 0;
      let n = 0;
      if ((shift.vendeur || "").trim()) n++;
      if ((shift.serveur || "").trim()) n++;
      if ((shift.runner || "").trim()) n++;
      return n;
    }

    /* Le shift en cours d'édition, recalculé à chaque rendu pour
       refléter les changements en base. */
    const shiftActuelEnEdition = shiftEnEdition
      ? getShift(shiftEnEdition.bar.id, shiftEnEdition.creneau.id)
      : null;

    return React.createElement(
      "div",
      { className: "fixed inset-0 bg-black z-40 flex flex-col" },

      /* En-tête. */
      React.createElement(
        "div",
        { className: "p-4 border-b border-neutral-800 flex items-center justify-between" },
        React.createElement(
          "div",
          null,
          React.createElement("h2", { className: "text-lg font-bold text-blue-400" }, "Planning bénévoles"),
          React.createElement("p", { className: "text-xs text-neutral-500" }, "Jour " + jourActuel)
        ),
        React.createElement(
          "button",
          { onClick: onFermer, className: "text-xs px-3 py-1.5 bg-neutral-800 text-neutral-300 rounded-lg" },
          "Fermer"
        )
      ),

      /* Légende. */
      React.createElement(
        "div",
        { className: "px-3 py-2 flex flex-wrap gap-3 text-xs text-neutral-400 border-b border-neutral-800" },
        React.createElement("span", null, "V = Vendeur"),
        React.createElement("span", null, "S = Serveur"),

  /* =========================================================================
     SECTION 14septies — ÉCRAN DASHBOARD (module dashboard-1)
     Réservé admin et plus. Plusieurs onglets, bascule de granularité
     (Tout / Jour actif / Comparatif par jour).

     Dashboard-1 inclut :
       - Vue d'ensemble (chiffres globaux, cohérence, stock)
       - Par bar (CA, volumes, écart, fûts)

     Dashboard-2 ajoutera : Par bénévole, Anomalies, Export Excel.
  ========================================================================= */
  function EcranDashboard({ jourActuel, bars, historique, casesVentesTousJours, params, onFermer }) {
    /* Onglet actif : "vue" / "bar" / "benevole" / "anomalies". */
    const [onglet, setOnglet] = useState("vue");
    /* Bascule de granularité : "tout" / "jour" / "comparatif".
       NB : ne s'applique PAS aux onglets "benevole" et "anomalies"
       (décision validée : toujours total festival pour ces deux-là). */
    const [granularite, setGranularite] = useState("tout");

    /* Planning de TOUS les jours du festival, chargé pour l'onglet Bénévole.
       Lecture unique au montage (ce n'est pas critique d'avoir le temps réel
       sur cet écran ; ça évite un abonnement supplémentaire global). */
    const [planningTousJours, setPlanningTousJours] = useState({});
    useEffect(function () {
      const ref = db.ref("sessions/" + ID_SESSION + "/planning");
      function surPlanning(s) {
        setPlanningTousJours(s.val() || {});
      }
      ref.on("value", surPlanning);
      return function () { ref.off("value", surPlanning); };
    }, []);

    /* Fûts en attente (pot) — pour l'onglet Anomalies (un fût qui reste
       au pot en fin de festival est une anomalie comptable). */
    const [futsEnAttente, setFutsEnAttente] = useState({});
    useEffect(function () {
      const ref = Base.futsEnAttente();
      function surPot(s) { setFutsEnAttente(s.val() || {}); }
      ref.on("value", surPot);
      return function () { ref.off("value", surPot); };
    }, []);

    /* Pour "jour", on filtre sur jourActuel. Pour "tout" et "comparatif",
       pas de filtre jour. */
    const filtreJourPourVentes = (granularite === "jour") ? jourActuel : null;

    /* ----- CALCULS POUR L'ONGLET VUE D'ENSEMBLE ----- */
    const ventesGlobal = agregerVentes(casesVentesTousJours, filtreJourPourVentes, null);
    const futsGlobal = agregerFuts(historique, null);
    const coherenceGlobal = calculerCoherence(historique, casesVentesTousJours, params, null);
    const stockGlobal = calculerStock(historique, params);

    /* ----- DONNÉES POUR L'ONGLET BÉNÉVOLE (toujours tout festival) ----- */
    const lignesBenevoles = agregerBenevoles(planningTousJours);

    /* ----- DONNÉES POUR L'ONGLET ANOMALIES ----- */
    /* Bars dépassant le seuil (filtré sur tout festival). */
    const barsHorsSeuil = (bars || []).filter(function (bar) {
      const c = calculerCoherence(historique, casesVentesTousJours, params, bar.id);
      return !c.dansSeuil && c.volumeSortiL > 0;
    }).map(function (bar) {
      const c = calculerCoherence(historique, casesVentesTousJours, params, bar.id);
      return { id: bar.id, nom: bar.nom, ecartPct: c.ecartPct };
    });
    const listeDonneesPerdues = listerDonneesPerdues(casesVentesTousJours);
    const listeNonCloturees = listerCasesNonCloturees(casesVentesTousJours);
    const listeFutsNonRetournes = listerFutsNonRetournes(bars);
    const listeFutsAuPot = listerFutsAuPot(futsEnAttente);

    /* Helper : retrouve le nom d'un bar et le libellé d'un créneau à
       partir d'un idBar / idCreneau (utilisé pour afficher les anomalies). */
    function nomBar(idBar) {
      const b = (bars || []).find(function (x) { return x.id === idBar; });
      return b ? b.nom : "(bar inconnu)";
    }

    /* ----- DONNÉES POUR L'ONGLET PAR BAR ----- */
    const lignesParBar = (bars || []).map(function (bar) {
      const ventesBar = agregerVentes(casesVentesTousJours, filtreJourPourVentes, bar.id);
      const futsBar = agregerFuts(historique, bar.id);
      const cohBar = calculerCoherence(historique, casesVentesTousJours, params, bar.id);
      return {
        id: bar.id, nom: bar.nom, type: bar.type,
        ventes: ventesBar, futs: futsBar, coherence: cohBar
      };
    });

    /* ----- DONNÉES POUR COMPARATIF PAR JOUR ----- */
    /* Liste de jours présents : on prend tous les jours de 1 à
       params.nombreJours pour avoir une ligne par jour même vide. */
    const joursPourComparatif = [];
    for (let j = 1; j <= (params.nombreJours || 1); j++) {
      const v = agregerVentes(casesVentesTousJours, j, null);
      joursPourComparatif.push({ numero: j, ventes: v });
    }

    /* ----- HELPERS D'AFFICHAGE ----- */
    function fmtEuros(n) { return (n || 0).toFixed(2) + " €"; }
    function fmtLitres(n) { return (n || 0).toFixed(1) + " L"; }
    function fmtPct(n) { return (n || 0).toFixed(1) + " %"; }

    /* Carte indicateur (titre + valeur + sous-titre optionnel). */
    function carte(titre, valeur, sousTitre, couleur) {
      return React.createElement(
        "div",
        { className: "rounded-xl p-3 " + (couleur || "bg-neutral-900 border border-neutral-800") },
        React.createElement("p", { className: "text-xs text-neutral-400 uppercase" }, titre),
        React.createElement("p", { className: "text-xl font-bold text-white mt-1" }, valeur),
        sousTitre
          ? React.createElement("p", { className: "text-xs text-neutral-500 mt-0.5" }, sousTitre)
          : null
      );
    }

    /* ----- RENDU ONGLET "VUE D'ENSEMBLE" ----- */
    function rendreVue() {
      const blocs = [];

      /* Chiffres globaux des ventes. */
      blocs.push(React.createElement(
        "div",
        { key: "ventes", className: "mb-4" },
        React.createElement("p", { className: "text-xs text-neutral-500 uppercase mb-2" },
          "Ventes" + (granularite === "jour" ? " — jour " + jourActuel : " — total festival")),
        React.createElement(
          "div",
          { className: "grid grid-cols-2 gap-2" },
          carte("CA total", fmtEuros(ventesGlobal.ca),
            ventesGlobal.nbSaisies + " saisie(s)", "bg-emerald-950/40 border border-emerald-800"),
          carte("Pintes", ventesGlobal.nbPintes,
            ventesGlobal.nbPichets + " pichets · " + ventesGlobal.nbGobelets + " gobelets"),
          carte("PAD en panne", ventesGlobal.nbPadEnPanne,
            ventesGlobal.nbDonneesPerdues + " donnée(s) perdue(s)",
            ventesGlobal.nbPadEnPanne > 0 ? "bg-amber-950/40 border border-amber-800" : null),
          carte("Saisies annulées", ventesGlobal.nbAnnulees, null,
            ventesGlobal.nbAnnulees > 0 ? "bg-red-950/40 border border-red-900" : null)
        )
      ));

      /* Fûts (toujours sur tout le festival — pas de filtre jour). */
      blocs.push(React.createElement(
        "div",
        { key: "futs", className: "mb-4" },
        React.createElement("p", { className: "text-xs text-neutral-500 uppercase mb-2" },
          "Fûts (total festival)"),
        React.createElement(
          "div",
          { className: "grid grid-cols-2 gap-2" },
          carte("Bière sortis", futsGlobal.nbBiereSortis, null,
            "bg-amber-950/40 border border-amber-800"),
          carte("Cidre sortis", futsGlobal.nbCidreSortis, null,
            "bg-green-950/40 border border-green-800"),
          carte("Cassés", futsGlobal.nbCasses, null,
            futsGlobal.nbCasses > 0 ? "bg-red-950/40 border border-red-900" : null),
          carte("Pleins rendus", futsGlobal.nbPleinsRendus, "réintégrés au stock")
        )
      ));

      /* Stock restant. */
      blocs.push(React.createElement(
        "div",
        { key: "stock", className: "mb-4" },
        React.createElement("p", { className: "text-xs text-neutral-500 uppercase mb-2" }, "Stock restant"),
        React.createElement(
          "div",
          { className: "grid grid-cols-2 gap-2" },
          carte("Bière", stockGlobal.biere + " fûts", null,
            stockGlobal.biere <= 0 ? "bg-red-950/40 border border-red-900" : null),
          carte("Cidre", stockGlobal.cidre + " fûts", null,
            stockGlobal.cidre <= 0 ? "bg-red-950/40 border border-red-900" : null)
        )
      ));

      /* Cohérence (toujours sur tout le festival). */
      const couleurCoh = coherenceGlobal.dansSeuil
        ? "bg-emerald-950/40 border border-emerald-800"
        : "bg-red-950/40 border border-red-900";
      blocs.push(React.createElement(
        "div",
        { key: "coh", className: "mb-4" },
        React.createElement("p", { className: "text-xs text-neutral-500 uppercase mb-2" },
          "Cohérence volumes (total festival)"),
        React.createElement(
          "div",
          { className: "rounded-xl p-3 " + couleurCoh },
          React.createElement(
            "div",
            { className: "grid grid-cols-3 gap-2 text-center" },
            React.createElement(
              "div",
              null,
              React.createElement("p", { className: "text-xs text-neutral-400" }, "Sorti"),
              React.createElement("p", { className: "text-lg font-bold text-white" }, fmtLitres(coherenceGlobal.volumeSortiL))
            ),
            React.createElement(
              "div",
              null,
              React.createElement("p", { className: "text-xs text-neutral-400" }, "Vendu"),
              React.createElement("p", { className: "text-lg font-bold text-white" }, fmtLitres(coherenceGlobal.volumeVenduL))
            ),
            React.createElement(
              "div",
              null,
              React.createElement("p", { className: "text-xs text-neutral-400" }, "Écart"),
              React.createElement("p", { className: "text-lg font-bold " +
                  (coherenceGlobal.dansSeuil ? "text-emerald-300" : "text-red-300") },
                fmtPct(coherenceGlobal.ecartPct))
            )
          ),
          React.createElement("p", { className: "text-xs text-neutral-500 mt-2 text-center" },
            "Seuil : ±" + (params.seuilTolerancePerte || 0) + " % — " +
              (coherenceGlobal.dansSeuil ? "dans la tolérance" : "DÉPASSE la tolérance"))
        )
      ));

      /* Comparatif par jour (seulement si granularité = "comparatif"). */
      if (granularite === "comparatif") {
        blocs.push(React.createElement(
          "div",
          { key: "cmp", className: "mb-4" },
          React.createElement("p", { className: "text-xs text-neutral-500 uppercase mb-2" },
            "Comparatif par jour"),
          React.createElement(
            "div",
            { className: "rounded-xl border border-neutral-800 overflow-hidden" },
            React.createElement(
              "table",
              { className: "w-full text-sm" },
              React.createElement(
                "thead",
                { className: "bg-neutral-900 text-neutral-400 text-xs" },
                React.createElement(
                  "tr",
                  null,
                  React.createElement("th", { className: "text-left p-2" }, "Jour"),
                  React.createElement("th", { className: "text-right p-2" }, "CA"),
                  React.createElement("th", { className: "text-right p-2" }, "Pintes"),
                  React.createElement("th", { className: "text-right p-2" }, "Pichets"),
                  React.createElement("th", { className: "text-right p-2" }, "Gobelets")
                )
              ),
              React.createElement(
                "tbody",
                null,
                joursPourComparatif.map(function (j) {
                  return React.createElement(
                    "tr",
                    { key: j.numero, className: "border-t border-neutral-800" },
                    React.createElement("td", { className: "p-2 text-white font-bold" }, "J" + j.numero),
                    React.createElement("td", { className: "p-2 text-right text-emerald-300" }, fmtEuros(j.ventes.ca)),
                    React.createElement("td", { className: "p-2 text-right text-neutral-300" }, j.ventes.nbPintes),
                    React.createElement("td", { className: "p-2 text-right text-neutral-300" }, j.ventes.nbPichets),
                    React.createElement("td", { className: "p-2 text-right text-neutral-300" }, j.ventes.nbGobelets)
                  );
                })
              )
            )
          )
        ));
      }

      return React.createElement("div", null, blocs);
    }

    /* ----- RENDU ONGLET "PAR BAR" ----- */
    function rendreParBar() {
      if ((bars || []).length === 0) {
        return React.createElement("p", { className: "text-neutral-500 text-sm text-center py-8" },
          "Aucun bar pour l'instant.");
      }
      return React.createElement(
        "div",
        { className: "space-y-3" },
        lignesParBar.map(function (l) {
          const seuilOk = l.coherence.dansSeuil;
          const couleurBordure = seuilOk ? "border-neutral-800" : "border-red-800";
          return React.createElement(

            { key: l.id, className: "rounded-xl border p-3 " + couleurBordure +

            React.createElement(

              React.createElement(
                "div",
                null,
                React.createElement("p", { className: "text-xs text-neutral-500" }, "CA"),
                React.createElement("p", { className: "font-bold text-emerald-300" }, fmtEuros(l.ventes.ca))
              ),
              React.createElement(
                "div",
                null,
                React.createElement("p", { className: "text-xs text-neutral-500" }, "Pintes / Pichets / Gobelets"),
                React.createElement("p", { className: "font-bold text-white" },
                  l.ventes.nbPintes + " / " + l.ventes.nbPichets + " / " + l.ventes.nbGobelets)
              ),
              React.createElement(

            ),
