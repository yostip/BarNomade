                  ),
                  p.commentaire
                    ? React.createElement("p", { className: "text-xs text-neutral-400 italic mt-1" },
                        "« " + p.commentaire + " »")
                    : null,
                  React.createElement("p", { className: "text-xs text-neutral-600 mt-1" },
                    "Saisi par " + p.par)
                );
              })
            )
      ));

      /* Section 3 : cases non clôturées. */
      blocs.push(React.createElement(
        "div",
        { key: "noncloturees", className: "mb-4" },
        React.createElement("p", { className: "text-xs text-neutral-500 uppercase mb-2" },
          "Créneaux saisis mais non clôturés"),
        listeNonCloturees.length === 0
          ? React.createElement("p", { className: "text-xs text-neutral-600 italic" },
              "Tous les créneaux saisis sont clôturés.")
          : React.createElement(
              "div",
              { className: "space-y-1" },
              listeNonCloturees.map(function (c, i) {
                return React.createElement(
                  "div",
                  { key: i, className: "flex justify-between items-center bg-neutral-900 border border-neutral-700 rounded-lg p-2 text-sm" },
                  React.createElement("span", { className: "text-white" },
                    "J" + c.jour + " — " + nomBar(c.idBar)),
                  React.createElement("span", { className: "text-neutral-400" },
                    c.nbSaisies + " saisie(s) — " + c.total.toFixed(2) + " €")
                );
              })
            )
      ));

      /* Section 4 : fûts attribués non retournés. */
      blocs.push(React.createElement(
        "div",
        { key: "futs", className: "mb-4" },
        React.createElement("p", { className: "text-xs text-neutral-500 uppercase mb-2" },
          "Fûts encore attribués (non retournés)"),
        listeFutsNonRetournes.length === 0
          ? React.createElement("p", { className: "text-xs text-neutral-600 italic" },
              "Aucun fût en cours.")
          : React.createElement(
              "div",
              { className: "space-y-1" },
              listeFutsNonRetournes.map(function (f, i) {
                return React.createElement(
                  "div",
                  { key: i, className: "flex justify-between items-center bg-neutral-900 border border-neutral-700 rounded-lg p-2 text-sm" },
                  React.createElement("span", { className: "text-white" },
                    f.nomBar + " — " + (f.type === TYPE_BAR.BIERE ? "bière" : "cidre")),
                  React.createElement("span", { className: "text-xs text-neutral-500" },
                    "par " + f.attribuePar)
                );
              })
            )
      ));

      /* Section 5 : fûts encore au pot (non terminés jamais réutilisés).
         Pendant le festival c'est normal d'en avoir, en fin de festival
         c'est une anomalie comptable à investiguer. */
      blocs.push(React.createElement(
        "div",
        { key: "pot", className: "mb-4" },
        React.createElement("p", { className: "text-xs text-neutral-500 uppercase mb-2" },
          "Fûts encore au pot (non terminés en attente)"),
        listeFutsAuPot.length === 0
          ? React.createElement("p", { className: "text-xs text-neutral-600 italic" },
              "Aucun fût en attente.")
          : React.createElement(
              "div",
              { className: "space-y-1" },
              listeFutsAuPot.map(function (f, i) {
                return React.createElement(
                  "div",
                  { key: i, className: "flex justify-between items-center bg-neutral-900 border border-purple-900 rounded-lg p-2 text-sm" },
                  React.createElement("span", { className: "text-white" },
                    (f.type === TYPE_BAR.BIERE ? "Bière" : "Cidre") +
                      " — depuis " + f.nomBarPrecedent),
                  React.createElement("span", { className: "text-xs text-neutral-500" },
                    "par " + f.retourPar)
                );
              })
            )
      ));

      return React.createElement("div", null, blocs);
    }

    /* ----- EXPORT EXCEL -----
       Génère un fichier .xlsx avec 4 feuilles (Vue, Par bar, Par bénévole,
       Anomalies) et déclenche le téléchargement. Utilise SheetJS (XLSX). */
    function telechargerExcel() {
      if (typeof XLSX === "undefined") {
        alert("La bibliothèque Excel n'est pas chargée. Vérifiez votre connexion internet.");
        return;
      }
      const wb = XLSX.utils.book_new();

      /* Feuille 1 : Vue d'ensemble (chiffres globaux). */
      const v = ventesGlobal;
      const f = futsGlobal;
      const c = coherenceGlobal;
      const dataVue = [
        ["Récapitulatif", "Valeur"],
        ["CA total (€)", v.ca],
        ["Nombre de pintes", v.nbPintes],
        ["Nombre de pichets", v.nbPichets],
        ["Nombre de gobelets", v.nbGobelets],
        ["Nombre de saisies actives", v.nbSaisies],
        ["Saisies annulées", v.nbAnnulees],
        ["Saisies PAD en panne", v.nbPadEnPanne],
        ["Dont données perdues", v.nbDonneesPerdues],
        [],
        ["Fûts bière sortis", f.nbBiereSortis],
        ["Fûts cidre sortis", f.nbCidreSortis],
        ["Fûts cassés", f.nbCasses],
        ["Fûts pleins rendus", f.nbPleinsRendus],
        [],
        ["Stock restant bière (fûts)", stockGlobal.biere],
        ["Stock restant cidre (fûts)", stockGlobal.cidre],
        [],
        ["Volume sorti (L)", c.volumeSortiL.toFixed(1)],
        ["Volume vendu (L)", c.volumeVenduL.toFixed(1)],
        ["Écart (L)", c.ecartL.toFixed(1)],
        ["Écart (%)", c.ecartPct.toFixed(1)],
        ["Seuil de tolérance (%)", params.seuilTolerancePerte || 0],
        ["Dans la tolérance ?", c.dansSeuil ? "Oui" : "NON"]
      ];
      XLSX.utils.book_append_sheet(wb, XLSX.utils.aoa_to_sheet(dataVue), "Vue d'ensemble");

      /* Feuille 2 : Par bar. */
      const dataBar = [
        ["Bar", "Type", "CA (€)", "Pintes", "Pichets", "Gobelets",
         "Fûts sortis", "Fûts cassés", "Volume sorti (L)", "Volume vendu (L)",
         "Écart (%)", "Dans seuil"]
      ];
      lignesParBar.forEach(function (l) {
        dataBar.push([
          l.nom,
          l.type === TYPE_BAR.BIERE ? "bière" : "cidre",
          l.ventes.ca,
          l.ventes.nbPintes, l.ventes.nbPichets, l.ventes.nbGobelets,
          l.futs.nbBiereSortis + l.futs.nbCidreSortis,
          l.futs.nbCasses,
          parseFloat(l.coherence.volumeSortiL.toFixed(1)),
          parseFloat(l.coherence.volumeVenduL.toFixed(1)),
          parseFloat(l.coherence.ecartPct.toFixed(1)),
          l.coherence.dansSeuil ? "Oui" : "NON"
        ]);
      });
      XLSX.utils.book_append_sheet(wb, XLSX.utils.aoa_to_sheet(dataBar), "Par bar");

      /* Feuille 3 : Par bénévole. */
      const dataBenevole = [["Bénévole", "Vendeur", "Serveur", "Runner", "Total"]];
      lignesBenevoles.forEach(function (b) {
        dataBenevole.push([b.nom, b.nbVendeur, b.nbServeur, b.nbRunner, b.nbTotal]);
      });
      XLSX.utils.book_append_sheet(wb, XLSX.utils.aoa_to_sheet(dataBenevole), "Par bénévole");

      /* Feuille 4 : Anomalies. */
      const dataAnomalies = [["Type", "Détail 1", "Détail 2", "Détail 3"]];
      barsHorsSeuil.forEach(function (b) {
        dataAnomalies.push(["Bar hors seuil", b.nom, b.ecartPct.toFixed(1) + " %", ""]);
      });
      listeDonneesPerdues.forEach(function (p) {
        dataAnomalies.push(["Données perdues", "J" + p.jour + " — " + nomBar(p.idBar),
          "PAD " + p.numeroPad, p.par]);
      });
      listeNonCloturees.forEach(function (c2) {
        dataAnomalies.push(["Créneau non clôturé", "J" + c2.jour + " — " + nomBar(c2.idBar),
          c2.nbSaisies + " saisie(s)", c2.total.toFixed(2) + " €"]);
      });
      listeFutsNonRetournes.forEach(function (ft) {
        dataAnomalies.push(["Fût non retourné", ft.nomBar,
          ft.type === TYPE_BAR.BIERE ? "bière" : "cidre", "par " + ft.attribuePar]);
      });
      XLSX.utils.book_append_sheet(wb, XLSX.utils.aoa_to_sheet(dataAnomalies), "Anomalies");

      /* Nom de fichier avec la date du jour. */
      const d = new Date();
      const pad2 = function (n) { return n < 10 ? "0" + n : "" + n; };
      const nomFichier = "bars-nomades-recap-" +
        d.getFullYear() + pad2(d.getMonth() + 1) + pad2(d.getDate()) +
        "-" + pad2(d.getHours()) + pad2(d.getMinutes()) + ".xlsx";

      XLSX.writeFile(wb, nomFichier);
    }

    /* ----- EXPORT JOURNAL BRUT -----
       Second fichier Excel séparé du récapitulatif. Contient 2 feuilles :
         - "Mouvements de fûts" : option A (données brutes, sans créneau
           ni équipe, l'heure exacte fait foi).
         - "Ventes détaillées" : une ligne par saisie PAD, annulées
           comprises (marquées comme telles).
       Pour les libellés de créneaux dans la feuille Ventes, on charge les
       créneaux de TOUS les jours ponctuellement au clic (pas d'abonnement
       permanent, car cet export est occasionnel). */
    function telechargerJournal() {
      if (typeof XLSX === "undefined") {
        alert("La bibliothèque Excel n'est pas chargée. Vérifiez votre connexion internet.");
        return;
      }

      /* Helper de date : convertit un timestamp (ms) en "YYYY-MM-DD HH:MM:SS". */
      function pad2(n) { return n < 10 ? "0" + n : "" + n; }
      function fmtDateHeure(ts) {
        if (!ts) return "";
        const d2 = new Date(ts);
        return d2.getFullYear() + "-" + pad2(d2.getMonth() + 1) + "-" + pad2(d2.getDate()) +
          " " + pad2(d2.getHours()) + ":" + pad2(d2.getMinutes()) + ":" + pad2(d2.getSeconds());
      }

      /* On charge les créneaux de tous les jours en une lecture Firebase
         unique, puis on construit le fichier. */
      db.ref("sessions/" + ID_SESSION + "/creneaux").once("value").then(function (snap) {
        const creneauxTousJours = snap.val() || {};

        /* Résout idCreneau -> libellé, sur un jour donné. */
        function libCreneau(numeroJour, idCreneau) {
          const cle = "jour" + numeroJour;
          const c = creneauxTousJours[cle];
          if (!c || !c[idCreneau]) return idCreneau;       /* fallback : on garde l'id */
          return c[idCreneau].libelle || idCreneau;
        }

        const wb = XLSX.utils.book_new();

        /* --- Feuille 1 : Mouvements de fûts (option A) --- */
        /* On parcourt l'historique tel quel, sans déduction. */
        const dataMvt = [[
          "Date/heure", "Mouvement", "Type de fût", "Bar",
          "Motif retour", "Commentaire", "Par"
        ]];
        /* Tri par date croissante pour faciliter la lecture chronologique. */
        const histoTrie = (historique || []).slice().sort(function (a, b) {
          return (a.date || 0) - (b.date || 0);
        });
        histoTrie.forEach(function (mvt) {
          dataMvt.push([
            fmtDateHeure(mvt.date),
            mvt.mouvement || "",
            mvt.typeFut || "",
            mvt.nomBar || "",
            mvt.motifRetour || "",
            mvt.commentaire || "",
            mvt.par || ""
          ]);
        });
        XLSX.utils.book_append_sheet(wb, XLSX.utils.aoa_to_sheet(dataMvt), "Mouvements de fûts");

        /* --- Feuille 2 : Ventes détaillées --- */
        const dataVentes = [[
          "Jour", "Bar", "Créneau", "Date/heure saisie",
          "Montant (€)", "Pintes", "Pichets", "Gobelets",
          "PAD en panne", "N° PAD", "Données partielles",
          "Commentaire", "Saisi par",
          "Annulée", "Annulée par"
        ]];
        /* On parcourt toutes les cases de ventes, toutes les saisies. */
        const lignesVentes = [];
        Object.keys(casesVentesTousJours || {}).forEach(function (cleJour) {
          const nj = numeroDepuisCleJour(cleJour);
          if (nj === null) return;
          const barresDuJour = casesVentesTousJours[cleJour] || {};
          Object.keys(barresDuJour).forEach(function (idBar) {
            const creneauxDuBar = barresDuJour[idBar] || {};
            Object.keys(creneauxDuBar).forEach(function (idCreneau) {
              const uneCase = creneauxDuBar[idCreneau];
              if (!uneCase || !uneCase.saisies) return;
              Object.keys(uneCase.saisies).forEach(function (idS) {
                const s = uneCase.saisies[idS];
                if (!s) return;
                lignesVentes.push({
                  jour: nj,
                  bar: nomBar(idBar),
                  creneau: libCreneau(nj, idCreneau),
                  date: s.date || 0,
                  saisie: s
                });
              });
            });
          });
        });
        /* Tri chronologique. */
        lignesVentes.sort(function (a, b) { return a.date - b.date; });
        lignesVentes.forEach(function (l) {
          const s = l.saisie;
          dataVentes.push([
            "J" + l.jour,
            l.bar,
            l.creneau,
            fmtDateHeure(s.date),
            s.montant || 0,
            s.nbPintes || 0,
            s.nbPichets || 0,
            s.nbGobelets || 0,
            s.padEnDefaut === true ? "oui" : "non",
            s.numeroPad || "",
            s.padEnDefaut === true ? (s.donneesPartielles === true ? "oui" : "non") : "",
            s.commentaire || "",
            s.par || "",
            s.annulee === true ? "oui" : "non",
            s.annulee === true ? (s.annuleePar || "") : ""
          ]);
        });
        XLSX.utils.book_append_sheet(wb, XLSX.utils.aoa_to_sheet(dataVentes), "Ventes détaillées");

        /* Nom de fichier. */
        const dnow = new Date();
        const nomFichier = "bars-nomades-journal-" +
          dnow.getFullYear() + pad2(dnow.getMonth() + 1) + pad2(dnow.getDate()) +
          "-" + pad2(dnow.getHours()) + pad2(dnow.getMinutes()) + ".xlsx";
        XLSX.writeFile(wb, nomFichier);
      }).catch(function (e) {
        alert("Erreur lors de la génération du journal : " + e.message);
      });
    }

    /* Bouton onglet réutilisable. */
    function ongletBtn(cle, libelle) {
      const actif = onglet === cle;
      return React.createElement(
        "button",
        {
          onClick: function () { setOnglet(cle); },
          className: "px-3 py-2 text-sm font-medium rounded-lg " +
            (actif ? "bg-purple-700 text-white" : "bg-neutral-800 text-neutral-400")
        },
        libelle
      );
    }

    /* Bouton granularité réutilisable. */
    function granBtn(cle, libelle) {
      const actif = granularite === cle;
      return React.createElement(
        "button",
        {
          onClick: function () { setGranularite(cle); },
          className: "flex-1 px-2 py-1.5 text-xs font-medium rounded " +
            (actif ? "bg-neutral-700 text-white" : "bg-neutral-900 text-neutral-500")
        },
        libelle
      );
    }

    return React.createElement(
      "div",
      { className: "fixed inset-0 bg-black z-40 flex flex-col" },

      /* En-tête. */
      React.createElement(
        "div",
        { className: "p-4 border-b border-neutral-800 flex items-center justify-between" },
        React.createElement(
          "div",
          null,
          React.createElement("h2", { className: "text-lg font-bold text-purple-400" }, "Dashboard"),
          React.createElement("p", { className: "text-xs text-neutral-500" }, "Vue d'ensemble du festival")
        ),
        React.createElement(
          "button",
          { onClick: onFermer, className: "text-xs px-3 py-1.5 bg-neutral-800 text-neutral-300 rounded-lg" },
          "Fermer"
        )
      ),

      /* Barre d'onglets. */
      React.createElement(
        "div",
        { className: "px-3 py-2 flex gap-2 border-b border-neutral-800 overflow-x-auto" },
        ongletBtn("vue", "Vue d'ensemble"),
        ongletBtn("bar", "Par bar"),
        ongletBtn("benevole", "Par bénévole"),
        ongletBtn("anomalies", "Anomalies")
      ),

      /* Bascule de granularité — affichée uniquement pour les onglets
         vue/bar (les onglets benevole/anomalies sont toujours sur tout
         le festival, décision validée). */
      (onglet === "vue" || onglet === "bar")
        ? React.createElement(
            "div",
            { className: "px-3 py-2 flex gap-1 border-b border-neutral-800" },
            granBtn("tout", "Tout le festival"),
            granBtn("jour", "Jour " + jourActuel),
            granBtn("comparatif", "Comparatif jours")
          )
        : null,

      /* Corps : un onglet à la fois. */
      React.createElement(
        "div",
        { className: "flex-1 overflow-auto p-3" },
        onglet === "vue" ? rendreVue()
          : onglet === "bar" ? rendreParBar()
          : onglet === "benevole" ? rendreBenevole()
          : rendreAnomalies()
      ),

      /* Pied : boutons d'export Excel (récap + journal). */
      React.createElement(
        "div",
        { className: "px-3 py-2 border-t border-neutral-800 flex flex-wrap gap-2" },
        React.createElement(
          "button",
          {
            onClick: telechargerExcel,
            className: "flex-1 min-w-[140px] py-2.5 bg-purple-700 hover:bg-purple-600 text-white rounded-lg text-sm font-medium"
          },
          "Récapitulatif Excel"
        ),
        React.createElement(
          "button",
          {
            onClick: telechargerJournal,
            className: "flex-1 min-w-[140px] py-2.5 bg-neutral-700 hover:bg-neutral-600 text-white rounded-lg text-sm font-medium"
          },
          "Journal brut Excel"
        )
      )
    );
  }

  /* =========================================================================
     SECTION 14octies — ÉCRAN UTILISATEURS (module utilisateurs)

     Accessible aux admin et plus. Affiche tous les utilisateurs inscrits
     (option A) avec leur prénom, rôle, et dernière connexion.
     Actions :
       - Promotion visiteur -> secrétaire
       - Rétrogradation secrétaire -> visiteur
       - Éjection (suppression douce)
     Le super admin peut en plus déclencher la REMISE À ZÉRO de la session
     (export Excel obligatoire puis double confirmation par mot-clé).
  ========================================================================= */
  function EcranUtilisateurs({ prenom, role, onFermer, onDemanderRemiseAZero }) {
    const [utilisateurs, setUtilisateurs] = useState({});

    const peutGererUtilisateurs = Droits.peutGererUtilisateurs(role);
    const peutRemettreAZero = Droits.peutRemettreAZero(role);

    /* Abonnement Firebase à la liste des utilisateurs. */
    useEffect(function () {
      const ref = db.ref("sessions/" + ID_SESSION + "/users");
      function surUsers(s) {
        setUtilisateurs(s.val() || {});
      }
      ref.on("value", surUsers);
      return function () { ref.off("value", surUsers); };
    }, []);

    /* Liste triée : super admin en haut, puis admins, puis secrétaires,
       puis visiteurs ; alphabétique au sein de chaque groupe. */
    const ordreRoles = {
      superadmin: 0, admin: 1, secretaire: 2, visiteur: 3
    };
    const liste = Object.keys(utilisateurs || {}).map(function (cle) {
      const u = utilisateurs[cle];
      return {
        prenom: u.prenom || cle,
        role: u.role || ROLES.VISITEUR,
        derniereConnexion: u.derniereConnexion || 0
      };
    }).sort(function (a, b) {
      const oa = ordreRoles[a.role] != null ? ordreRoles[a.role] : 4;
      const ob = ordreRoles[b.role] != null ? ordreRoles[b.role] : 4;
      if (oa !== ob) return oa - ob;
      return (a.prenom || "").localeCompare(b.prenom || "");
    });

    /* Format date court pour la dernière connexion. */
    function fmtDate(ts) {
      if (!ts) return "—";
      const d = new Date(ts);
      const pad = function (n) { return n < 10 ? "0" + n : "" + n; };
      return pad(d.getDate()) + "/" + pad(d.getMonth() + 1) +
        " " + pad(d.getHours()) + ":" + pad(d.getMinutes());
    }

    /* Couleur de pastille selon le rôle. */
    function couleurRole(r) {
      if (r === ROLES.SUPERADMIN) return "bg-purple-700 text-white";
      if (r === ROLES.ADMIN) return "bg-red-700 text-white";
      if (r === ROLES.SECRETAIRE) return "bg-blue-700 text-white";
      return "bg-neutral-700 text-neutral-200";
    }
    function libelleRole(r) {
      if (r === ROLES.SUPERADMIN) return "Super admin";
      if (r === ROLES.ADMIN) return "Admin";
      if (r === ROLES.SECRETAIRE) return "Secrétaire";
      return "Visiteur";
    }

    function promouvoirEnSecretaire(p) {
      ActionsUtilisateurs.changerRole(p, ROLES.SECRETAIRE)
        .catch(function (e) { alert("Erreur : " + e.message); });
    }
    function retrograderEnVisiteur(p) {
      ActionsUtilisateurs.changerRole(p, ROLES.VISITEUR)
        .catch(function (e) { alert("Erreur : " + e.message); });
    }
    function ejecter(p) {
      if (!confirm("Éjecter « " + p + " » ? Il pourra revenir en se " +
          "reconnectant (mais redeviendra visiteur).")) return;
      ActionsUtilisateurs.ejecter(p)
        .catch(function (e) { alert("Erreur : " + e.message); });
    }

    /* Boutons d'action sur une ligne utilisateur. */
    function boutonsLigne(u) {
      /* Auto-protection : on ne peut rien faire sur soi-même. */
      const cestMoi = u.prenom === prenom;
      /* Auto-protection : on ne touche jamais au super admin. */
      const estSuperAdmin = u.role === ROLES.SUPERADMIN;
      /* Auto-protection : un admin ne peut pas être rétrogradé ni éjecté
         depuis cet écran (les 3 admins sont gérés via console Firebase). */
      const estAdmin = u.role === ROLES.ADMIN;

      if (!peutGererUtilisateurs) return null;
      if (cestMoi) {
        return React.createElement("span", { className: "text-xs text-neutral-500 italic" }, "(vous-même)");
      }
      if (estSuperAdmin) {
        return React.createElement("span", { className: "text-xs text-neutral-500 italic" }, "(protégé)");
      }
      if (estAdmin) {
        return React.createElement("span", { className: "text-xs text-neutral-500 italic" },
          "(géré via console Firebase)");
      }

      const boutons = [];
      if (u.role === ROLES.VISITEUR) {
        boutons.push(React.createElement(
          "button",
          {
            key: "promo",
            onClick: function () { promouvoirEnSecretaire(u.prenom); },
            className: "text-xs px-2 py-1 bg-blue-700 hover:bg-blue-600 text-white rounded"
          },
          "→ Secrétaire"
        ));
      } else if (u.role === ROLES.SECRETAIRE) {
        boutons.push(React.createElement(
          "button",
          {
            key: "retro",
            onClick: function () { retrograderEnVisiteur(u.prenom); },
            className: "text-xs px-2 py-1 bg-neutral-700 hover:bg-neutral-600 text-white rounded"
          },
          "→ Visiteur"
        ));
      }
      boutons.push(React.createElement(
        "button",
        {
          key: "eject",
          onClick: function () { ejecter(u.prenom); },
          className: "text-xs px-2 py-1 bg-red-900 hover:bg-red-800 text-white rounded"
        },
        "Éjecter"
      ));
      return React.createElement("div", { className: "flex gap-1" }, boutons);
    }

    return React.createElement(
      "div",
      { className: "fixed inset-0 bg-black z-40 flex flex-col" },

      /* En-tête. */
      React.createElement(
        "div",
        { className: "p-4 border-b border-neutral-800 flex items-center justify-between" },
        React.createElement(
          "div",
          null,
          React.createElement("h2", { className: "text-lg font-bold text-orange-400" }, "Utilisateurs"),
          React.createElement("p", { className: "text-xs text-neutral-500" },
            liste.length + " utilisateur(s) inscrit(s)")
        ),
        React.createElement(
          "button",
          { onClick: onFermer, className: "text-xs px-3 py-1.5 bg-neutral-800 text-neutral-300 rounded-lg" },
          "Fermer"
        )
      ),

      /* Liste. */
      React.createElement(
        "div",
        { className: "flex-1 overflow-auto p-3" },
        liste.length === 0
          ? React.createElement("p", { className: "text-neutral-500 text-sm text-center py-8" },
              "Aucun utilisateur inscrit pour l'instant.")
          : React.createElement(
              "div",
              { className: "space-y-2" },
              liste.map(function (u) {
                return React.createElement(
                  "div",
                  {
                    key: u.prenom,
                    className: "flex items-center justify-between bg-neutral-900 border border-neutral-800 rounded-lg p-3"
                  },
                  React.createElement(
                    "div",
                    { className: "flex-1 min-w-0" },
                    React.createElement(
                      "div",
                      { className: "flex items-center gap-2" },
                      React.createElement("span", { className: "font-bold text-white" }, u.prenom),
                      React.createElement("span", {
                        className: "text-xs px-2 py-0.5 rounded " + couleurRole(u.role)
                      }, libelleRole(u.role))
                    ),
                    React.createElement("p", { className: "text-xs text-neutral-500 mt-1" },
                      "Dernière connexion : " + fmtDate(u.derniereConnexion))
                  ),
                  React.createElement("div", { className: "ml-2" }, boutonsLigne(u))
                );
              })
            )
      ),

      /* Pied : bouton remise à zéro (super admin only). */
      peutRemettreAZero
        ? React.createElement(
            "div",
            { className: "px-3 py-3 border-t border-neutral-800" },
            React.createElement("p", { className: "text-xs text-neutral-500 mb-2 text-center" },
              "Action irréversible — à utiliser uniquement après le festival"),
            React.createElement(
              "button",
              {
                onClick: onDemanderRemiseAZero,
                className: "w-full py-2.5 bg-red-900 hover:bg-red-800 text-white rounded-lg text-sm font-medium"
              },
              "Remise à zéro de la session"
            )
          )
        : null
    );
  }

  /* =========================================================================
     SECTION 14nonies — REMISE À ZÉRO DE LA SESSION (workflow)

     ÉTAPES (gelées) :
       1. Cliquer le bouton "Remise à zéro" -> ouvre cette fenêtre.
       2. L'utilisateur clique "Exporter et continuer" : on génère les
          DEUX fichiers Excel (récap + journal brut). Si l'un des deux
          échoue, on bloque tout (pas d'effacement possible).
       3. Une fois l'export confirmé, un champ de saisie apparaît.
          L'utilisateur doit taper "EFFACER" en majuscules.
       4. Au clic final, l'effacement est exécuté.
  ========================================================================= */
  function FenetreRemiseAZero({ params, bars, historique, casesVentesTousJours,
                                planningTousJoursPourExport, prenom, onFermer }) {
    /* Étape : "init" -> "exportFait" -> (saisie clé) -> "effacement". */
    const [etape, setEtape] = useState("init");
    const [cleSaisie, setCleSaisie] = useState("");
    const [enCours, setEnCours] = useState(false);
    const [messageErreur, setMessageErreur] = useState("");

    /* Lance les DEUX exports Excel l'un après l'autre.
       Renvoie une promesse qui réussit si les deux ont fonctionné. */
    function exporterTout() {
      if (typeof XLSX === "undefined") {
        return Promise.reject(new Error("Bibliothèque Excel indisponible"));
      }
      return new Promise(function (resolve, reject) {
        try {
          /* ----- 1. Récapitulatif ----- */
          /* On reproduit ici la logique de telechargerExcel pour ne pas
             dépendre du dashboard (la fenêtre est appelable depuis
             l'écran utilisateurs). Code dupliqué volontairement : si la
             logique du dashboard évolue, attention à la garder synchro. */
          const wbRecap = XLSX.utils.book_new();
          const v = agregerVentes(casesVentesTousJours, null, null);
          const f = agregerFuts(historique, null);
          const c = calculerCoherence(historique, casesVentesTousJours, params, null);
          const sk = calculerStock(historique, params);
          const dataVue = [
            ["Récapitulatif", "Valeur"],
            ["CA total (€)", v.ca],
            ["Pintes", v.nbPintes], ["Pichets", v.nbPichets], ["Gobelets", v.nbGobelets],
            ["Saisies actives", v.nbSaisies], ["Annulées", v.nbAnnulees],
            ["PAD en panne", v.nbPadEnPanne], ["Dont données perdues", v.nbDonneesPerdues],
            [], ["Fûts bière sortis", f.nbBiereSortis], ["Fûts cidre sortis", f.nbCidreSortis],
            ["Cassés", f.nbCasses], ["Pleins rendus", f.nbPleinsRendus],
            [], ["Stock bière (fûts)", sk.biere], ["Stock cidre (fûts)", sk.cidre],
            [], ["Volume sorti (L)", c.volumeSortiL.toFixed(1)],
            ["Volume vendu (L)", c.volumeVenduL.toFixed(1)],
            ["Écart (%)", c.ecartPct.toFixed(1)],
            ["Seuil (%)", params.seuilTolerancePerte || 0],
            ["Dans tolérance ?", c.dansSeuil ? "Oui" : "NON"]
          ];
          XLSX.utils.book_append_sheet(wbRecap, XLSX.utils.aoa_to_sheet(dataVue), "Vue d'ensemble");

          /* Par bar. */
          const dataBar = [["Bar", "Type", "CA (€)", "Pintes", "Pichets", "Gobelets",
            "Fûts sortis", "Cassés", "Vol sorti L", "Vol vendu L", "Écart %", "Dans seuil"]];
          (bars || []).forEach(function (bar) {
            const vb = agregerVentes(casesVentesTousJours, null, bar.id);
            const fb = agregerFuts(historique, bar.id);
            const cb = calculerCoherence(historique, casesVentesTousJours, params, bar.id);
            dataBar.push([
              bar.nom, bar.type === TYPE_BAR.BIERE ? "bière" : "cidre", vb.ca,
              vb.nbPintes, vb.nbPichets, vb.nbGobelets,
              fb.nbBiereSortis + fb.nbCidreSortis, fb.nbCasses,
              parseFloat(cb.volumeSortiL.toFixed(1)),
              parseFloat(cb.volumeVenduL.toFixed(1)),
              parseFloat(cb.ecartPct.toFixed(1)),
              cb.dansSeuil ? "Oui" : "NON"
            ]);
          });
          XLSX.utils.book_append_sheet(wbRecap, XLSX.utils.aoa_to_sheet(dataBar), "Par bar");

          /* Par bénévole. */
          const dataBen = [["Bénévole", "Vendeur", "Serveur", "Runner", "Total"]];
          agregerBenevoles(planningTousJoursPourExport || {}).forEach(function (b) {
            dataBen.push([b.nom, b.nbVendeur, b.nbServeur, b.nbRunner, b.nbTotal]);
          });
          XLSX.utils.book_append_sheet(wbRecap, XLSX.utils.aoa_to_sheet(dataBen), "Par bénévole");

          /* Nom de fichier. */
          const d1 = new Date();
          const pad2 = function (n) { return n < 10 ? "0" + n : "" + n; };
          const horodatage = d1.getFullYear() + pad2(d1.getMonth() + 1) + pad2(d1.getDate()) +
            "-" + pad2(d1.getHours()) + pad2(d1.getMinutes());
          XLSX.writeFile(wbRecap, "bars-nomades-final-recap-" + horodatage + ".xlsx");

          /* ----- 2. Journal brut ----- */
          /* Charger les créneaux puis générer. */
          db.ref("sessions/" + ID_SESSION + "/creneaux").once("value").then(function (snap) {
            const creneauxTousJours = snap.val() || {};
            function libCreneau(nj, idCreneau) {
              const cle = "jour" + nj;
              const c = creneauxTousJours[cle];
              return (c && c[idCreneau]) ? (c[idCreneau].libelle || idCreneau) : idCreneau;
            }
            function fmtDH(ts) {
              if (!ts) return "";
              const d2 = new Date(ts);
              return d2.getFullYear() + "-" + pad2(d2.getMonth() + 1) + "-" + pad2(d2.getDate()) +
                " " + pad2(d2.getHours()) + ":" + pad2(d2.getMinutes()) + ":" + pad2(d2.getSeconds());
            }
            const wbJ = XLSX.utils.book_new();
            const dataMvt = [["Date/heure", "Mouvement", "Type fût", "Bar",
              "Motif retour", "Commentaire", "Par"]];
            (historique || []).slice().sort(function (a, b) {
              return (a.date || 0) - (b.date || 0);
            }).forEach(function (m) {
              dataMvt.push([fmtDH(m.date), m.mouvement || "", m.typeFut || "",
                m.nomBar || "", m.motifRetour || "", m.commentaire || "", m.par || ""]);
            });
            XLSX.utils.book_append_sheet(wbJ, XLSX.utils.aoa_to_sheet(dataMvt), "Mouvements de fûts");

            /* Ventes détaillées. */
            const dataV = [["Jour", "Bar", "Créneau", "Date/heure saisie",
              "Montant (€)", "Pintes", "Pichets", "Gobelets",
              "PAD en panne", "N° PAD", "Données partielles",
              "Commentaire", "Saisi par", "Annulée", "Annulée par"]];
            const lignes = [];
            function nomBar(idBar) {
              const b = (bars || []).find(function (x) { return x.id === idBar; });
              return b ? b.nom : "(?)";
            }
            Object.keys(casesVentesTousJours || {}).forEach(function (cleJ) {
              const nj = numeroDepuisCleJour(cleJ);
              if (nj === null) return;
              const barresJ = casesVentesTousJours[cleJ] || {};
              Object.keys(barresJ).forEach(function (idBar) {
                const creneauxBar = barresJ[idBar] || {};
                Object.keys(creneauxBar).forEach(function (idCr) {
                  const ca = creneauxBar[idCr];
                  if (!ca || !ca.saisies) return;
                  Object.keys(ca.saisies).forEach(function (idS) {
                    const s = ca.saisies[idS];
                    if (!s) return;
                    lignes.push({ nj: nj, idBar: idBar, idCr: idCr, s: s });
                  });
                });
              });
            });
            lignes.sort(function (a, b) { return (a.s.date || 0) - (b.s.date || 0); });
            lignes.forEach(function (l) {
              const s = l.s;
              dataV.push([
                "J" + l.nj, nomBar(l.idBar), libCreneau(l.nj, l.idCr),
                fmtDH(s.date), s.montant || 0,
                s.nbPintes || 0, s.nbPichets || 0, s.nbGobelets || 0,
                s.padEnDefaut === true ? "oui" : "non",
                s.numeroPad || "",
                s.padEnDefaut === true ? (s.donneesPartielles === true ? "oui" : "non") : "",
                s.commentaire || "", s.par || "",
                s.annulee === true ? "oui" : "non",
                s.annulee === true ? (s.annuleePar || "") : ""
              ]);
            });
            XLSX.utils.book_append_sheet(wbJ, XLSX.utils.aoa_to_sheet(dataV), "Ventes détaillées");
            XLSX.writeFile(wbJ, "bars-nomades-final-journal-" + horodatage + ".xlsx");

            resolve();
          }).catch(reject);
        } catch (e) {
          reject(e);
        }
      });
    }

    function lancerExport() {
      setEnCours(true);
      setMessageErreur("");
      exporterTout().then(function () {
        setEnCours(false);
        setEtape("exportFait");
      }).catch(function (e) {
        setEnCours(false);
        setMessageErreur("Échec de l'export : " + e.message + ". " +
          "L'effacement est bloqué tant que l'export n'a pas réussi.");
      });
    }

    function effacer() {
      if (cleSaisie !== "EFFACER") {
        setMessageErreur("Vous devez taper EFFACER en majuscules pour confirmer.");
        return;
      }
      setEnCours(true);
      ActionsSession.remettreAZero(prenom).then(function () {
        setEnCours(false);
        alert("La session a été remise à zéro. Vous restez connecté.");
        onFermer();
      }).catch(function (e) {
        setEnCours(false);
        setMessageErreur("Erreur lors de l'effacement : " + e.message);
      });
    }

    return React.createElement(
      "div",
      { className: "fixed inset-0 bg-black/90 flex items-center justify-center p-4 z-50" },
      React.createElement(
        "div",
        { className: "bg-neutral-900 rounded-2xl w-full max-w-md p-6 border border-red-900" },

        React.createElement("h3", { className: "text-xl font-bold text-red-400 mb-2" },
          "Remise à zéro de la session"),
        React.createElement("p", { className: "text-sm text-neutral-300 mb-4" },
          "Cette action est IRRÉVERSIBLE. Elle effacera :"),
        React.createElement(
          "ul",
          { className: "text-sm text-neutral-400 list-disc list-inside space-y-1 mb-4" },
          React.createElement("li", null, "Tous les bars et leurs fûts en cours"),
          React.createElement("li", null, "L'historique complet des mouvements de fûts"),
          React.createElement("li", null, "Toutes les ventes saisies (tous les jours)"),
          React.createElement("li", null, "Tous les créneaux horaires"),
          React.createElement("li", null, "Tout le planning bénévoles"),
          React.createElement("li", null, "Tous les utilisateurs sauf vous")
        ),
        React.createElement("p", { className: "text-sm text-emerald-300 mb-4" },
          "✓ Les paramètres (prix, volumes, seuil...) seront PRÉSERVÉS."),

        /* Étape 1 : déclencher l'export. */
        etape === "init"
          ? React.createElement(
              "div",
              null,
              React.createElement("p", { className: "text-sm text-amber-300 mb-3" },
                "Étape 1/2 — Téléchargement des deux fichiers Excel obligatoire " +
                "avant l'effacement."),
              React.createElement(
                "button",
                {
                  onClick: lancerExport,
                  disabled: enCours,
                  className: "w-full py-3 bg-purple-700 hover:bg-purple-600 disabled:bg-neutral-700 text-white rounded-lg font-medium"
                },
                enCours ? "Export en cours…" : "Exporter et continuer"
              )
            )
          : null,

        /* Étape 2 : saisir la clé. */
        etape === "exportFait"
          ? React.createElement(
              "div",
              null,
              React.createElement("p", { className: "text-sm text-emerald-300 mb-2" },
                "✓ Étape 1/2 — Exports terminés."),
              React.createElement("p", { className: "text-sm text-amber-300 mb-2" },
                "Étape 2/2 — Pour confirmer l'effacement, tapez le mot EFFACER " +
                "(en majuscules) dans le champ ci-dessous :"),
              React.createElement("input", {
                type: "text",
                value: cleSaisie,
                onChange: function (e) { setCleSaisie(e.target.value); },
                className: "w-full px-3 py-2 bg-neutral-800 rounded-lg text-white text-center text-lg font-bold tracking-widest mb-3",
                placeholder: "EFFACER",
                autoFocus: true
              }),
              React.createElement(
                "button",
                {
                  onClick: effacer,
                  disabled: enCours || cleSaisie !== "EFFACER",
                  className: "w-full py-3 bg-red-700 hover:bg-red-600 disabled:bg-neutral-700 text-white rounded-lg font-medium"
                },
                enCours ? "Effacement…" : "Confirmer l'effacement"
              )
            )
          : null,

        /* Message d'erreur. */
        messageErreur
          ? React.createElement("p", { className: "text-xs text-red-300 mt-3 text-center" }, messageErreur)
          : null,

        /* Bouton annuler. */
        React.createElement(
          "button",
          {
            onClick: onFermer,
            disabled: enCours,
            className: "w-full mt-3 py-2 bg-neutral-700 hover:bg-neutral-600 text-neutral-300 rounded-lg text-sm"
          },
          "Annuler"
        )
      )
    );
  }

  /* =========================================================================
     SECTION 14decies — ÉCRAN PLAN DU FESTIVAL (module plan-1)

     Accessible à TOUS les rôles. Affichage scrollable du plan du Hellfest
     avec les pastilles des bars positionnés.

     Pour les admins et plus : bouton "Modifier les positions" qui active
     un mode édition. Dans ce mode, deux sous-modes :
       - "Naviguer" : le scroll est libre (consultation).
       - "Placer"   : le scroll est désactivé, un tap sur la carte ouvre
                      une fenêtre pour choisir quel bar placer ici.

     Stockage des positions : sessions/festival/positionsBars/<idBar>
                              avec { x, y } en pourcentage (0-100).
  ========================================================================= */
  function EcranPlan({ prenom, role, bars, onFermer }) {
    const [positions, setPositions] = useState({});
    /* État du mode édition (admin+ uniquement). */
    const [modeEdition, setModeEdition] = useState(false);
    /* En mode édition, sous-mode "nav" (scroll libre) ou "place" (tap pour placer). */
    const [sousMode, setSousMode] = useState("nav");
    /* Quand on tape sur la carte en mode "place", on stocke les coordonnées
       du clic et on ouvre la fenêtre de choix du bar. */
    const [tapEnAttente, setTapEnAttente] = useState(null);
    /* Niveau de zoom de l'image du plan UNIQUEMENT (1 = taille écran,
       2 = doublé, etc.). Géré par notre code, pas par le navigateur, pour
       ne PAS affecter le reste de l'app. Boutons + / - à l'écran. */
    const [zoom, setZoom] = useState(1);
    const ZOOM_MIN = 1, ZOOM_MAX = 4, ZOOM_PAS = 0.5;
    /* Bar dont la fiche est ouverte (Plan-2). Null si aucune fiche ouverte. */
    const [barFiche, setBarFiche] = useState(null);

    const peutPositionner = Droits.peutPositionnerBars(role);

    /* Abonnement temps réel aux positions. */
    useEffect(function () {
      const ref = Base.positionsBars();
      function surPositions(s) { setPositions(s.val() || {}); }
      ref.on("value", surPositions);
      return function () { ref.off("value", surPositions); };
    }, []);

    /* Liste des bars non placés (présents dans bars mais pas dans positions). */
    const barsNonPlaces = (bars || []).filter(function (b) {
      return !positions[b.id];
    });

    /* Liste des bars placés, avec leurs coordonnées. */
    const barsPlaces = (bars || []).map(function (b) {
      const p = positions[b.id];
      if (!p) return null;
      return { id: b.id, nom: b.nom, type: b.type, x: p.x, y: p.y, futs: b.futs };
    }).filter(function (b) { return b !== null; });

    /* Gestion du tap sur la carte en mode "place".
       On récupère les coordonnées du tap relatives à l'image,
       converties en pourcentage. */
    function tapSurCarte(e) {
      if (!modeEdition || sousMode !== "place") return;
      const img = e.currentTarget;
      const rect = img.getBoundingClientRect();
      /* Position du tap dans le repère de l'image (sans le scroll). */
      const xPx = e.clientX - rect.left;
      const yPx = e.clientY - rect.top;
      /* Conversion en pourcentage de la largeur/hauteur de l'image. */
      const xPct = (xPx / rect.width) * 100;
      const yPct = (yPx / rect.height) * 100;
      /* Bornes (au cas où). */
      if (xPct < 0 || xPct > 100 || yPct < 0 || yPct > 100) return;
      setTapEnAttente({ x: xPct, y: yPct });
    }

    function confirmerPlacement(idBar) {
      const t = tapEnAttente;
      if (!t) return;
      ActionsPlan.placerBar(idBar, t.x, t.y)
        .then(function () { setTapEnAttente(null); })
        .catch(function (e) { alert("Erreur : " + e.message); });
    }

    function retirerBarDuPlan(idBar) {
      if (!confirm("Retirer ce bar du plan ? (Il restera dans la liste des bars.)")) return;
      ActionsPlan.retirerDuPlan(idBar)
        .catch(function (e) { alert("Erreur : " + e.message); });
    }

    /* Quitter le mode édition revient automatiquement en mode nav. */
    function basculerEdition() {
      if (modeEdition) {
        setModeEdition(false);
        setSousMode("nav");
        setTapEnAttente(null);
      } else {
        setModeEdition(true);
      }
    }

    /* Couleur de pastille selon le type de bar. */
    function couleurPastille(type) {
      return type === TYPE_BAR.BIERE
        ? "bg-amber-500 border-amber-200"
        : "bg-green-500 border-green-200";
    }

    return React.createElement(
      "div",
      { className: "fixed inset-0 bg-black z-40 flex flex-col" },

      /* En-tête. */
      React.createElement(
        "div",
        { className: "p-3 border-b border-neutral-800 flex items-center justify-between" },
        React.createElement(
          "div",
          null,
          React.createElement("h2", { className: "text-lg font-bold text-green-400" }, "Plan du festival"),
          React.createElement("p", { className: "text-xs text-neutral-500" },
            barsPlaces.length + " bar(s) placé(s) / " + (bars || []).length + " au total")
        ),
        React.createElement(
          "button",
          { onClick: onFermer, className: "text-xs px-3 py-1.5 bg-neutral-800 text-neutral-300 rounded-lg" },
          "Fermer"
        )
      ),

      /* Barre du mode édition (admin et plus). */
      peutPositionner
        ? React.createElement(
            "div",
            { className: "px-3 py-2 border-b border-neutral-800 flex items-center gap-2" },
            React.createElement(
              "button",
              {
                onClick: basculerEdition,
                className: "text-xs px-3 py-1.5 rounded-lg font-medium " +
                  (modeEdition ? "bg-red-700 text-white" : "bg-neutral-800 text-neutral-300")
              },
              modeEdition ? "Quitter l'édition" : "Modifier les positions"
            ),
            /* Sous-modes navigation/placement, visibles seulement en édition. */
            modeEdition
              ? React.createElement(
                  "div",
                  { className: "flex gap-1" },
                  React.createElement(
                    "button",
                    {
                      onClick: function () { setSousMode("nav"); },
                      className: "text-xs px-3 py-1.5 rounded-lg " +
                        (sousMode === "nav" ? "bg-blue-700 text-white" : "bg-neutral-900 text-neutral-500")
                    },
                    "Naviguer"
                  ),
                  React.createElement(
                    "button",
                    {
                      onClick: function () { setSousMode("place"); },
                      className: "text-xs px-3 py-1.5 rounded-lg " +
                        (sousMode === "place" ? "bg-emerald-700 text-white" : "bg-neutral-900 text-neutral-500")
                    },
                    "Placer"
                  )
                )
              : null
          )
        : null,

      /* Message d'aide selon le mode. */
      modeEdition
        ? React.createElement(
            "div",
            { className: "px-3 py-1.5 text-xs text-center " +
                (sousMode === "place" ? "bg-emerald-950/50 text-emerald-300"
                  : "bg-neutral-900 text-neutral-400") },
            sousMode === "place"
              ? "Tapez sur le plan à l'endroit où placer un bar"
              : "Zoomez ou faites défiler, puis « Placer »"
          )
        : null,

      React.createElement(

            style: { width: (zoom * 100) + "%" }

          barsPlaces.map(function (b) {

              /* Bouton fermer. */
              React.createElement(

                },

  /* =========================================================================

     un guide d'apprentissage. Les guides détaillés sont fournis à part
     (PDF distincts pour secrétaire et admin).
  ========================================================================= */
  function FenetreMemoAide({ role, onFermer }) {

          className: "bg-neutral-900 rounded-2xl w-full max-w-md p-5 max-h-[85vh] overflow-y-auto border border-emerald-800",
          onClick: function (e) { e.stopPropagation(); }
        },

        /* En-tête (uniquement en vue grille, masqué en vue détail). */
        carteSelectionnee === null
          ? React.createElement(
              "div",
              { className: "flex items-center justify-between mb-3" },

              React.createElement("span", { className: "text-xs text-neutral-500" }, titreRole)
            )
          : null,

        /* Vue active : grille ou détail. */
        carteSelectionnee === null ? vueGrille() : vueDetail(),

        /* Bouton fermer. */
        React.createElement(
          "button",
          {
            onClick: onFermer,
            className: "w-full mt-4 py-2 bg-emerald-700 hover:bg-emerald-600 text-white rounded-lg text-sm font-medium"
          },
          "Fermer"
        )
