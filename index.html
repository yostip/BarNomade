<!DOCTYPE html>
<!--
===============================================================================
  GESTION DES FÛTS - BARS NOMADES - HELLFEST
  Application reconstruite proprement (remplace la version V16-V23 minifiée).

  ÉTAT : MODULES 1 + 2 + 3A + 3B (complet) + PARAMÈTRES + PLANNING + DASHBOARD + UTILISATEURS + PLAN (complet)
  Contenu actuel :
    - démarrage, Firebase, authentification anonyme             (module 1)
    - écran d'accueil (prénom), connexion utilisateur           (module 1)
    - gestion des BARS : créer, renommer, supprimer             (module 2)
    - gestion des FÛTS : attribuer, retourner, stock            (module 2)
    - gestion des JOURS et des CRÉNEAUX horaires                (module 3A)
    - SAISIE DES VENTES                                         (module 3B)
    - écran PARAMÈTRES                                          (module params)
    - PLANNING BÉNÉVOLES                                        (module planning)
    - DASHBOARD : 4 onglets, exports Excel récap + journal      (module dashboard)
    - UTILISATEURS + remise à zéro session                      (module users)
    - PLAN DU FESTIVAL : affichage scrollable du plan,
      zoom maison (1× à 4×) sans affecter le reste de l'app,
      pastilles cliquables, placement par mode édition,
      fiche du bar au clic (niveau A pour visiteur = minimum,
      niveau B pour autres = détail des fûts en cours).         (module plan)

  Pas encore inclus : doc technique pour les amis devs.

  PRINCIPE D'ARCHITECTURE
    - Un seul fichier HTML. Code lisible, commenté en français, non minifié.
    - Une seule "session" pour tout le festival (sessions/festival).
    - 4 rôles : visiteur, secretaire, admin, superadmin.
    - AUCUN mot de passe dans ce fichier. Droits = rôle stocké en base.

  NOTE DÉVELOPPEURS — JOURS ET CRÉNEAUX (module 3A)
    Le festival a un NOMBRE DE JOURS réglable (paramètre nombreJours).
    Chaque jour a SA PROPRE liste de créneaux horaires : un jour peut avoir
    des créneaux différents d'un autre. Les créneaux d'un jour sont stockés
    sous sessions/festival/creneaux/jour<N>.
    Un créneau = { id (clé unique Firebase), libelle (texte affiché) }.
    Le "jour actif" (jourActuel) est partagé par tous : il pilote ce que
    voient les utilisateurs. Modifiable par admin/superadmin.
===============================================================================
-->
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="theme-color" content="#39ff14" />
  <title>Bars Nomades — Gestion des Fûts</title>

  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Bars Nomades" />

  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>

  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>

</head>

<body class="bg-black">
  <div id="root"></div>

  <script>
  /* =========================================================================
     OUTILS RACCOURCIS REACT
  ========================================================================= */
  const { useState, useEffect } = React;

  /* =========================================================================
     CONFIGURATION FIREBASE
     Coordonnées du projet. Non secrètes : la sécurité repose sur les RÈGLES.
  ========================================================================= */
  const firebaseConfig = {
    apiKey: "AIzaSyCgl30syyCEJif9q96E2jzv-aTXxXgvgv0",
    authDomain: "gestion-futs-hellfest.firebaseapp.com",
    databaseURL: "https://gestion-futs-hellfest-default-rtdb.europe-west1.firebasedatabase.app",
    projectId: "gestion-futs-hellfest",
    storageBucket: "gestion-futs-hellfest.firebasestorage.app",
    messagingSenderId: "107509834680",
    appId: "1:107509834680:web:3a58295d3268b5d19f654d"
  };

  firebase.initializeApp(firebaseConfig);
  const db = firebase.database();
  const auth = firebase.auth();

  /* =========================================================================
     CONSTANTES DE L'APPLICATION
  ========================================================================= */
  const ID_SESSION = "festival";

  const ROLES = {
    VISITEUR: "visiteur",
    SECRETAIRE: "secretaire",
    ADMIN: "admin",
    SUPERADMIN: "superadmin"
  };

  const TYPE_BAR = {
    BIERE: "biere",
    CIDRE: "cidre"
  };

  /* Façons de retourner un fût. */
  const RETOUR = {
    VIDE: "vide",
    CASSE: "casse",
    NON_TERMINE: "non_termine",
    PLEIN: "plein"
  };

  /* Réglages par défaut (le super admin les changera au module 4). */
  /* Réglages par défaut, utilisés tant que l'admin n'a pas configuré
     les paramètres depuis l'écran dédié. */
  const PARAMS_DEFAUT = {
    stockInitialBiere: 50,
    stockInitialCidre: 20,
    maxFutsParBar: 3,
    nombreJours: 4,
    /* Prix unitaires en euros. Utilisés en module dashboard pour calculer
       le CA théorique (volet "écarts"). */
    prixPinte: 6,
    prixPichet: 15,
    prixGobelet: 2,
    /* Volumes d'un fût en litres. */
    volumeFutBiere: 30,
    volumeFutCidre: 20,
    /* Volumes d'un service en CL (centilitres).
       Utilisés en module dashboard pour le contrôle de cohérence
       (volume sorti via les fûts vs volume vendu via les saisies).
       Pas de "volumeGobelet" : le gobelet est un consommable, pas une boisson. */
    volumePinte: 50,
    volumePichet: 100,
    /* Seuil de tolérance de perte, en %. Sert uniquement au contrôle
       cohérence volumes dans le dashboard (pas de contrôle sur les prix).
       Typiquement entre 5 et 10 % selon la politique du festival.
       Au-delà du seuil, le bar sera signalé dans le dashboard. */
    seuilTolerancePerte: 7
  };

  const STOCKAGE = { PRENOM: "barnomade_prenom" };

  /* =========================================================================
     SECTION 1 — AUTHENTIFICATION
  ========================================================================= */
  function obtenirBadgeAnonyme() {
    return auth.signInAnonymously();
  }

  /* =========================================================================
     SECTION 2 — RÉFÉRENCES À LA BASE
  ========================================================================= */
  const Base = {
    utilisateur: function (prenom) {
      return db.ref("sessions/" + ID_SESSION + "/users/" + prenom);
    },
    bars: function () {
      return db.ref("sessions/" + ID_SESSION + "/bars");
    },
    bar: function (idBar) {
      return db.ref("sessions/" + ID_SESSION + "/bars/" + idBar);
    },
    futsDuBar: function (idBar) {
      return db.ref("sessions/" + ID_SESSION + "/bars/" + idBar + "/futs");
    },
    historiqueFuts: function () {
      return db.ref("sessions/" + ID_SESSION + "/historiqueFuts");
    },
    /* Les paramètres généraux (stock initial, nombre de jours...). */
    params: function () {
      return db.ref("sessions/" + ID_SESSION + "/params");
    },
    /* Le jour actuellement actif (un simple nombre, partagé par tous). */
    jourActuel: function () {
      return db.ref("sessions/" + ID_SESSION + "/jourActuel");
    },
    /* Les créneaux d'un jour donné (numéro du jour). */
    creneauxDuJour: function (numeroJour) {
      return db.ref("sessions/" + ID_SESSION + "/creneaux/jour" + numeroJour);
    },
    /* ----- VENTES (module 3B) -----
       Une "case de vente" = un bar + un créneau + un jour. Elle est rangée
       sous ventes/jour<N>/<idBar>/<idCreneau>. Chaque case contient :
         - cloturee : true/false (drapeau de clôture explicite — option A)
         - saisies  : la liste des saisies PAD (clés uniques), ajoutée en 3B-2
       En 3B-1 on gère le cas simple : une seule saisie, PAD OK. */
    casesVentesDuJour: function (numeroJour) {
      return db.ref("sessions/" + ID_SESSION + "/ventes/jour" + numeroJour);
    },
    caseVente: function (numeroJour, idBar, idCreneau) {
      return db.ref("sessions/" + ID_SESSION + "/ventes/jour" + numeroJour +
        "/" + idBar + "/" + idCreneau);
    },
    /* ----- PLANNING BÉNÉVOLES (module planning) -----
       Un "shift" = un bar + un créneau + un jour. Il contient 3 postes :
         - vendeur (au PAD)
         - serveur (sert la bière)
         - runner (approvisionnement, peut couvrir plusieurs bars)
       Rangé sous planning/jour<N>/<idBar>/<idCreneau>.
       Format : { vendeur: "Kevin", serveur: "Marie", runner: "Paul" }
       Un poste vide = pas affecté (shift incomplet autorisé). */
    planningDuJour: function (numeroJour) {
      return db.ref("sessions/" + ID_SESSION + "/planning/jour" + numeroJour);
    },
    shiftPlanning: function (numeroJour, idBar, idCreneau) {
      return db.ref("sessions/" + ID_SESSION + "/planning/jour" + numeroJour +
        "/" + idBar + "/" + idCreneau);
    },
    /* ----- POSITIONS DES BARS SUR LE PLAN (module plan-1) -----
       Format : { idBar: { x: 12.5, y: 34.0 } }
       Les coordonnées sont en POURCENTAGE de la taille naturelle de
       l'image (entre 0 et 100). Pas en pixels — pour rester valide
       quelle que soit la résolution de l'image, et pour qu'un changement
       d'image en 2027 ne casse pas les positions. */
    positionsBars: function () {
      return db.ref("sessions/" + ID_SESSION + "/positionsBars");
    },
    positionBar: function (idBar) {
      return db.ref("sessions/" + ID_SESSION + "/positionsBars/" + idBar);
    },
    /* ----- POT DE FÛTS EN ATTENTE (module fûts non terminés) -----
       Format : { idFutAttente: { type, dateRetour, idBarPrecedent,
                                  nomBarPrecedent, retourPar } }
       Quand un fût est retourné "non terminé" depuis un bar, il vient
       ici. Il peut ensuite être réattribué à n'importe quel bar du
       même type (bière vers bar bière, cidre vers bar cidre).
       Lien avec l'historique : à l'aller-retour fût-pot, deux entrées
       sont créées dans historiqueFuts ("retour" puis "reattribution"
       lors de la réutilisation). */
    futsEnAttente: function () {
      return db.ref("sessions/" + ID_SESSION + "/futsEnAttente");
    },
    futEnAttente: function (idAttente) {
      return db.ref("sessions/" + ID_SESSION + "/futsEnAttente/" + idAttente);
    }
  };

  /* =========================================================================
     SECTION 3 — ÉCRANS UTILITAIRES
  ========================================================================= */
  function EcranChargement({ message }) {
    return React.createElement(
      "div",
      { className: "min-h-screen flex flex-col items-center justify-center bg-black text-green-400" },
      React.createElement("p", { className: "text-lg" }, "Chargement…"),
      React.createElement("p", { className: "text-xs text-neutral-500 mt-2" }, message || "")
    );
  }

  function EcranErreur({ details }) {
    return React.createElement(
      "div",
      { className: "min-h-screen flex flex-col items-center justify-center bg-black text-red-400 p-6 text-center" },
      React.createElement("p", { className: "text-lg font-bold mb-2" }, "Impossible de démarrer l'application"),
      React.createElement("p", { className: "text-sm text-neutral-400" }, details || "Erreur inconnue."),
      React.createElement("p", { className: "text-xs text-neutral-600 mt-4" },
        "Vérifiez votre connexion internet, puis rechargez la page.")
    );
  }

  /* =========================================================================
     SECTION 4 — ÉCRAN D'ACCUEIL
  ========================================================================= */
  function EcranAccueil({ onEntrer }) {
    const [prenom, setPrenom] = useState("");

    useEffect(function () {
      const memorise = localStorage.getItem(STOCKAGE.PRENOM);
      if (memorise) setPrenom(memorise);
    }, []);

    function valider() {
      const valeur = prenom.trim();
      if (!valeur) return;
      localStorage.setItem(STOCKAGE.PRENOM, valeur);
      onEntrer(valeur);
    }

    return React.createElement(
      "div",
      { className: "min-h-screen flex items-center justify-center bg-black p-4" },
      React.createElement(
        "div",
        { className: "w-full max-w-sm" },
        React.createElement(
          "div",
          { className: "text-center mb-8" },
          /* Logo Hellfest — la croix verte, identité visuelle du festival.
             Le fichier "logo-hellfest.png" doit être à la racine du dépôt. */
          React.createElement("img", {
            src: "logo-hellfest.png",
            alt: "Hellfest",
            className: "mx-auto h-16 w-auto mb-4"
          }),
          React.createElement("h1", { className: "text-2xl font-bold text-white" }, "Bars Nomades"),
          React.createElement("p", { className: "text-green-400 font-bold mt-1" }, "Gestion des Fûts")
        ),
        React.createElement(
          "div",
          { className: "space-y-4" },
          React.createElement("label", { className: "block text-neutral-400 text-sm" }, "Ton prénom ou surnom"),
          React.createElement("input", {
            type: "text",
            value: prenom,
            onChange: function (e) { setPrenom(e.target.value); },
            onKeyDown: function (e) { if (e.key === "Enter") valider(); },
            placeholder: "Ex : Kevin",
            className: "w-full px-4 py-3 bg-neutral-900 border border-neutral-700 rounded-xl text-white text-lg",
            autoFocus: true
          }),
          React.createElement(
            "button",
            {
              onClick: valider,
              className: "w-full py-4 bg-red-600 hover:bg-red-700 text-white rounded-xl font-bold text-lg transition-colors"
            },
            "Entrer"
          )
        )
      )
    );
  }

  /* =========================================================================
     SECTION 5 — DROITS
     Conforme au tableau des permissions gelé.
  ========================================================================= */
  const Droits = {
    /* Gérer les fûts : secrétaire et plus. */
    peutGererFuts: function (role) {
      return role === ROLES.SECRETAIRE || role === ROLES.ADMIN || role === ROLES.SUPERADMIN;
    },
    /* Gérer les bars : admin et plus. */
    peutGererBars: function (role) {
      return role === ROLES.ADMIN || role === ROLES.SUPERADMIN;
    },
    /* Changer le jour actif : admin et plus. */
    peutChangerJour: function (role) {
      return role === ROLES.ADMIN || role === ROLES.SUPERADMIN;
    },
    /* Configurer les créneaux horaires : super admin uniquement
       (conforme au tableau gelé). */
    peutGererCreneaux: function (role) {
      return role === ROLES.SUPERADMIN;
    },
    /* Saisir les ventes : secrétaire et plus (module 3B). */
    peutSaisirVentes: function (role) {
      return role === ROLES.SECRETAIRE || role === ROLES.ADMIN || role === ROLES.SUPERADMIN;
    },
    /* Modifier les paramètres : admin et plus (conforme au tableau gelé). */
    peutGererParams: function (role) {
      return role === ROLES.ADMIN || role === ROLES.SUPERADMIN;
    },
    /* Gérer le planning bénévoles : secrétaire et plus
       (conforme au tableau gelé). */
    peutGererPlanning: function (role) {
      return role === ROLES.SECRETAIRE || role === ROLES.ADMIN || role === ROLES.SUPERADMIN;
    },
    /* Voir le dashboard / stats / historiques : admin et plus
       (conforme au tableau gelé). */
    peutVoirDashboard: function (role) {
      return role === ROLES.ADMIN || role === ROLES.SUPERADMIN;
    },
    /* Gérer les utilisateurs (promotion/rétrogradation visiteur<->secrétaire,
       éjection) : admin et plus, conforme au tableau gelé. */
    peutGererUtilisateurs: function (role) {
      return role === ROLES.ADMIN || role === ROLES.SUPERADMIN;
    },
    /* Remise à zéro de la session : super admin uniquement,
       conforme au tableau gelé. */
    peutRemettreAZero: function (role) {
      return role === ROLES.SUPERADMIN;
    },
    /* Positionner les bars sur le plan : admin et plus.
       Décision validée par Yoann (tableau gelé mentionne "super admin",
       élargi à admin pour ne pas dépendre d'une seule personne en
       cours de festival). */
    peutPositionnerBars: function (role) {
      return role === ROLES.ADMIN || role === ROLES.SUPERADMIN;
    }
  };

  /* =========================================================================
     SECTION 6 — ACTIONS SUR LES BARS
  ========================================================================= */
  const ActionsBars = {
    creer: function (nom, type) {
      const nomPropre = (nom || "").trim();
      if (!nomPropre) return Promise.reject(new Error("Nom de bar vide"));
      return Base.bars().push({ nom: nomPropre, type: type });
    },
    renommer: function (idBar, nouveauNom) {
      const nomPropre = (nouveauNom || "").trim();
      if (!nomPropre) return Promise.reject(new Error("Nom de bar vide"));
      return Base.bar(idBar).child("nom").set(nomPropre);
    },
    supprimer: function (bar) {
      const nbFuts = bar.futs ? Object.keys(bar.futs).length : 0;
      if (nbFuts > 0) {
        return Promise.reject(new Error("Ce bar a encore " + nbFuts + " fût(s). Retournez-les d'abord."));
      }
      return Base.bar(bar.id).remove();
    }
  };

  /* =========================================================================
     SECTION 7 — ACTIONS SUR LES FÛTS
     L'attribution utilise une TRANSACTION (anti-concurrence).
  ========================================================================= */
  const ActionsFuts = {
    attribuer: function (bar, type, maxFuts, prenomUtilisateur) {
      const nbFutsActuels = bar.futs ? Object.keys(bar.futs).length : 0;
      if (nbFutsActuels >= maxFuts) {
        return Promise.reject(new Error("Ce bar a déjà le maximum de fûts (" + maxFuts + ")."));
      }
      const referenceFuts = Base.futsDuBar(bar.id);
      return referenceFuts.transaction(function (futsActuels) {
        const futs = futsActuels || {};
        if (Object.keys(futs).length >= maxFuts) return;
        const cleNouveauFut = referenceFuts.push().key;
        futs[cleNouveauFut] = {
          type: type,
          dateAttribution: Date.now(),
          attribuePar: prenomUtilisateur
        };
        return futs;
      }).then(function (resultat) {
        if (!resultat.committed) {
          throw new Error("Ce bar vient d'atteindre son maximum de fûts.");
        }
        return Base.historiqueFuts().push({
          mouvement: "attribution",
          typeFut: type,
          idBar: bar.id,
          nomBar: bar.nom,
          par: prenomUtilisateur,
          date: Date.now()
        });
      });
    },
    retourner: function (bar, idFut, fut, motif, commentaire, prenomUtilisateur) {
      /* COMPORTEMENT SPÉCIAL pour le motif "non terminé" :
         Au lieu de simplement retirer le fût du bar, on le déplace dans
         le pot "fûts en attente". Il pourra être réattribué plus tard à
         n'importe quel bar du même type via reattribuerDepuisPot.
         Le calcul du stock reste correct : le fût a été comptabilisé
         comme sorti à son attribution initiale, il n'est pas remis au
         stock central (juste en attente d'usage). */
      if (motif === RETOUR.NON_TERMINE) {
        /* On retire du bar, on enregistre l'historique (retour), puis on
           crée une entrée dans le pot. */
        return Base.futsDuBar(bar.id).child(idFut).remove().then(function () {
          return Base.historiqueFuts().push({
            mouvement: "retour",
            motifRetour: motif,
            typeFut: fut.type,
            idBar: bar.id,
            nomBar: bar.nom,
            commentaire: (commentaire || "").trim(),
            par: prenomUtilisateur,
            date: Date.now()
          });
        }).then(function () {
          return Base.futsEnAttente().push({
            type: fut.type,
            dateRetour: Date.now(),
            idBarPrecedent: bar.id,
            nomBarPrecedent: bar.nom,
            retourPar: prenomUtilisateur
          });
        });
      }
      /* Cas normal (vide, cassé, plein) : on retire du bar et on
         enregistre l'historique. Comportement inchangé. */
      return Base.futsDuBar(bar.id).child(idFut).remove().then(function () {
        return Base.historiqueFuts().push({
          mouvement: "retour",
          motifRetour: motif,
          typeFut: fut.type,
          idBar: bar.id,
          nomBar: bar.nom,
          commentaire: (commentaire || "").trim(),
          par: prenomUtilisateur,
          date: Date.now()
        });
      });
    },

    /* Réattribue un fût depuis le pot d'attente vers un bar.
       Le bar doit être du MÊME TYPE que le fût (bière → bar bière,
       cidre → bar cidre). Génère un mouvement "reattribution" dans
       l'historique (distinct d'"attribution" pour ne pas le compter
       deux fois comme sortie de stock dans le dashboard). */
    reattribuerDepuisPot: function (idAttente, futAttente, bar, prenomUtilisateur) {
      if (futAttente.type !== bar.type) {
        return Promise.reject(new Error("Type incompatible : fût " + futAttente.type +
          " vers bar " + bar.type));
      }
      /* On crée un nouveau fût sur le bar avec un nouvel identifiant.
         Le lien avec le fût initial est tracé via l'historique. */
      const refFut = Base.futsDuBar(bar.id).push();
      return refFut.set({
        type: futAttente.type,
        dateAttribution: Date.now(),
        attribuePar: prenomUtilisateur,
        provenance: "pot"          /* trace que ce fût vient du pot */
      }).then(function () {
        return Base.historiqueFuts().push({
          mouvement: "reattribution",      /* DIFFÉRENT d'attribution */
          typeFut: futAttente.type,
          idBar: bar.id,
          nomBar: bar.nom,
          idBarPrecedent: futAttente.idBarPrecedent,
          nomBarPrecedent: futAttente.nomBarPrecedent,
          par: prenomUtilisateur,
          date: Date.now()
        });
      }).then(function () {
        /* Retirer du pot. */
        return Base.futEnAttente(idAttente).remove();
      });
    },

    /* ===== ANNULATION D'ACTIONS (admin et plus) =====
       Principe : on ne SUPPRIME PAS le mouvement initial, on le MARQUE
       comme annulé (annule: true) et on ajoute un nouveau mouvement
       inverse. Cohérent avec l'annulation des saisies de vente.
       Les agrégations (dashboard, stock, cohérence) IGNORENT les
       mouvements annulés et les annulations elles-mêmes. */

    /* Annule une ATTRIBUTION : retire le fût du bar (puisqu'il ne devait
       pas y être). Crée un mouvement "annulation_attribution".
       "idMouvement" est la clé Firebase du mouvement initial dans
       historiqueFuts. "mvt" est le mouvement lui-même (pour avoir le bar,
       le type, etc.). "idFut" est l'id du fût actuellement sur le bar. */
    annulerAttribution: function (idMouvement, mvt, idFut, prenomUtilisateur) {
      /* Marquer le mouvement initial comme annulé. */
      return Base.historiqueFuts().child(idMouvement).update({ annule: true })
        .then(function () {
          /* Retirer le fût du bar (s'il y est encore — sécurité). */
          if (idFut) {
            return Base.futsDuBar(mvt.idBar).child(idFut).remove();
          }
        })
        .then(function () {
          /* Tracer l'annulation. */
          return Base.historiqueFuts().push({
            mouvement: "annulation_attribution",
            idMouvementAnnule: idMouvement,
            typeFut: mvt.typeFut,
            idBar: mvt.idBar,
            nomBar: mvt.nomBar,
            par: prenomUtilisateur,
            date: Date.now()
          });
        });
    },

    /* Annule un RETOUR : remet le fût sur le bar d'origine.
       Selon le motif du retour :
         - vide / cassé : on crée un NOUVEAU fût sur le bar (pas de
           sortie de stock supplémentaire, car le retour initial est
           neutralisé par l'annulation).
         - plein : pareil, et il faudra ré-ajuster le stock central
           (le retour plein avait ajouté 1, on retire 1).
         - non terminé : on retire le fût du pot et on le remet sur le bar.
       "idMouvement" = clé du mouvement de retour initial dans historiqueFuts.
       "mvt" = le mouvement de retour. */
    annulerRetour: function (idMouvement, mvt, prenomUtilisateur) {
      /* On marque d'abord le retour initial comme annulé. */
      return Base.historiqueFuts().child(idMouvement).update({ annule: true })
        .then(function () {
          /* Cas spécial : retour "non terminé" -> on retrouve le fût
             dans le pot et on le retire pour le remettre sur le bar.
             On retrouve par : type, idBarPrecedent, dateRetour proche. */
          if (mvt.motifRetour === RETOUR.NON_TERMINE) {
            return Base.futsEnAttente().once("value").then(function (snap) {
              const pot = snap.val() || {};
              /* Trouve l'entrée du pot qui correspond au retour. */
              let idPotMatch = null;
              Object.keys(pot).forEach(function (idA) {
                const e = pot[idA];
                if (!e) return;
                if (e.type === mvt.typeFut &&
                    e.idBarPrecedent === mvt.idBar &&
                    Math.abs((e.dateRetour || 0) - (mvt.date || 0)) < 5000) {
                  idPotMatch = idA;
                }
              });
              if (idPotMatch) {
                return Base.futEnAttente(idPotMatch).remove();
              }
              /* Si on ne trouve pas dans le pot (réattribué entre temps),
                 on continue quand même : on remettra un nouveau fût sur
                 le bar. Cas rare. */
            });
          }
        })
        .then(function () {
          /* Recréer un fût sur le bar d'origine (nouvelle identité). */
          const refNouveauFut = Base.futsDuBar(mvt.idBar).push();
          return refNouveauFut.set({
            type: mvt.typeFut,
            dateAttribution: Date.now(),
            attribuePar: prenomUtilisateur,
            provenance: "annulation_retour"
          });
        })
        .then(function () {
          /* Tracer l'annulation. */
          return Base.historiqueFuts().push({
            mouvement: "annulation_retour",
            idMouvementAnnule: idMouvement,
            motifRetourAnnule: mvt.motifRetour,
            typeFut: mvt.typeFut,
            idBar: mvt.idBar,
            nomBar: mvt.nomBar,
            par: prenomUtilisateur,
            date: Date.now()
          });
        });
    }
  };

  /* =========================================================================
     SECTION 8 — ACTIONS SUR LES JOURS ET LES CRÉNEAUX (module 3A)
  ========================================================================= */
  const ActionsCreneaux = {

    /* Change le jour actif (le nombre partagé par tous). */
    definirJourActuel: function (numeroJour) {
      return Base.jourActuel().set(numeroJour);
    },

    /* Ajoute un créneau à un jour. push() = clé unique. */
    ajouter: function (numeroJour, libelle) {
      const texte = (libelle || "").trim();
      if (!texte) return Promise.reject(new Error("Libellé de créneau vide"));
      return Base.creneauxDuJour(numeroJour).push({ libelle: texte });
    },

    /* Renomme un créneau existant. */
    renommer: function (numeroJour, idCreneau, nouveauLibelle) {
      const texte = (nouveauLibelle || "").trim();
      if (!texte) return Promise.reject(new Error("Libellé de créneau vide"));
      return Base.creneauxDuJour(numeroJour).child(idCreneau).child("libelle").set(texte);
    },

    /* Supprime un créneau.
       NOTE : en 3B (saisie des ventes), on ajoutera un garde-fou pour
       empêcher de supprimer un créneau qui a déjà des ventes saisies.
       Pour l'instant (3A) il n'y a pas encore de ventes : suppression libre. */
    supprimer: function (numeroJour, idCreneau) {
      return Base.creneauxDuJour(numeroJour).child(idCreneau).remove();
    },

    /* Copie tous les créneaux d'un jour vers un autre.
       Pratique quand deux journées ont les mêmes horaires : évite de tout
       retaper. Les créneaux du jour de destination sont remplacés. */
    copierDepuisJour: function (jourSource, jourDestination) {
      return Base.creneauxDuJour(jourSource).once("value").then(function (instantane) {
        const creneauxSource = instantane.val();
        if (!creneauxSource) {
          return Promise.reject(new Error("Le jour " + jourSource + " n'a aucun créneau à copier."));
        }
        /* On recrée chaque créneau dans le jour de destination, avec de
           nouvelles clés uniques (on ne réutilise pas les clés source). */
        const refDestination = Base.creneauxDuJour(jourDestination);
        const nouveau = {};
        Object.keys(creneauxSource).forEach(function (idSource) {
          const cleNeuve = refDestination.push().key;
          nouveau[cleNeuve] = { libelle: creneauxSource[idSource].libelle };
        });
        return refDestination.set(nouveau);
      });
    }
  };

  /* =========================================================================
     SECTION 8ter — ACTIONS SUR LES PARAMÈTRES GÉNÉRAUX (module paramètres)

  const ActionsParams = {

  /* =========================================================================
     SECTION 8quater — ACTIONS SUR LE PLANNING BÉNÉVOLES (module planning)
     Réservé secrétaire et plus (conforme au tableau gelé).

     RÈGLES MÉTIER (gelées)
       - Un shift = bar + créneau + jour ; 3 postes : vendeur, serveur, runner.
       - Saisie nom/prénom en TEXTE LIBRE (pas de référentiel pour l'instant).
       - Shifts INCOMPLETS autorisés (un poste vide = pas affecté).
       - Vendeur et serveur sont UNIQUES par créneau (un bénévole ne peut
         pas occuper l'un de ces postes sur deux bars différents au même

       - Runner peut être runner sur PLUSIEURS bars au même créneau.
       - Mais un runner reste runner UNIQUEMENT : pas de cumul avec

  const ActionsPlanning = {

    /* Enregistre (ou met à jour) un shift complet.
       "shift" = { vendeur, serveur, runner } — chaque valeur peut être

    enregistrerShift: function (numeroJour, idBar, idCreneau, shift) {

  /* =========================================================================
     SECTION 8quinquies — ACTIONS UTILISATEURS (module utilisateurs)
     Réservé admin et plus.

     RÈGLES MÉTIER (gelées)
       - Promotion/rétrogradation : UNIQUEMENT visiteur <-> secrétaire.

       - Éjection : suppression DOUCE de l'entrée utilisateur (option A).

       - Auto-protection : un utilisateur ne peut pas s'éjecter lui-même

         par personne (il est unique et créateur de la session).
  ========================================================================= */
  const ActionsUtilisateurs = {

  /* =========================================================================
     SECTION 8sexies — ACTIONS SESSION (remise à zéro)
     Réservé super admin uniquement.

     COMPORTEMENT (gelé)
       Efface : bars, historique fûts, ventes (tous jours), créneaux (tous
       jours), planning bénévoles (tous jours), utilisateurs SAUF le super
       admin connecté, jour actuel.
       PRÉSERVE : paramètres (prix, volumes, seuil, etc. — pour ne pas les
       ressaisir l'an prochain), l'entrée utilisateur du super admin.
  ========================================================================= */
  const ActionsSession = {

    /* Efface tous les sous-noeuds de la session SAUF "params" et l'entrée
       du super admin sous "users". On utilise un update() avec des null
       pour effacer plusieurs noeuds en une seule opération atomique. */
    remettreAZero: function (prenomSuperAdmin) {
      /* Lecture préalable : on doit garder l'entrée du super admin. */
      const refSession = db.ref("sessions/" + ID_SESSION);
      return refSession.child("users/" + prenomSuperAdmin).once("value")
        .then(function (snap) {
          const donneesSuperAdmin = snap.val();
          /* Effacement par "set null" sur les noeuds visés. */
          const maj = {
            bars: null,
            historiqueFuts: null,
            ventes: null,
            creneaux: null,
            planning: null,
            jourActuel: null,
            users: null,
            positionsBars: null,    /* on efface aussi les positions */
            futsEnAttente: null     /* et le pot de fûts en attente */
          };
          return refSession.update(maj).then(function () {
            /* ...puis on remet uniquement le super admin. */
            if (donneesSuperAdmin) {
              return refSession.child("users/" + prenomSuperAdmin).set(donneesSuperAdmin);
            }
          });
        });
    }

  /* =========================================================================
     SECTION 8septies — ACTIONS PLAN (module plan-1)
     Positionnement des bars sur le plan du festival.
  ========================================================================= */
  const ActionsPlan = {
    /* Définit ou met à jour la position d'un bar.
       x et y sont en pourcentage (0-100). */
    placerBar: function (idBar, x, y) {
      return Base.positionBar(idBar).set({ x: x, y: y });
    },
    /* Retire un bar du plan (sans le supprimer de la liste des bars). */
    retirerDuPlan: function (idBar) {
      return Base.positionBar(idBar).remove();
    }
  };

  /* Détecte les conflits d'affectation pour un shift en cours d'édition.
     "planningDuJour" = tous les shifts du jour, format Firebase
                        { idBar: { idCreneau: { vendeur, serveur, runner } } }
     "idBar" / "idCreneau" = le shift qu'on est en train de modifier
                              (ses propres affectations ne sont pas un conflit)
     "shift" = nouveau contenu { vendeur, serveur, runner }

     Renvoie un tableau de messages de conflit, vide si tout va bien. */
  function detecterConflitsShift(planningDuJour, idBar, idCreneau, shift) {
    const conflits = [];
    const vendeurNew = (shift.vendeur || "").trim();
    const serveurNew = (shift.serveur || "").trim();
    const runnerNew = (shift.runner || "").trim();

    /* Parcourt tous les autres shifts du même créneau (= mêmes barres,
       même idCreneau) pour chercher des collisions. */
    Object.keys(planningDuJour || {}).forEach(function (idBarAutre) {
      if (idBarAutre === idBar) return;       /* on s'auto-ignore */
      const shiftsAutreBar = planningDuJour[idBarAutre] || {};
      const autre = shiftsAutreBar[idCreneau];
      if (!autre) return;
      const vendeurAutre = (autre.vendeur || "").trim();
      const serveurAutre = (autre.serveur || "").trim();
      const runnerAutre = (autre.runner || "").trim();

      /* --- Règle : vendeur unique par créneau. --- */
      if (vendeurNew && (vendeurAutre === vendeurNew || serveurAutre === vendeurNew)) {
        conflits.push("« " + vendeurNew + " » est déjà " +
          (vendeurAutre === vendeurNew ? "vendeur" : "serveur") +
          " sur un autre bar à ce créneau.");
      }
      if (vendeurNew && runnerAutre === vendeurNew) {
        conflits.push("« " + vendeurNew + " » est déjà runner sur un autre bar " +
          "à ce créneau (un runner ne peut pas cumuler vendeur ailleurs).");
      }

      /* --- Règle : serveur unique par créneau. --- */
      if (serveurNew && (vendeurAutre === serveurNew || serveurAutre === serveurNew)) {
        conflits.push("« " + serveurNew + " » est déjà " +
          (vendeurAutre === serveurNew ? "vendeur" : "serveur") +
          " sur un autre bar à ce créneau.");
      }
      if (serveurNew && runnerAutre === serveurNew) {
        conflits.push("« " + serveurNew + " » est déjà runner sur un autre bar " +
          "à ce créneau (un runner ne peut pas cumuler serveur ailleurs).");
      }

      /* --- Règle : runner accepte plusieurs bars (PAS de conflit avec
            un autre runner), mais ne peut pas cumuler avec vendeur/serveur
            ailleurs. --- */
      if (runnerNew && vendeurAutre === runnerNew) {
        conflits.push("« " + runnerNew + " » est déjà vendeur sur un autre bar " +
          "à ce créneau (un runner ne peut pas aussi être vendeur ailleurs).");
      }
      if (runnerNew && serveurAutre === runnerNew) {
        conflits.push("« " + runnerNew + " » est déjà serveur sur un autre bar " +
          "à ce créneau (un runner ne peut pas aussi être serveur ailleurs).");
      }
    });

    return conflits;
  }

  /* =========================================================================
     SECTION 8bis — ACTIONS SUR LES VENTES (modules 3B-1 et 3B-2)

     RAPPEL DU MODÈLE (décisions gelées)
       Une "case de vente" = bar + créneau + jour.
       Elle contient :
         - cloturee : drapeau de clôture (option A). false par défaut.
         - saisies  : liste de saisies PAD (clés uniques).
       Chaque saisie PAD contient :
         - montant, nbPintes, nbPichets, nbGobelets, commentaire
         - padEnDefaut : true si le PAD était en panne
         - numeroPad : obligatoire SI padEnDefaut (sinon vide)
         - donneesPartielles : true si PAD en panne mais données récupérées
                               en partie ; false = données totalement perdues
         - par, date : qui a saisi et quand (traçabilité)
         - annulee, annuleePar, annuleeLe : renseignés si la saisie est
           annulée par un admin. La saisie n'est jamais effacée : on la
           barre. Son montant ne compte plus dans le total.

     RÈGLES MÉTIER (gelées)
       - PAD en panne sans données partielles -> montant = 0, données perdues.
       - Clôture : secrétaire et plus. Réouverture : admin et plus.
       - Annulation : saisie par saisie (pas toute la case). Si on annule une
         saisie dans une case clôturée, la case se déclôture automatiquement.
  ========================================================================= */
  const ActionsVentes = {

    /* Enregistre une saisie de vente dans une case bar+créneau.
       donneesSaisie peut contenir : montant, nbPintes, nbPichets,
       nbGobelets, commentaire, padEnDefaut, numeroPad, donneesPartielles. */
    saisir: function (numeroJour, idBar, idCreneau, donneesSaisie, prenomUtilisateur) {
      const refSaisies = Base.caseVente(numeroJour, idBar, idCreneau).child("saisies");
      const nouvelleSaisie = {
        montant: donneesSaisie.montant || 0,
        nbPintes: donneesSaisie.nbPintes || 0,
        nbPichets: donneesSaisie.nbPichets || 0,
        nbGobelets: donneesSaisie.nbGobelets || 0,
        commentaire: (donneesSaisie.commentaire || "").trim(),
        padEnDefaut: donneesSaisie.padEnDefaut === true,
        numeroPad: (donneesSaisie.numeroPad || "").trim(),
        donneesPartielles: donneesSaisie.donneesPartielles === true,
        par: prenomUtilisateur,
        date: Date.now()
      };
      return refSaisies.push(nouvelleSaisie);
    },

    /* Clôture une case (drapeau cloturee = true). */
    cloturer: function (numeroJour, idBar, idCreneau) {
      return Base.caseVente(numeroJour, idBar, idCreneau).child("cloturee").set(true);
    },

    /* Rouvre une case clôturée (drapeau cloturee = false). */
    rouvrir: function (numeroJour, idBar, idCreneau) {
      return Base.caseVente(numeroJour, idBar, idCreneau).child("cloturee").set(false);
    },

    /* Annule UNE saisie précise. La saisie n'est pas effacée : on la marque
       annulée. Si la case était clôturée, on la déclôture pour permettre
       la correction. */
    annulerSaisie: function (numeroJour, idBar, idCreneau, idSaisie, prenomUtilisateur) {
      const refCase = Base.caseVente(numeroJour, idBar, idCreneau);
      return refCase.child("saisies/" + idSaisie).update({
        annulee: true,
        annuleePar: prenomUtilisateur,
        annuleeLe: Date.now()
      }).then(function () {
        /* Déclôture automatique : la correction doit être possible. */
        return refCase.child("cloturee").set(false);
      });
    }
  };

  /* Calcule le total (en euros), le nombre de saisies actives, etc.
     Les saisies ANNULÉES ne comptent pas dans le total ni dans nbSaisies.
     "uneCase" est l'objet stocké en base (ou null si rien saisi). */
  function calculerTotalCase(uneCase) {
    if (!uneCase || !uneCase.saisies) {
      return { total: 0, nbSaisies: 0, nbAnnulees: 0, aIncident: false, cloturee: false };
    }
    let total = 0;
    let nb = 0;
    let nbAnnulees = 0;
    let aIncident = false;
    Object.keys(uneCase.saisies).forEach(function (cle) {
      const s = uneCase.saisies[cle];
      if (s.annulee === true) {
        nbAnnulees = nbAnnulees + 1;
        return;          /* une saisie annulée ne compte pas */
      }
      total = total + (s.montant || 0);
      nb = nb + 1;
      /* "incident" = au moins une saisie active avec PAD en panne. */
      if (s.padEnDefaut === true) aIncident = true;
    });
    return {
      total: total,
      nbSaisies: nb,
      nbAnnulees: nbAnnulees,
      aIncident: aIncident,
      cloturee: uneCase.cloturee === true
    };
  }

  /* Détermine l'état d'affichage d'une case (pour la couleur du tableau).
       "vide"     : aucune saisie active
       "incident" : au moins une saisie active avec PAD en panne, non clôturée
       "saisie"   : au moins une saisie active, sans incident, non clôturée
       "cloturee" : case clôturée */
  function etatCase(uneCase) {
    const info = calculerTotalCase(uneCase);
    if (info.cloturee) return "cloturee";
    if (info.nbSaisies === 0) return "vide";
    if (info.aIncident) return "incident";
    return "saisie";
  }

  /* =========================================================================
     SECTION 9 — CALCUL DU STOCK
  ========================================================================= */
  function calculerStock(historique, params) {
    let stockBiere = params.stockInitialBiere;
    let stockCidre = params.stockInitialCidre;
    historique.forEach(function (mvt) {
      /* Ignorer les mouvements annulés et les mouvements d'annulation
         eux-mêmes (les annulations sont des entrées de traçabilité,
         pas des effets comptables — l'effet a été obtenu en marquant
         le mouvement original comme annule:true). */
      if (mvt.annule === true) return;
      if (mvt.mouvement === "annulation_attribution") return;
      if (mvt.mouvement === "annulation_retour") return;
      if (mvt.mouvement === "attribution") {
        if (mvt.typeFut === TYPE_BAR.BIERE) stockBiere = stockBiere - 1;
        if (mvt.typeFut === TYPE_BAR.CIDRE) stockCidre = stockCidre - 1;
      } else if (mvt.mouvement === "retour" && mvt.motifRetour === RETOUR.PLEIN) {
        if (mvt.typeFut === TYPE_BAR.BIERE) stockBiere = stockBiere + 1;
        if (mvt.typeFut === TYPE_BAR.CIDRE) stockCidre = stockCidre + 1;
      }
    });
    return { biere: stockBiere, cidre: stockCidre };
  }

  /* =========================================================================
     SECTION 9bis — AGRÉGATIONS POUR LE DASHBOARD (module dashboard-1)

     PHILOSOPHIE
       Ces fonctions ne lisent PAS Firebase : elles calculent à partir
       des données déjà chargées en mémoire dans l'écran principal
       (historique, casesVentesTousJours, planning, params).
       Pures fonctions, faciles à tester et à transmettre.

     ATTENTION SUR LES VENTES
       casesVentesTousJours est rangé sous { jour1: {...}, jour2: {...} }
       Pour parcourir : Object.keys(casesVentesTousJours).filter(/^jour\d+$/)
       Chaque jour contient { idBar: { idCreneau: { cloturee, saisies } } }
       Chaque saisie contient montant, nbPintes, nbPichets, nbGobelets,
       padEnDefaut, donneesPartielles, annulee, etc.
       Les saisies ANNULÉES sont systématiquement ignorées.
  ========================================================================= */

  /* Extrait le numéro de jour d'une clé "jour3" -> 3, ou null si invalide. */
  function numeroDepuisCleJour(cle) {
    const m = (cle || "").match(/^jour(\d+)$/);
    return m ? parseInt(m[1], 10) : null;
  }

  /* Indique si une vente doit être prise en compte dans les agrégations.
     Une vente est COMPTÉE si elle n'est pas annulée.
     Les "données perdues" (PAD en panne sans données partielles) ont
     un montant = 0 mais comptent quand même : zéro est une information. */
  function saisieEstActive(saisie) {
    return saisie && saisie.annulee !== true;
  }

  /* Agrège les ventes : renvoie { ca, nbPintes, nbPichets, nbGobelets,
     nbSaisies, nbAnnulees, nbPadEnPanne, nbDonneesPerdues }.
     "filtreJour" : si donné (nombre), ne compte que ce jour-là.
     "filtreBar" : si donné (idBar), ne compte que ce bar. */
  function agregerVentes(casesVentesTousJours, filtreJour, filtreBar) {
    let ca = 0, nbP = 0, nbPi = 0, nbG = 0;
    let nbSaisies = 0, nbAnnulees = 0;
    let nbPadEnPanne = 0, nbDonneesPerdues = 0;

    Object.keys(casesVentesTousJours || {}).forEach(function (cleJour) {
      const nj = numeroDepuisCleJour(cleJour);
      if (nj === null) return;
      if (filtreJour != null && nj !== filtreJour) return;
      const barresDuJour = casesVentesTousJours[cleJour] || {};
      Object.keys(barresDuJour).forEach(function (idBar) {
        if (filtreBar != null && idBar !== filtreBar) return;
        const creneauxDuBar = barresDuJour[idBar] || {};
        Object.keys(creneauxDuBar).forEach(function (idCreneau) {
          const uneCase = creneauxDuBar[idCreneau];
          if (!uneCase || !uneCase.saisies) return;
          Object.keys(uneCase.saisies).forEach(function (idSaisie) {
            const s = uneCase.saisies[idSaisie];
            if (!s) return;
            if (s.annulee === true) { nbAnnulees++; return; }
            nbSaisies++;
            ca += (s.montant || 0);
            nbP += (s.nbPintes || 0);
            nbPi += (s.nbPichets || 0);
            nbG += (s.nbGobelets || 0);
            if (s.padEnDefaut === true) {
              nbPadEnPanne++;
              if (s.donneesPartielles !== true) nbDonneesPerdues++;
            }
          });
        });
      });
    });
    return {
      ca: ca, nbPintes: nbP, nbPichets: nbPi, nbGobelets: nbG,
      nbSaisies: nbSaisies, nbAnnulees: nbAnnulees,
      nbPadEnPanne: nbPadEnPanne, nbDonneesPerdues: nbDonneesPerdues
    };
  }

  /* Agrège les mouvements de fûts : renvoie { nbBiereSortis, nbCidreSortis,
     nbCasses, nbPleinsRendus, nbFutsEnCours }.
     "filtreBar" : si donné, ne compte que ce bar.
     NB : "filtreJour" ne s'applique PAS aux fûts. Les fûts sortent à
     l'heure réelle, pas par jour de festival. L'agrégation se fait sur
     tout l'historique disponible. */
  function agregerFuts(historique, filtreBar) {
    let nbBiereSortis = 0, nbCidreSortis = 0;
    let nbCasses = 0, nbPleinsRendus = 0;
    (historique || []).forEach(function (mvt) {
      /* Ignorer les mouvements annulés et les annulations elles-mêmes
         (cf. calculerStock pour le détail). */
      if (mvt.annule === true) return;
      if (mvt.mouvement === "annulation_attribution") return;
      if (mvt.mouvement === "annulation_retour") return;
      if (filtreBar != null && mvt.idBar !== filtreBar) return;
      if (mvt.mouvement === "attribution") {
        if (mvt.typeFut === TYPE_BAR.BIERE) nbBiereSortis++;
        if (mvt.typeFut === TYPE_BAR.CIDRE) nbCidreSortis++;
      } else if (mvt.mouvement === "retour") {
        if (mvt.motifRetour === RETOUR.CASSE) nbCasses++;
        if (mvt.motifRetour === RETOUR.PLEIN) nbPleinsRendus++;
      }
    });
    return {
      nbBiereSortis: nbBiereSortis, nbCidreSortis: nbCidreSortis,
      nbCasses: nbCasses, nbPleinsRendus: nbPleinsRendus
    };
  }

  /* Calcul de cohérence volume : volume sorti (via fûts) vs volume vendu
     (via pintes + pichets, le gobelet n'a pas de volume).
     Renvoie { volumeSortiL, volumeVenduL, ecartL, ecartPct, dansSeuil }.
     "filtreBar" optionnel. */
  function calculerCoherence(historique, casesVentesTousJours, params, filtreBar) {
    const futs = agregerFuts(historique, filtreBar);
    const ventes = agregerVentes(casesVentesTousJours, null, filtreBar);
    /* Volume sorti = (nb fûts bière * volumeFutBiere) + (nb fûts cidre *
       volumeFutCidre). Un fût plein rendu reste compté comme sorti car
       l'attribution est aussi comptée — pour ne pas le compter, on
       soustrait son volume. */
    const volumeSortiL =
      (futs.nbBiereSortis * (params.volumeFutBiere || 0))
      + (futs.nbCidreSortis * (params.volumeFutCidre || 0))
      - (futs.nbPleinsRendus * (params.volumeFutBiere || 0));
      /* Hypothèse simplificatrice ci-dessus : on suppose les fûts rendus
         pleins sont des fûts bière (car volumeFutCidre peut différer).
         En pratique le nombre de pleins rendus est faible. À affiner si
         besoin dans une version future. */
    /* Volume vendu = pintes * volumePinte + pichets * volumePichet, en cl,
       converti en litres. */
    const volumeVenduCl =
      (ventes.nbPintes * (params.volumePinte || 0))
      + (ventes.nbPichets * (params.volumePichet || 0));
    const volumeVenduL = volumeVenduCl / 100;

    const ecartL = volumeSortiL - volumeVenduL;
    const ecartPct = (volumeSortiL > 0) ? (ecartL / volumeSortiL) * 100 : 0;
    const dansSeuil = Math.abs(ecartPct) <= (params.seuilTolerancePerte || 0);
    return {
      volumeSortiL: volumeSortiL,
      volumeVenduL: volumeVenduL,
      ecartL: ecartL,
      ecartPct: ecartPct,
      dansSeuil: dansSeuil
    };
  }

  /* Compte les cases NON clôturées (= cases avec au moins une saisie active
     mais cloturee != true), sur un filtre jour optionnel. */
  function compterCasesNonCloturees(casesVentesTousJours, filtreJour) {
    let n = 0;
    Object.keys(casesVentesTousJours || {}).forEach(function (cleJour) {
      const nj = numeroDepuisCleJour(cleJour);
      if (nj === null) return;
      if (filtreJour != null && nj !== filtreJour) return;
      const barresDuJour = casesVentesTousJours[cleJour] || {};
      Object.keys(barresDuJour).forEach(function (idBar) {
        const creneauxDuBar = barresDuJour[idBar] || {};
        Object.keys(creneauxDuBar).forEach(function (idCreneau) {
          const uneCase = creneauxDuBar[idCreneau];
          if (!uneCase || !uneCase.saisies) return;
          if (uneCase.cloturee === true) return;
          /* Au moins une saisie active dans la case ? */
          const aSaisieActive = Object.keys(uneCase.saisies).some(function (idS) {
            return uneCase.saisies[idS] && uneCase.saisies[idS].annulee !== true;
          });
          if (aSaisieActive) n++;
        });
      });
    });
    return n;
  }

  /* Agrège les shifts par bénévole, sur TOUT le festival.
     "planningTousJours" = { jour1: { idBar: { idCreneau: shift } }, ... }
     Renvoie un tableau d'objets { nom, nbVendeur, nbServeur, nbRunner,
     nbTotal }, trié par nbTotal décroissant.
     Les noms sont comparés en TEXTE EXACT (cf. décision champ libre). */
  function agregerBenevoles(planningTousJours) {
    /* compteur[nom] = { nbVendeur, nbServeur, nbRunner } */
    const compteur = {};
    function ajouter(nom, poste) {
      const cle = (nom || "").trim();
      if (!cle) return;
      if (!compteur[cle]) compteur[cle] = { nbVendeur: 0, nbServeur: 0, nbRunner: 0 };
      compteur[cle][poste] = compteur[cle][poste] + 1;
    }
    Object.keys(planningTousJours || {}).forEach(function (cleJour) {
      if (!cleJour.match(/^jour\d+$/)) return;
      const barresDuJour = planningTousJours[cleJour] || {};
      Object.keys(barresDuJour).forEach(function (idBar) {
        const creneauxDuBar = barresDuJour[idBar] || {};
        Object.keys(creneauxDuBar).forEach(function (idCreneau) {
          const shift = creneauxDuBar[idCreneau];
          if (!shift) return;
          ajouter(shift.vendeur, "nbVendeur");
          ajouter(shift.serveur, "nbServeur");
          ajouter(shift.runner, "nbRunner");
        });
      });
    });
    /* Transformation en tableau trié. */
    return Object.keys(compteur).map(function (nom) {
      const c = compteur[nom];
      return {
        nom: nom,
        nbVendeur: c.nbVendeur,
        nbServeur: c.nbServeur,
        nbRunner: c.nbRunner,
        nbTotal: c.nbVendeur + c.nbServeur + c.nbRunner
      };
    }).sort(function (a, b) { return b.nbTotal - a.nbTotal; });
  }

  /* Liste les saisies "données perdues" (PAD en panne sans données
     partielles, montant=0). Renvoie un tableau d'objets
     { jour, idBar, idCreneau, numeroPad, commentaire, par, date }. */
  function listerDonneesPerdues(casesVentesTousJours) {
    const liste = [];
    Object.keys(casesVentesTousJours || {}).forEach(function (cleJour) {
      const nj = numeroDepuisCleJour(cleJour);
      if (nj === null) return;
      const barresDuJour = casesVentesTousJours[cleJour] || {};
      Object.keys(barresDuJour).forEach(function (idBar) {
        const creneauxDuBar = barresDuJour[idBar] || {};
        Object.keys(creneauxDuBar).forEach(function (idCreneau) {
          const uneCase = creneauxDuBar[idCreneau];
          if (!uneCase || !uneCase.saisies) return;
          Object.keys(uneCase.saisies).forEach(function (idS) {
            const s = uneCase.saisies[idS];
            if (!s || s.annulee === true) return;
            if (s.padEnDefaut === true && s.donneesPartielles !== true) {
              liste.push({
                jour: nj, idBar: idBar, idCreneau: idCreneau,
                numeroPad: s.numeroPad || "?",
                commentaire: s.commentaire || "",
                par: s.par || "?", date: s.date || 0
              });
            }
          });
        });
      });
    });
    return liste;
  }

  /* Liste les cases avec saisies actives non clôturées.
     Renvoie un tableau { jour, idBar, idCreneau, nbSaisies, total }. */
  function listerCasesNonCloturees(casesVentesTousJours) {
    const liste = [];
    Object.keys(casesVentesTousJours || {}).forEach(function (cleJour) {
      const nj = numeroDepuisCleJour(cleJour);
      if (nj === null) return;
      const barresDuJour = casesVentesTousJours[cleJour] || {};
      Object.keys(barresDuJour).forEach(function (idBar) {
        const creneauxDuBar = barresDuJour[idBar] || {};
        Object.keys(creneauxDuBar).forEach(function (idCreneau) {
          const uneCase = creneauxDuBar[idCreneau];
          if (!uneCase || !uneCase.saisies) return;
          if (uneCase.cloturee === true) return;
          let nb = 0, total = 0;
          Object.keys(uneCase.saisies).forEach(function (idS) {
            const s = uneCase.saisies[idS];
            if (!s || s.annulee === true) return;
            nb++;
            total += (s.montant || 0);
          });
          if (nb > 0) {
            liste.push({ jour: nj, idBar: idBar, idCreneau: idCreneau,
              nbSaisies: nb, total: total });
          }
        });
      });
    });
    return liste;
  }

  /* Liste les fûts ENCORE attribués à des bars (non retournés).
     "bars" = tableau des bars actuels (avec leur sous-arbre futs).
     Renvoie un tableau { idBar, nomBar, idFut, type, dateAttribution,
     attribuePar }. */
  function listerFutsNonRetournes(bars) {
    const liste = [];
    (bars || []).forEach(function (bar) {
      const futs = bar.futs || {};
      Object.keys(futs).forEach(function (idFut) {
        const f = futs[idFut];
        liste.push({
          idBar: bar.id, nomBar: bar.nom,
          idFut: idFut, type: f.type,
          dateAttribution: f.dateAttribution || 0,
          attribuePar: f.attribuePar || "?"
        });
      });
    });
    return liste;
  }

  /* Liste les fûts encore présents dans le pot d'attente.
     Anomalie post-festival : un fût non terminé jamais réutilisé. */
  function listerFutsAuPot(futsEnAttente) {
    const liste = [];
    Object.keys(futsEnAttente || {}).forEach(function (id) {
      const f = futsEnAttente[id];
      if (!f) return;
      liste.push({
        idAttente: id,
        type: f.type,
        dateRetour: f.dateRetour || 0,
        nomBarPrecedent: f.nomBarPrecedent || "?",
        retourPar: f.retourPar || "?"
      });
    });
    return liste;
  }

  /* =========================================================================
     SECTION 10 — FENÊTRE DE RETOUR D'UN FÛT
  ========================================================================= */
  function FenetreRetourFut({ bar, idFut, fut, onConfirmer, onAnnuler }) {
    const [motif, setMotif] = useState("");
    const [commentaire, setCommentaire] = useState("");

    function confirmer() {
      if (!motif) return;
      if (motif === RETOUR.CASSE && !commentaire.trim()) {
        alert("Merci de décrire le problème pour un fût cassé.");
        return;
      }
      onConfirmer(motif, commentaire);
    }

    function boutonMotif(valeur, libelle, couleur) {
      const actif = motif === valeur;
      return React.createElement(
        "button",
        {
          onClick: function () { setMotif(valeur); },
          className: "w-full py-3 rounded-lg font-medium text-left px-4 " +
            (actif ? couleur + " text-white" : "bg-neutral-800 text-neutral-300")
        },
        libelle
      );
    }

    return React.createElement(
      "div",
      { className: "fixed inset-0 bg-black/80 flex items-center justify-center p-4 z-50" },
      React.createElement(
        "div",
        { className: "bg-neutral-900 rounded-2xl w-full max-w-sm p-6" },
        React.createElement("h3", { className: "text-xl font-bold text-white mb-1" }, "Retour de fût"),
        React.createElement("p", { className: "text-neutral-400 text-sm mb-4" },
          bar.nom + " — fût " + (fut.type === TYPE_BAR.BIERE ? "bière" : "cidre")),
        React.createElement(
          "div",
          { className: "space-y-2" },
          boutonMotif(RETOUR.VIDE, "Fût vide (entièrement consommé)", "bg-blue-600"),
          boutonMotif(RETOUR.CASSE, "Fût cassé / endommagé", "bg-red-600"),
          boutonMotif(RETOUR.NON_TERMINE, "Non terminé (reprise demain)", "bg-purple-600"),
          boutonMotif(RETOUR.PLEIN, "Fût plein (jamais entamé, retour stock)", "bg-green-600")
        ),
        React.createElement(
          "div",
          { className: "mt-4" },
          React.createElement("label", { className: "block text-sm text-neutral-400 mb-1" },
            "Commentaire" + (motif === RETOUR.CASSE ? " (obligatoire)" : " (facultatif)")),
          React.createElement("textarea", {
            value: commentaire,
            onChange: function (e) { setCommentaire(e.target.value); },
            rows: 2,
            className: "w-full px-3 py-2 bg-neutral-800 rounded-lg text-white text-sm",
            placeholder: motif === RETOUR.CASSE ? "Ex : valve cassée, fût percé…" : ""
          })
        ),
        React.createElement(
          "div",
          { className: "flex gap-2 mt-6" },
          React.createElement(
            "button",
            { onClick: onAnnuler, className: "flex-1 py-3 bg-neutral-700 text-white rounded-lg" },
            "Annuler"
          ),
          React.createElement(
            "button",
            {
              onClick: confirmer,
              disabled: !motif,
              className: "flex-1 py-3 rounded-lg font-medium " +
                (motif ? "bg-red-600 text-white" : "bg-neutral-800 text-neutral-600")
            },
            "Confirmer"
          )
        )
      )
    );
  }

  /* =========================================================================
     SECTION 11 — FENÊTRE D'AJOUT D'UN BAR
  ========================================================================= */

    const [nom, setNom] = useState("");

    function confirmer() {
      if (!nom.trim()) return;
      onConfirmer(nom, type);
    }

    return React.createElement(
      "div",
      { className: "fixed inset-0 bg-black/80 flex items-center justify-center p-4 z-50" },
      React.createElement(
        "div",
        { className: "bg-neutral-900 rounded-2xl w-full max-w-sm p-6" },
        React.createElement("h3", { className: "text-xl font-bold text-white mb-4" }, "Nouveau bar"),
        React.createElement("label", { className: "block text-sm text-neutral-400 mb-1" }, "Nom du bar"),
        React.createElement("input", {
          type: "text",
          value: nom,
          onChange: function (e) { setNom(e.target.value); },
          placeholder: "Ex : Bar Mainstage",
          className: "w-full px-4 py-3 bg-neutral-800 rounded-lg text-white mb-4",
          autoFocus: true
        }),
        React.createElement("label", { className: "block text-sm text-neutral-400 mb-1" }, "Type de boisson"),
        React.createElement(
          "div",
          { className: "flex gap-2 mb-6" },
          React.createElement(
            "button",
            {
              onClick: function () { setType(TYPE_BAR.BIERE); },
              className: "flex-1 py-3 rounded-lg font-medium " +

            },
            "Bière"

          React.createElement(
            "button",
            {
              onClick: function () { setType(TYPE_BAR.CIDRE); },

                (type === TYPE_BAR.CIDRE ? "bg-green-600 text-white" : "bg-neutral-800 text-neutral-400")
            },
            "Cidre"
          )

        React.createElement(

                (nom.trim() ? "bg-red-600 text-white" : "bg-neutral-800 text-neutral-600")
            },
            "Créer"
          )
        )
      )
    );
  }

  /* =========================================================================
     SECTION 12 — FENÊTRE DE GESTION DES CRÉNEAUX (module 3A)
     Réservée au super admin. Permet de définir les créneaux du jour affiché,
     et de copier les créneaux d'un autre jour.
  ========================================================================= */
  function FenetreCreneaux({ jourActuel, nombreJours, creneaux, onFermer }) {
    /* Champ de saisie d'un nouveau créneau. */
    const [nouveauLibelle, setNouveauLibelle] = useState("");
    /* Le créneau en cours de renommage (son id), ou null. */
    const [enRenommage, setEnRenommage] = useState(null);
    const [libelleRenomme, setLibelleRenomme] = useState("");

    /* Liste des créneaux du jour, transformée en tableau. */
    const listeCreneaux = Object.keys(creneaux || {}).map(function (id) {
      return { id: id, libelle: creneaux[id].libelle };
    });

    function ajouter() {
      if (!nouveauLibelle.trim()) return;
      ActionsCreneaux.ajouter(jourActuel, nouveauLibelle)
        .then(function () { setNouveauLibelle(""); })
        .catch(function (e) { alert(e.message); });
    }

    function supprimer(idCreneau) {
      if (!confirm("Supprimer ce créneau ?")) return;
      ActionsCreneaux.supprimer(jourActuel, idCreneau)
        .catch(function (e) { alert(e.message); });
    }

    function lancerRenommage(creneau) {
      setEnRenommage(creneau.id);
      setLibelleRenomme(creneau.libelle);
    }

    function validerRenommage() {
      ActionsCreneaux.renommer(jourActuel, enRenommage, libelleRenomme)
        .then(function () { setEnRenommage(null); })
        .catch(function (e) { alert(e.message); });
    }

    function copierDepuis(jourSource) {
      if (jourSource === jourActuel) return;
      if (!confirm("Copier les créneaux du jour " + jourSource +
          " ? Les créneaux actuels du jour " + jourActuel + " seront remplacés.")) return;
      ActionsCreneaux.copierDepuisJour(jourSource, jourActuel)
        .catch(function (e) { alert(e.message); });
    }

    /* Liste des autres jours, pour proposer la copie. */
    const autresJours = [];
    for (let n = 1; n <= nombreJours; n++) {
      if (n !== jourActuel) autresJours.push(n);
    }

    return React.createElement(
      "div",
      { className: "fixed inset-0 bg-black/80 flex items-center justify-center p-4 z-50" },
      React.createElement(
        "div",
        { className: "bg-neutral-900 rounded-2xl w-full max-w-md p-6 max-h-[90vh] overflow-y-auto" },

        React.createElement("h3", { className: "text-xl font-bold text-white mb-1" },
          "Créneaux du jour " + jourActuel),
        React.createElement("p", { className: "text-neutral-500 text-sm mb-4" },
          "Définissez les tranches horaires de cette journée."),

        /* Liste des créneaux existants. */
        listeCreneaux.length === 0
          ? React.createElement("p", { className: "text-neutral-500 text-sm mb-3" },
              "Aucun créneau pour ce jour.")
          : React.createElement(
              "div",
              { className: "space-y-2 mb-4" },
              listeCreneaux.map(function (creneau) {
                /* Si ce créneau est en cours de renommage : champ d'édition. */
                if (enRenommage === creneau.id) {
                  return React.createElement(
                    "div",
                    { key: creneau.id, className: "flex gap-2 items-center bg-neutral-800 rounded-lg p-2" },
                    React.createElement("input", {
                      type: "text",
                      value: libelleRenomme,
                      onChange: function (e) { setLibelleRenomme(e.target.value); },
                      className: "flex-1 px-2 py-1 bg-neutral-700 rounded text-white text-sm",
                      autoFocus: true
                    }),
                    React.createElement(
                      "button",
                      { onClick: validerRenommage, className: "px-2 py-1 bg-green-600 text-white rounded text-sm" },
                      "OK"
                    ),
                    React.createElement(
                      "button",
                      { onClick: function () { setEnRenommage(null); },
                        className: "px-2 py-1 bg-neutral-600 text-white rounded text-sm" },
                      "Annuler"
                    )
                  );
                }
                /* Sinon : affichage normal. */
                return React.createElement(
                  "div",
                  { key: creneau.id, className: "flex gap-2 items-center bg-neutral-800 rounded-lg p-2" },
                  React.createElement("span", { className: "flex-1 text-white text-sm px-1" }, creneau.libelle),
                  React.createElement(
                    "button",
                    { onClick: function () { lancerRenommage(creneau); },
                      className: "px-2 py-1 bg-neutral-700 text-white rounded text-sm" },
                    "Renommer"
                  ),
                  React.createElement(
                    "button",
                    { onClick: function () { supprimer(creneau.id); },
                      className: "px-2 py-1 bg-red-900 text-white rounded text-sm" },
                    "Suppr."
                  )
                );
              })
            ),

        /* Ajout d'un créneau. */
        React.createElement(
          "div",
          { className: "flex gap-2 mb-5" },
          React.createElement("input", {
            type: "text",
            value: nouveauLibelle,
            onChange: function (e) { setNouveauLibelle(e.target.value); },
            onKeyDown: function (e) { if (e.key === "Enter") ajouter(); },
            placeholder: "Ex : 15h - 18h",

          }),
          React.createElement(
            "button",
            {
              onClick: ajouter,
              disabled: !nouveauLibelle.trim(),
              className: "px-4 py-2 rounded-lg font-medium text-sm " +
                (nouveauLibelle.trim() ? "bg-emerald-600 text-white" : "bg-neutral-800 text-neutral-600")
            },
            "Ajouter"
          )
        ),

        /* Copie depuis un autre jour. */
        autresJours.length > 0
          ? React.createElement(
              "div",
              { className: "border-t border-neutral-800 pt-4 mb-4" },
              React.createElement("p", { className: "text-sm text-neutral-400 mb-2" },
                "Copier les créneaux d'un autre jour :"),
              React.createElement(
                "div",
                { className: "flex flex-wrap gap-2" },
                autresJours.map(function (n) {
                  return React.createElement(
                    "button",
                    {
                      key: n,
                      onClick: function () { copierDepuis(n); },
                      className: "px-3 py-1.5 bg-neutral-800 hover:bg-neutral-700 text-neutral-200 rounded-lg text-sm"
                    },
                    "Depuis jour " + n
                  );
                })
              )
            )
          : null,

        React.createElement(
          "button",
          { onClick: onFermer, className: "w-full py-3 bg-neutral-700 text-white rounded-lg" },
          "Fermer"
        )
      )
    );
  }

  /* =========================================================================
     SECTION 13 — CARTE D'UN BAR
  ========================================================================= */
  function CarteBar({ bar, role, maxFuts, prenom, onAttribuer, onDemanderRetour, onSupprimer, onAnnulerAttribution }) {
    const futs = bar.futs || {};
    const listeFuts = Object.keys(futs).map(function (idFut) {
      return { id: idFut, donnees: futs[idFut] };
    });
    const nbFuts = listeFuts.length;
    const estBiere = bar.type === TYPE_BAR.BIERE;
    const peutGererFuts = Droits.peutGererFuts(role);
    const peutGererBars = Droits.peutGererBars(role);
    /* L'annulation d'attribution est réservée admin et plus, conformément
       à la décision (correction d'erreur de manip). */
    const peutAnnulerAttribution = role === ROLES.ADMIN || role === ROLES.SUPERADMIN;
    const barComplet = nbFuts >= maxFuts;

    return React.createElement(
      "div",
      { className: "rounded-xl border p-3 " +
          (estBiere ? "border-amber-800 bg-amber-950/30" : "border-green-800 bg-green-950/30") },
      React.createElement(
        "div",
        { className: "flex items-center justify-between mb-2" },
        React.createElement(
          "div",
          null,
          React.createElement("span", { className: "font-bold text-white" }, bar.nom),
          React.createElement("span", { className: "ml-2 text-xs text-neutral-400" },
            estBiere ? "Bière" : "Cidre")
        ),
        React.createElement(
          "span",
          { className: "text-sm font-bold px-2 py-0.5 rounded " +
              (barComplet ? "bg-red-700 text-white" : "bg-neutral-700 text-neutral-200") },
          nbFuts + " / " + maxFuts
        )
      ),
      listeFuts.length === 0
        ? React.createElement("p", { className: "text-neutral-500 text-sm" }, "Aucun fût en cours")
        : React.createElement(
            "div",
            { className: "space-y-1" },
            listeFuts.map(function (f) {
              return React.createElement(
                "div",
                { key: f.id, className: "flex items-center justify-between bg-black/40 rounded px-2 py-1.5" },
                React.createElement("span", { className: "text-sm text-neutral-200" },
                  "Fût " + (f.donnees.type === TYPE_BAR.BIERE ? "bière" : "cidre")),
                React.createElement(
                  "div",
                  { className: "flex gap-1" },
                  /* Bouton "Annuler attribution" (admin et plus). Permet de
                     corriger une attribution erronée du secrétaire. */
                  peutAnnulerAttribution
                    ? React.createElement(
                        "button",
                        {
                          onClick: function () { onAnnulerAttribution(bar, f.id, f.donnees); },
                          className: "text-xs px-2 py-1 bg-red-900 hover:bg-red-800 text-white rounded",
                          title: "Annuler cette attribution (correction d'erreur)"
                        },
                        "↶"
                      )
                    : null,
                  peutGererFuts
                    ? React.createElement(
                        "button",
                        {
                          onClick: function () { onDemanderRetour(bar, f.id, f.donnees); },
                          className: "text-xs px-2 py-1 bg-neutral-700 hover:bg-neutral-600 text-white rounded"
                        },
                        "Retour"
                      )
                    : null
                )
              );
            })
          ),
      React.createElement(
        "div",
        { className: "flex gap-2 mt-3" },
        peutGererFuts
          ? React.createElement(
              "button",
              {
                onClick: function () { onAttribuer(bar); },
                disabled: barComplet,
                className: "flex-1 py-2 rounded-lg text-sm font-medium " +
                  (barComplet
                    ? "bg-neutral-800 text-neutral-600"
                    : "bg-emerald-600 hover:bg-emerald-500 text-white")
              },
              barComplet ? "Bar complet" : "+ Attribuer un fût"
            )
          : null,
        peutGererBars
          ? React.createElement(
              "button",
              {
                onClick: function () { onSupprimer(bar); },
                className: "py-2 px-3 rounded-lg text-sm bg-neutral-800 hover:bg-red-900 text-neutral-400"
              },
              "Supprimer"
            )
          : null
      )
    );
  }

  /* =========================================================================
     SECTION 14 — BANDEAU DU JOUR
     Affiche le jour actif et permet d'en changer (admin et plus).
  ========================================================================= */
  function BandeauJour({ jourActuel, nombreJours, role, onChangerJour, onOuvrirCreneaux, onOuvrirParams }) {
    const peutChangerJour = Droits.peutChangerJour(role);
    const peutGererCreneaux = Droits.peutGererCreneaux(role);
    const peutGererParams = Droits.peutGererParams(role);

    return React.createElement(
      "div",
      { className: "flex items-center justify-between px-3 py-2 bg-neutral-900 border-b border-neutral-800" },

      /* Sélecteur de jour. */
      React.createElement(
        "div",
        { className: "flex items-center gap-2" },
        React.createElement("span", { className: "text-sm text-neutral-400" }, "Jour"),
        peutChangerJour
          ? React.createElement(
              "button",
              {
                onClick: function () { onChangerJour(jourActuel - 1); },
                disabled: jourActuel <= 1,
                className: "w-8 h-8 rounded bg-neutral-800 text-white disabled:opacity-30"
              },

        React.createElement("span", { className: "text-lg font-bold text-white w-6 text-center" }, jourActuel),
        peutChangerJour
          ? React.createElement(
              "button",
              {
                onClick: function () { onChangerJour(jourActuel + 1); },
                disabled: jourActuel >= nombreJours,
                className: "w-8 h-8 rounded bg-neutral-800 text-white disabled:opacity-30"
              },
              "›"
