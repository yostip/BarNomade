  }

  /* =========================================================================
     SECTION 14duodecies — ÉCRAN FÛTS EN ATTENTE (pot)

     Liste les fûts retournés "non terminés" qui peuvent être réattribués
     à un bar du même type. Secrétaire et plus.

     Workflow :
       1. L'écran liste les fûts au pot (type, bar précédent, date, qui).
       2. Au clic "Réattribuer", l'utilisateur choisit un bar du même type.
       3. Le fût est créé sur le bar choisi, un mouvement "reattribution"
          est tracé dans l'historique, et le fût est retiré du pot.
  ========================================================================= */
  function EcranFutsEnAttente({ prenom, role, bars, onFermer }) {
    const [futsEnAttente, setFutsEnAttente] = useState({});
    /* Fût en cours de réattribution : on stocke { idAttente, fut } pour
       déclencher la fenêtre de choix de bar. */
    const [futACharger, setFutACharger] = useState(null);
    const [enCours, setEnCours] = useState(false);

    /* Abonnement temps réel au pot. */
    useEffect(function () {
      const ref = Base.futsEnAttente();
      function surPot(s) { setFutsEnAttente(s.val() || {}); }
      ref.on("value", surPot);
      return function () { ref.off("value", surPot); };
    }, []);

    /* Liste triée par date de retour (les plus anciens en haut). */
    const liste = Object.keys(futsEnAttente || {}).map(function (id) {
      const f = futsEnAttente[id] || {};
      return { idAttente: id, fut: f };
    }).sort(function (a, b) {
      return (a.fut.dateRetour || 0) - (b.fut.dateRetour || 0);
    });

    function fmtDateHeure(ts) {
      if (!ts) return "—";
      const d = new Date(ts);
      const p = function (n) { return n < 10 ? "0" + n : "" + n; };
      return p(d.getDate()) + "/" + p(d.getMonth() + 1) +
        " à " + p(d.getHours()) + ":" + p(d.getMinutes());
    }

    /* Bars compatibles pour la réattribution : même type que le fût,
       et pas saturés (sous la limite paramétrée). */
    function barsCompatibles(typeFut) {
      return (bars || []).filter(function (b) {
        return b.type === typeFut;
      });
    }

    function lancerReattribution(idAttente, fut, bar) {
      if (enCours) return;
      setEnCours(true);
      ActionsFuts.reattribuerDepuisPot(idAttente, fut, bar, prenom)
        .then(function () {
          setEnCours(false);
          setFutACharger(null);
        })
        .catch(function (e) {
          setEnCours(false);
          alert("Erreur : " + e.message);
        });
    }

    return React.createElement(
      "div",
      { className: "fixed inset-0 bg-black z-40 flex flex-col" },

      /* En-tête. */
      React.createElement(
        "div",
        { className: "p-3 border-b border-neutral-800 flex items-center justify-between" },
        React.createElement(
          "div",
          null,
          React.createElement("h2", { className: "text-lg font-bold text-purple-400" }, "Fûts en attente"),
          React.createElement("p", { className: "text-xs text-neutral-500" },
            liste.length + " fût(s) au pot")
        ),
        React.createElement(
          "button",
          { onClick: onFermer, className: "text-xs px-3 py-1.5 bg-neutral-800 text-neutral-300 rounded-lg" },
          "Fermer"
        )
      ),

      /* Liste des fûts au pot. */
      React.createElement(
        "div",
        { className: "flex-1 overflow-auto p-3" },
        liste.length === 0
          ? React.createElement(
              "div",
              { className: "text-center py-12" },
              React.createElement("p", { className: "text-neutral-500 text-sm" },
                "Aucun fût en attente."),
              React.createElement("p", { className: "text-xs text-neutral-600 italic mt-2" },
                "Les fûts retournés « non terminés » s'accumulent ici, prêts à être réutilisés.")
            )
          : React.createElement(
              "div",
              { className: "space-y-2" },
              liste.map(function (item) {
                const f = item.fut;
                const couleur = f.type === TYPE_BAR.BIERE
                  ? "border-amber-700 bg-amber-950/30"
                  : "border-green-700 bg-green-950/30";
                return React.createElement(
                  "div",
                  {
                    key: item.idAttente,
                    className: "rounded-xl border p-3 " + couleur
                  },
                  React.createElement(
                    "div",
                    { className: "flex items-center justify-between mb-2" },
                    React.createElement(
                      "div",
                      null,
                      React.createElement("p", { className: "font-bold text-white" },
                        f.type === TYPE_BAR.BIERE ? "Bière" : "Cidre"),
                      React.createElement("p", { className: "text-xs text-neutral-400" },
                        "Depuis " + (f.nomBarPrecedent || "?"))
                    ),
                    React.createElement(
                      "div",
                      { className: "text-right" },
                      React.createElement("p", { className: "text-xs text-neutral-300" },
                        fmtDateHeure(f.dateRetour)),
                      React.createElement("p", { className: "text-xs text-neutral-500" },
                        "par " + (f.retourPar || "?"))
                    )
                  ),
                  React.createElement(
                    "button",
                    {
                      onClick: function () { setFutACharger(item); },
                      className: "w-full py-2 bg-purple-700 hover:bg-purple-600 text-white rounded-lg text-sm font-medium"
                    },
                    "Réattribuer à un bar"
                  )
                );
              })
            )
      ),

      /* Fenêtre de choix du bar. */
      futACharger
        ? React.createElement(
            "div",
            {
              className: "fixed inset-0 bg-black/80 flex items-center justify-center p-4 z-50",
              onClick: function () { if (!enCours) setFutACharger(null); }
            },
            React.createElement(
              "div",
              {
                className: "bg-neutral-900 rounded-2xl w-full max-w-sm p-5 max-h-[80vh] overflow-y-auto border border-purple-800",
                onClick: function (e) { e.stopPropagation(); }
              },
              React.createElement("h3", { className: "text-lg font-bold text-purple-400 mb-1" },
                "Choisir un bar"),
              React.createElement("p", { className: "text-xs text-neutral-500 mb-3" },
                "Fût " + (futACharger.fut.type === TYPE_BAR.BIERE ? "bière" : "cidre") +
                " — bars compatibles uniquement"),

              (function () {
                const compatibles = barsCompatibles(futACharger.fut.type);
                if (compatibles.length === 0) {
                  return React.createElement("p", { className: "text-sm text-neutral-400 italic py-4 text-center" },
                    "Aucun bar du bon type pour le moment.");
                }
                return React.createElement(
                  "div",
                  { className: "space-y-1" },
                  compatibles.map(function (b) {
                    const nbFuts = b.futs ? Object.keys(b.futs).length : 0;
                    return React.createElement(
                      "button",
                      {
                        key: b.id,
                        onClick: function () {
                          lancerReattribution(futACharger.idAttente, futACharger.fut, b);
                        },
                        disabled: enCours,
                        className: "w-full text-left px-3 py-2 bg-neutral-800 hover:bg-purple-800 disabled:opacity-50 text-white rounded text-sm flex justify-between items-center"
                      },
                      React.createElement("span", null, b.nom),
                      React.createElement("span", { className: "text-xs text-neutral-400" },
                        nbFuts + " fût(s)")
                    );
                  })
                );
              })(),

              React.createElement(
                "button",
                {
                  onClick: function () { if (!enCours) setFutACharger(null); },
                  className: "w-full mt-3 py-2 bg-neutral-700 text-white rounded text-sm"
                },
                "Annuler"
              )
            )
          )
        : null
    );
  }

  /* =========================================================================
     SECTION 14terdecies — ÉCRAN HISTORIQUE DES MOUVEMENTS DE FÛTS

     Réservé admin et plus. Liste les mouvements des 12 dernières heures
     avec un bouton "Annuler" sur les mouvements éligibles (attribution
     ou retour non encore annulés).

     Cohérent avec la décision A : on n'efface pas, on marque "annule"
     et on ajoute un mouvement d'annulation visible dans l'historique.
  ========================================================================= */
  function EcranHistoriqueFuts({ prenom, role, historique, onFermer }) {
    /* Fenêtre temporelle des actions annulables : 12 heures. */
    const FENETRE_MS = 12 * 60 * 60 * 1000;
    const maintenant = Date.now();
    const [enCours, setEnCours] = useState(false);

    /* Liste des mouvements filtrée et triée du plus récent au plus ancien. */
    const liste = (historique || [])
      .filter(function (m) { return m && m.date; })
      .sort(function (a, b) { return (b.date || 0) - (a.date || 0); });

    function fmtHeure(ts) {
      const d = new Date(ts);
      const p = function (n) { return n < 10 ? "0" + n : "" + n; };
      return p(d.getDate()) + "/" + p(d.getMonth() + 1) +
        " à " + p(d.getHours()) + ":" + p(d.getMinutes());
    }

    /* Retourne le libellé court d'un mouvement. */
    function libelleMouvement(m) {
      if (m.mouvement === "attribution") {
        return "Attribution sur " + (m.nomBar || "?");
      }
      if (m.mouvement === "retour") {
        const motifs = { vide: "vide", casse: "cassé", non_termine: "non terminé", plein: "plein" };
        return "Retour " + (motifs[m.motifRetour] || m.motifRetour) +
          " depuis " + (m.nomBar || "?");
      }
      if (m.mouvement === "reattribution") {
        return "Réattribution sur " + (m.nomBar || "?") +
          " (venait de " + (m.nomBarPrecedent || "?") + ")";
      }
      if (m.mouvement === "annulation_attribution") {
        return "Annulation d'attribution sur " + (m.nomBar || "?");
      }
      if (m.mouvement === "annulation_retour") {
        return "Annulation de retour vers " + (m.nomBar || "?");
      }
      return m.mouvement || "?";
    }

    /* Couleur d'arrière-plan selon le type de mouvement. */
    function couleurMvt(m) {
      if (m.annule) return "bg-neutral-900 border-neutral-800 opacity-60";
      if (m.mouvement === "annulation_attribution" || m.mouvement === "annulation_retour")
        return "bg-neutral-900 border-orange-900";
      if (m.mouvement === "attribution") return "bg-emerald-950/30 border-emerald-900";
      if (m.mouvement === "retour") return "bg-blue-950/30 border-blue-900";
      if (m.mouvement === "reattribution") return "bg-purple-950/30 border-purple-900";
      return "bg-neutral-900 border-neutral-800";
    }

    /* Détermine si un mouvement est annulable. */
    function estAnnulable(m) {
      if (m.annule === true) return false;
      if (m.mouvement === "annulation_attribution") return false;
      if (m.mouvement === "annulation_retour") return false;
      if (m.mouvement === "reattribution") return false;     /* trop complexe, on laisse */
      if (m.mouvement !== "attribution" && m.mouvement !== "retour") return false;
      if (!m.date) return false;
      return (maintenant - m.date) <= FENETRE_MS;
    }

    function annuler(m) {
      if (enCours) return;
      if (!window.confirm(
        "Annuler ce mouvement ?\n\n" +
        libelleMouvement(m) + "\n" +
        fmtHeure(m.date) + "\n\n" +
        "L'effet sera inversé immédiatement, et l'annulation tracée dans l'historique."
      )) return;
      setEnCours(true);
      let action;
      if (m.mouvement === "attribution") {
        /* Pour annuler une attribution, on cherche d'abord si un fût
           correspondant existe encore sur le bar. Sinon, c'est qu'il a
           déjà été retourné — on ne peut plus annuler proprement. */
        action = Base.futsDuBar(m.idBar).once("value").then(function (snap) {
          const futs = snap.val() || {};
          let idFutACibler = null;
          /* On prend n'importe quel fût du bon type sur le bar (le plus
             récent en pratique). */
          let dateMax = 0;
          Object.keys(futs).forEach(function (idF) {
            if (futs[idF].type === m.typeFut && (futs[idF].dateAttribution || 0) > dateMax) {
              dateMax = futs[idF].dateAttribution || 0;
              idFutACibler = idF;
            }
          });
          if (!idFutACibler) {
            throw new Error("Le fût attribué n'est plus sur le bar (probablement déjà retourné). " +
              "Annulez plutôt le retour s'il y en a un.");
          }
          return ActionsFuts.annulerAttribution(m.id, m, idFutACibler, prenom);
        });
      } else if (m.mouvement === "retour") {
        action = ActionsFuts.annulerRetour(m.id, m, prenom);
      } else {
        setEnCours(false);
        return;
      }
      action.then(function () { setEnCours(false); })
        .catch(function (e) {
          setEnCours(false);
          alert("Erreur : " + e.message);
        });
    }

    return React.createElement(
      "div",
      { className: "fixed inset-0 bg-black z-40 flex flex-col" },

      /* En-tête. */
      React.createElement(
        "div",
        { className: "p-3 border-b border-neutral-800 flex items-center justify-between" },
        React.createElement(
          "div",
          null,
          React.createElement("h2", { className: "text-lg font-bold text-orange-400" }, "Historique des fûts"),
          React.createElement("p", { className: "text-xs text-neutral-500" },
            liste.length + " mouvement(s) — annulation possible jusqu'à 12h après")
        ),
        React.createElement(
          "button",
          { onClick: onFermer, className: "text-xs px-3 py-1.5 bg-neutral-800 text-neutral-300 rounded-lg" },
          "Fermer"
        )
      ),

      /* Liste. */
      React.createElement(
        "div",
        { className: "flex-1 overflow-auto p-3" },
        liste.length === 0
          ? React.createElement("p", { className: "text-neutral-500 text-sm text-center py-8" },
              "Aucun mouvement dans l'historique.")
          : React.createElement(
              "div",
              { className: "space-y-1.5" },
              liste.map(function (m, i) {
                const annulable = estAnnulable(m);
                return React.createElement(
                  "div",
                  {
                    key: m.id || i,
                    className: "rounded-lg border p-2 " + couleurMvt(m)
                  },
                  React.createElement(
                    "div",
                    { className: "flex items-start justify-between gap-2" },
                    React.createElement(
                      "div",
                      { className: "flex-1 min-w-0" },
                      React.createElement(
                        "p",
                        {
                          className: "text-sm text-white " +
                            (m.annule ? "line-through text-neutral-500" : "")
                        },
                        libelleMouvement(m) +
                          " (" + (m.typeFut === TYPE_BAR.BIERE ? "bière" : "cidre") + ")"
                      ),
                      React.createElement("p", { className: "text-xs text-neutral-500" },
                        fmtHeure(m.date) + " — par " + (m.par || "?")),
                      m.annule
                        ? React.createElement("p", { className: "text-xs text-orange-400 italic" },
                            "Annulé")
                        : null,
                      m.commentaire
                        ? React.createElement("p", { className: "text-xs text-neutral-400 italic mt-1" },
                            "« " + m.commentaire + " »")
                        : null
                    ),
                    annulable
                      ? React.createElement(
                          "button",
                          {
                            onClick: function () { annuler(m); },
                            disabled: enCours,
                            className: "text-xs px-2 py-1 bg-red-800 hover:bg-red-700 disabled:opacity-50 text-white rounded shrink-0"
                          },
                          "↶ Annuler"
                        )
                      : null
                  )
                );
              })
            )
      )
    );
  }

  /* =========================================================================
     SECTION 15 — ÉCRAN PRINCIPAL
  ========================================================================= */
  function EcranPrincipal({ prenom, role, onDeconnexion }) {
    const [bars, setBars] = useState([]);
    const [historique, setHistorique] = useState([]);
    const [params, setParams] = useState(PARAMS_DEFAUT);
    const [jourActuel, setJourActuel] = useState(1);
    const [creneaux, setCreneaux] = useState({});
    const [fenetreAjoutBar, setFenetreAjoutBar] = useState(false);
    const [retourEnCours, setRetourEnCours] = useState(null);
    const [fenetreCreneaux, setFenetreCreneaux] = useState(false);
    const [casesVentes, setCasesVentes] = useState({});
    const [ecranVentes, setEcranVentes] = useState(false);
    const [fenetreParams, setFenetreParams] = useState(false);
    /* Toutes les ventes du festival, tous jours confondus. Sert
       UNIQUEMENT à la fenêtre paramètres pour détecter les jours
       qui contiennent déjà des données (alerte avant réduction du
       nombre de jours). */
    const [casesVentesTousJours, setCasesVentesTousJours] = useState({});
    /* Planning bénévoles du jour actif (module planning). */
    const [planningDuJour, setPlanningDuJour] = useState({});
    const [ecranPlanning, setEcranPlanning] = useState(false);
    /* Écran dashboard (module dashboard). */
    const [ecranDashboard, setEcranDashboard] = useState(false);
    /* Écran utilisateurs et fenêtre de remise à zéro (module utilisateurs). */
    const [ecranUtilisateurs, setEcranUtilisateurs] = useState(false);
    const [fenetreRemiseAZero, setFenetreRemiseAZero] = useState(false);
    /* Écran plan du festival (module plan). */
    const [ecranPlan, setEcranPlan] = useState(false);
    /* Fenêtre mémo/aide selon le rôle. */
    const [fenetreMemo, setFenetreMemo] = useState(false);
    /* Écran des fûts en attente (pot). */
    const [ecranFutsEnAttente, setEcranFutsEnAttente] = useState(false);
    /* Comptage des fûts au pot (pour afficher un badge sur le bouton). */
    const [nbFutsAuPot, setNbFutsAuPot] = useState(0);
    /* Écran historique des mouvements de fûts (admin et plus). */
    const [ecranHistoriqueFuts, setEcranHistoriqueFuts] = useState(false);
    /* Planning de TOUS les jours, nécessaire au moment d'un export depuis
       la fenêtre de remise à zéro (qui n'est pas l'écran Dashboard).
       Chargé une seule fois à l'ouverture de l'écran principal. */
    const [planningTousJours, setPlanningTousJours] = useState({});

    const peutGererBars = Droits.peutGererBars(role);
    const peutGererParams = Droits.peutGererParams(role);
    const peutGererPlanning = Droits.peutGererPlanning(role);
    const peutVoirDashboard = Droits.peutVoirDashboard(role);
    const peutGererUtilisateurs = Droits.peutGererUtilisateurs(role);

    /* Abonnement temps réel : bars, historique, params, jour actif. */
    useEffect(function () {
      const refBars = Base.bars();
      const refHisto = Base.historiqueFuts();
      const refParams = Base.params();
      const refJour = Base.jourActuel();

      function surBars(s) {
        const v = s.val() || {};
        setBars(Object.keys(v).map(function (id) { return Object.assign({ id: id }, v[id]); }));
      }
      function surHisto(s) {
        const v = s.val() || {};
        /* On inclut la clé Firebase de chaque mouvement (utile pour les
           annulations qui doivent référencer le mouvement initial). */
        setHistorique(Object.keys(v).map(function (cle) {
          return Object.assign({ id: cle }, v[cle]);
        }));
      }
      function surParams(s) {
        const v = s.val();
        /* On fusionne avec les valeurs par défaut : si un paramètre manque
           en base, on garde la valeur par défaut. */
        if (v) setParams(Object.assign({}, PARAMS_DEFAUT, v));
      }
      function surJour(s) {
        const v = s.val();
        if (v) setJourActuel(v);
      }

      refBars.on("value", surBars);
      refHisto.on("value", surHisto);
      refParams.on("value", surParams);
      refJour.on("value", surJour);

      return function () {
        refBars.off("value", surBars);
        refHisto.off("value", surHisto);
        refParams.off("value", surParams);
        refJour.off("value", surJour);
      };
    }, []);

    /* Abonnement aux créneaux : dépend du jour actif, donc recalculé à
       chaque changement de jour. */
    useEffect(function () {
      const refCreneaux = Base.creneauxDuJour(jourActuel);
      function surCreneaux(s) {
        setCreneaux(s.val() || {});
      }
      refCreneaux.on("value", surCreneaux);
      return function () {
        refCreneaux.off("value", surCreneaux);
      };
    }, [jourActuel]);

    /* Abonnement aux cases de ventes du jour actif (module 3B). */
    useEffect(function () {
      const refVentes = Base.casesVentesDuJour(jourActuel);
      function surVentes(s) {
        setCasesVentes(s.val() || {});
      }
      refVentes.on("value", surVentes);
      return function () {
        refVentes.off("value", surVentes);
      };
    }, [jourActuel]);

    /* Abonnement au planning bénévoles du jour actif (module planning). */
    useEffect(function () {
      const refPlanning = Base.planningDuJour(jourActuel);
      function surPlanning(s) {
        setPlanningDuJour(s.val() || {});
      }
      refPlanning.on("value", surPlanning);
      return function () {
        refPlanning.off("value", surPlanning);
      };
    }, [jourActuel]);

    /* Abonnement au planning TOUS JOURS confondus.
       Utilisé par la fenêtre de remise à zéro pour générer l'export. */
    useEffect(function () {
      const ref = db.ref("sessions/" + ID_SESSION + "/planning");
      function surTout(s) {
        setPlanningTousJours(s.val() || {});
      }
      ref.on("value", surTout);
      return function () { ref.off("value", surTout); };
    }, []);

    /* Abonnement au pot de fûts en attente, pour afficher le badge sur
       le bouton Fûts en attente. */
    useEffect(function () {
      const ref = Base.futsEnAttente();
      function surPot(s) {
        const v = s.val() || {};
        setNbFutsAuPot(Object.keys(v).length);
      }
      ref.on("value", surPot);
      return function () { ref.off("value", surPot); };
    }, []);

    /* Abonnement aux ventes TOUS JOURS confondus.
       Utilisé uniquement par la fenêtre paramètres pour détecter les jours
       contenant des données (alerte avant réduction du nombre de jours). */
    useEffect(function () {
      const ref = db.ref("sessions/" + ID_SESSION + "/ventes");
      function surTout(s) {
        setCasesVentesTousJours(s.val() || {});
      }
      ref.on("value", surTout);
      return function () {
        ref.off("value", surTout);
      };
    }, []);

    const stock = calculerStock(historique, params);

    function creerBar(nom, type) {
      ActionsBars.creer(nom, type)
        .then(function () { setFenetreAjoutBar(false); })
        .catch(function (e) { alert(e.message); });
    }

    function supprimerBar(bar) {
      if (!confirm("Supprimer le bar « " + bar.nom + " » ?")) return;
      ActionsBars.supprimer(bar).catch(function (e) { alert(e.message); });
    }

    function attribuerFut(bar) {
      const stockDispo = bar.type === TYPE_BAR.BIERE ? stock.biere : stock.cidre;
      if (stockDispo <= 0) {
        alert("Stock épuisé pour ce type de boisson.");
        return;
      }
      ActionsFuts.attribuer(bar, bar.type, params.maxFutsParBar, prenom)
        .catch(function (e) { alert(e.message); });
    }

    function confirmerRetour(motif, commentaire) {
      const r = retourEnCours;
      ActionsFuts.retourner(r.bar, r.idFut, r.fut, motif, commentaire, prenom)
        .then(function () { setRetourEnCours(null); })
        .catch(function (e) { alert(e.message); });
    }

    function changerJour(nouveauJour) {
      if (nouveauJour < 1 || nouveauJour > params.nombreJours) return;
      if (nouveauJour === jourActuel) return;
      /* Double-check : un changement de jour bascule TOUS les utilisateurs
         connectés sur le nouveau jour. C'est sensible, surtout pendant un
         service en cours (saisie de ventes, planning). Confirmation
         requise pour éviter le clic accidentel. */
      const ok = window.confirm(
        "Basculer sur le jour " + nouveauJour + " ?\n\n" +
        "Tous les utilisateurs connectés vont voir leur écran changer " +
        "(saisie des ventes, planning bénévoles).\n\n" +
        "À ne faire qu'en fin de journée, ou pour corriger une erreur."
      );
      if (!ok) return;
      ActionsCreneaux.definirJourActuel(nouveauJour)
        .catch(function (e) { alert(e.message); });
    }

    /* Nombre de créneaux du jour, pour l'affichage d'information. */
    const nbCreneaux = Object.keys(creneaux).length;

    return React.createElement(
      "div",
      { className: "min-h-screen bg-black text-white" },

      /* Bandeau du haut. */
      React.createElement(
        "div",
        { className: "p-4 border-b border-neutral-800 flex items-center justify-between" },
        React.createElement(
          "div",
          null,
          React.createElement("h1", { className: "text-lg font-bold text-green-400" }, "Bars Nomades"),
          React.createElement("p", { className: "text-xs text-neutral-500" }, prenom + " — " + role)
        ),
        /* Groupe de boutons à droite : aide et quitter. */
        React.createElement(
          "div",
          { className: "flex items-center gap-2" },
          /* Bouton aide-mémoire — accessible à tous (le mémo s'adapte au rôle). */
          React.createElement(
            "button",
            {
              onClick: function () { setFenetreMemo(true); },
              className: "w-8 h-8 rounded-full bg-emerald-800 hover:bg-emerald-700 text-white text-base font-bold"
            },
            "?"
          ),
          React.createElement(
            "button",
            {
              onClick: onDeconnexion,
              className: "text-xs px-3 py-1.5 bg-neutral-800 text-neutral-300 rounded-lg"
            },
            "Quitter"
          )
        )
      ),

      /* Bandeau du jour. */
      React.createElement(BandeauJour, {
        jourActuel: jourActuel,
        nombreJours: params.nombreJours,
        role: role,
        onChangerJour: changerJour,
        onOuvrirCreneaux: function () { setFenetreCreneaux(true); },
        onOuvrirParams: function () { setFenetreParams(true); }
      }),

      /* Information sur les créneaux du jour. */
      React.createElement(
        "div",
        { className: "px-3 py-2 text-xs " +
            (nbCreneaux === 0 ? "text-amber-400" : "text-neutral-500") },
        nbCreneaux === 0
          ? "Aucun créneau défini pour le jour " + jourActuel +
            (Droits.peutGererCreneaux(role)
              ? " — utilisez « Créneaux du jour » pour les créer."
              : " — le super admin doit les configurer.")
          : nbCreneaux + " créneau(x) défini(s) pour le jour " + jourActuel
      ),

      /* Bandeau de stock. */
      React.createElement(
        "div",
        { className: "grid grid-cols-2 gap-2 p-3" },
        React.createElement(
          "div",
          { className: "bg-amber-950/40 border border-amber-800 rounded-lg p-3 text-center" },
          React.createElement("div", { className: "text-2xl font-bold text-amber-400" }, stock.biere),
          React.createElement("div", { className: "text-xs text-amber-200" }, "Fûts bière en stock")
        ),
        React.createElement(
          "div",
          { className: "bg-green-950/40 border border-green-800 rounded-lg p-3 text-center" },
          React.createElement("div", { className: "text-2xl font-bold text-green-400" }, stock.cidre),
          React.createElement("div", { className: "text-xs text-green-200" }, "Fûts cidre en stock")
        )
      ),

      /* Bouton d'ajout de bar (admin et plus). */
      peutGererBars
        ? React.createElement(
            "div",
            { className: "px-3 pb-2" },
            React.createElement(
              "button",
              {
                onClick: function () { setFenetreAjoutBar(true); },
                className: "w-full py-2.5 bg-neutral-800 hover:bg-neutral-700 text-white rounded-lg text-sm font-medium"
              },
              "+ Ajouter un bar"
            )
          )
        : null,

      /* Barre d'actions principales — alignée horizontalement.
         Pensée pour accueillir d'autres boutons (Dashboard, Plan, etc.)
         sans casser la mise en page : flex-wrap permet le retour à la
         ligne automatique si la largeur écran est trop petite ou si on
         dépasse 3-4 boutons. Chaque bouton garde sa couleur identitaire
         (vert = ventes, bleu = planning, etc.).
         Le bouton Plan est TOUJOURS visible (accessible à tous les rôles)
         donc la barre est toujours présente. */
      React.createElement(
        "div",
        { className: "px-3 pb-2 flex flex-wrap gap-2" },

        /* Plan du festival — gris (TOUS les rôles). */
        React.createElement(
          "button",
          {
            onClick: function () { setEcranPlan(true); },
            className: "flex-1 min-w-[140px] py-2.5 bg-neutral-700 hover:bg-neutral-600 text-white rounded-lg text-sm font-medium"
          },
          "Plan"
        ),

        /* Fûts en attente — violet (secrétaire et plus).
           Le bouton n'est visible QUE si au moins un fût est au pot.
           Le badge affiche le nombre disponible. */
        (Droits.peutGererFuts(role) && nbFutsAuPot > 0)
          ? React.createElement(
              "button",
              {
                onClick: function () { setEcranFutsEnAttente(true); },
                className: "flex-1 min-w-[140px] py-2.5 bg-purple-900 hover:bg-purple-800 text-white rounded-lg text-sm font-medium relative"
              },
              "Fûts en attente",
              React.createElement(
                "span",
                { className: "absolute -top-1 -right-1 bg-purple-500 text-white text-xs font-bold rounded-full w-5 h-5 flex items-center justify-center" },
                nbFutsAuPot
              )
            )
          : null,

        /* Saisie des ventes — vert. */
        Droits.peutSaisirVentes(role)
          ? React.createElement(
              "button",
              {
                onClick: function () { setEcranVentes(true); },
                className: "flex-1 min-w-[140px] py-2.5 bg-emerald-800 hover:bg-emerald-700 text-white rounded-lg text-sm font-medium"
              },
              "Saisie des ventes"
            )
          : null,

        /* Planning bénévoles — bleu. */
        peutGererPlanning
          ? React.createElement(
              "button",
              {
                onClick: function () { setEcranPlanning(true); },
                className: "flex-1 min-w-[140px] py-2.5 bg-blue-800 hover:bg-blue-700 text-white rounded-lg text-sm font-medium"
              },
              "Planning bénévoles"
            )
          : null,

        /* Dashboard — violet (admin et plus). */
        peutVoirDashboard
          ? React.createElement(
              "button",
              {
                onClick: function () { setEcranDashboard(true); },
                className: "flex-1 min-w-[140px] py-2.5 bg-purple-800 hover:bg-purple-700 text-white rounded-lg text-sm font-medium"
              },
              "Dashboard"
            )
          : null,

        /* Utilisateurs — orange (admin et plus). */
        peutGererUtilisateurs
          ? React.createElement(
              "button",
              {
                onClick: function () { setEcranUtilisateurs(true); },
                className: "flex-1 min-w-[140px] py-2.5 bg-orange-800 hover:bg-orange-700 text-white rounded-lg text-sm font-medium"
              },
              "Utilisateurs"
            )
          : null,

        /* Historique des fûts — orange foncé (admin et plus).
           Permet de visualiser et annuler les mouvements récents. */
        (role === ROLES.ADMIN || role === ROLES.SUPERADMIN)
          ? React.createElement(
              "button",
              {
                onClick: function () { setEcranHistoriqueFuts(true); },
                className: "flex-1 min-w-[140px] py-2.5 bg-orange-900 hover:bg-orange-800 text-white rounded-lg text-sm font-medium"
              },
              "Historique fûts"
            )
          : null
      ),

      /* Liste des bars. */
      React.createElement(
        "div",
        { className: "p-3 space-y-3" },
        bars.length === 0
          ? React.createElement(
              "div",
              { className: "text-center py-10 text-neutral-500" },
              React.createElement("p", null, "Aucun bar pour l'instant."),
              peutGererBars
                ? React.createElement("p", { className: "text-sm mt-1" },
                    "Utilisez « Ajouter un bar » pour commencer.")
                : React.createElement("p", { className: "text-sm mt-1" },
                    "Un administrateur doit créer les bars.")
            )
          : bars.map(function (bar) {
              return React.createElement(CarteBar, {
                key: bar.id,
                bar: bar,
                role: role,
                maxFuts: params.maxFutsParBar,
                prenom: prenom,
                onAttribuer: attribuerFut,
                onDemanderRetour: function (b, idFut, fut) {
                  setRetourEnCours({ bar: b, idFut: idFut, fut: fut });
                },
                onSupprimer: supprimerBar,
                onAnnulerAttribution: function (b, idFut, fut) {
                  /* Confirmation explicite (action sensible). */
                  if (!window.confirm(
                    "Annuler l'attribution de ce fût " +
                    (fut.type === TYPE_BAR.BIERE ? "bière" : "cidre") +
                    " sur " + b.nom + " ?\n\n" +
                    "Le fût sera retiré du bar et l'attribution sera marquée " +
                    "comme erronée dans l'historique. Le stock central sera ajusté."
                  )) return;
                  /* On cherche le mouvement d'attribution le plus récent
                     pour ce bar/type, non annulé. Approche pragmatique :
                     l'annulation se fait juste après l'erreur, le mouvement
                     est forcément le plus récent. */
                  let idMvtTrouve = null;
                  let mvtTrouve = null;
                  let dateMax = 0;
                  historique.forEach(function (mvt) {
                    if (mvt.annule === true) return;
                    if (mvt.mouvement !== "attribution") return;
                    if (mvt.idBar !== b.id) return;
                    if (mvt.typeFut !== fut.type) return;
                    if ((mvt.date || 0) > dateMax) {
                      dateMax = mvt.date || 0;
                      idMvtTrouve = mvt.id;
                      mvtTrouve = mvt;
                    }
                  });
                  if (!idMvtTrouve) {
                    alert("Impossible de retrouver le mouvement d'attribution. " +
                      "Utilisez plutôt l'écran Historique.");
                    return;
                  }
                  ActionsFuts.annulerAttribution(idMvtTrouve, mvtTrouve, idFut, prenom)
                    .catch(function (e) { alert("Erreur : " + e.message); });
                }
              });
            })
      ),

      /* Fenêtres. */
      fenetreAjoutBar
        ? React.createElement(FenetreAjoutBar, {
            onConfirmer: creerBar,
            onAnnuler: function () { setFenetreAjoutBar(false); }
          })
        : null,

      retourEnCours
        ? React.createElement(FenetreRetourFut, {
            bar: retourEnCours.bar,
            idFut: retourEnCours.idFut,
            fut: retourEnCours.fut,
            onConfirmer: confirmerRetour,
            onAnnuler: function () { setRetourEnCours(null); }
          })
        : null,

      fenetreCreneaux
        ? React.createElement(FenetreCreneaux, {
            jourActuel: jourActuel,
            nombreJours: params.nombreJours,
            creneaux: creneaux,
            onFermer: function () { setFenetreCreneaux(false); }
          })
        : null,

      /* Écran de saisie des ventes (plein écran). */
      ecranVentes
        ? React.createElement(EcranVentes, {
            prenom: prenom,
            role: role,
            jourActuel: jourActuel,
            bars: bars,
            creneaux: creneaux,
            casesVentes: casesVentes,
            onFermer: function () { setEcranVentes(false); }
          })
        : null,

      /* Fenêtre paramètres (admin et plus). */
      fenetreParams
        ? React.createElement(FenetreParametres, {
            params: params,
            bars: bars,
            historique: historique,
            casesVentesTousJours: casesVentesTousJours,
            onFermer: function () { setFenetreParams(false); }
          })
        : null,

      /* Écran planning bénévoles (plein écran). */
      ecranPlanning
        ? React.createElement(EcranPlanning, {
            prenom: prenom,
            role: role,
            jourActuel: jourActuel,
            bars: bars,
            creneaux: creneaux,
            planningDuJour: planningDuJour,
            onFermer: function () { setEcranPlanning(false); }
          })
        : null,

      /* Écran dashboard (plein écran, admin et plus). */
      ecranDashboard
        ? React.createElement(EcranDashboard, {
            jourActuel: jourActuel,
            bars: bars,
            historique: historique,
            casesVentesTousJours: casesVentesTousJours,
            params: params,
            onFermer: function () { setEcranDashboard(false); }
          })
        : null,

      /* Écran utilisateurs (plein écran, admin et plus). */
      ecranUtilisateurs
        ? React.createElement(EcranUtilisateurs, {
            prenom: prenom,
            role: role,
            onFermer: function () { setEcranUtilisateurs(false); },
            onDemanderRemiseAZero: function () { setFenetreRemiseAZero(true); }
          })
        : null,

      /* Fenêtre de remise à zéro (modal, super admin uniquement). */
      fenetreRemiseAZero
        ? React.createElement(FenetreRemiseAZero, {
            params: params,
            bars: bars,
            historique: historique,
            casesVentesTousJours: casesVentesTousJours,
            planningTousJoursPourExport: planningTousJours,
            prenom: prenom,
            onFermer: function () { setFenetreRemiseAZero(false); }
          })
        : null,

      /* Écran plan du festival (plein écran, accessible à tous les rôles). */
      ecranPlan
        ? React.createElement(EcranPlan, {
            prenom: prenom,
            role: role,
            bars: bars,
            onFermer: function () { setEcranPlan(false); }
          })
        : null,

      /* Fenêtre mémo/aide (modal, contenu selon le rôle). */
      fenetreMemo
        ? React.createElement(FenetreMemoAide, {
            role: role,
            onFermer: function () { setFenetreMemo(false); }
          })
        : null,

      /* Écran fûts en attente (plein écran, secrétaire et plus). */
      ecranFutsEnAttente
        ? React.createElement(EcranFutsEnAttente, {
            prenom: prenom,
            role: role,
            bars: bars,
            onFermer: function () { setEcranFutsEnAttente(false); }
          })
        : null,

      /* Écran historique des fûts (admin et plus). */
      ecranHistoriqueFuts
        ? React.createElement(EcranHistoriqueFuts, {
            prenom: prenom,
            role: role,
            historique: historique,
            onFermer: function () { setEcranHistoriqueFuts(false); }
          })
        : null
    );
  }

  /* =========================================================================
     SECTION 16 — COMPOSANT PRINCIPAL : L'APPLICATION
  ========================================================================= */
  function Application() {
    const [etape, setEtape] = useState("demarrage");
    const [erreur, setErreur] = useState("");
    const [prenom, setPrenom] = useState("");
    const [role, setRole] = useState(ROLES.VISITEUR);
    /* Drapeau d'éjection : passe à true si l'entrée utilisateur disparaît
       de la base alors qu'on est connecté. Déclenche la popup bloquante. */
    const [ejecte, setEjecte] = useState(false);

    useEffect(function () {
      obtenirBadgeAnonyme()
        .then(function () { setEtape("accueil"); })
        .catch(function (e) {
          setErreur("L'authentification a échoué. (" + (e && e.code ? e.code : "inconnu") + ")");
          setEtape("erreur");
        });
    }, []);

    /* ABONNEMENT TEMPS RÉEL au rôle de l'utilisateur connecté.
       Dès qu'un admin change le rôle dans la console (ou via l'écran
       Utilisateurs), l'app récupère la nouvelle valeur et met à jour
       l'interface en silence — les boutons disponibles changent
       immédiatement.
       Si l'entrée utilisateur disparaît (éjection), on déclenche la
       popup bloquante. */
    useEffect(function () {
      /* Cet effet ne s'active QUE quand on est en étape "pret" et qu'on a
         un prénom. Sinon il n'y a rien à écouter. */
      if (etape !== "pret" || !prenom) return;

      const ref = Base.utilisateur(prenom);
      function surChangement(snap) {
        const u = snap.val();
        if (!u) {
          /* L'entrée a disparu de la base = l'utilisateur a été éjecté
             par un admin. On affiche une popup et on force la
             déconnexion à la validation. */
          setEjecte(true);
          return;
        }
        /* Sinon, on met à jour silencieusement le rôle si nécessaire. */
        const nouveauRole = u.role || ROLES.VISITEUR;
        setRole(function (ancien) {
          return nouveauRole !== ancien ? nouveauRole : ancien;
        });
      }
      ref.on("value", surChangement);
      return function () { ref.off("value", surChangement); };
    }, [etape, prenom]);

    function entrerDansApp(prenomSaisi) {
      setPrenom(prenomSaisi);
      setEtape("connexion");
      const refUtilisateur = Base.utilisateur(prenomSaisi);
      refUtilisateur.once("value").then(function (instantane) {
        const existant = instantane.val();
        const roleConserve = (existant && existant.role) ? existant.role : ROLES.VISITEUR;
        return refUtilisateur.update({
          prenom: prenomSaisi,
          derniereConnexion: Date.now(),
          role: roleConserve
        }).then(function () {
          setRole(roleConserve);
          setEjecte(false);
          setEtape("pret");
        });
      }).catch(function (e) {
        setErreur("Impossible d'enregistrer la connexion. (" + (e && e.code ? e.code : "inconnu") + ")");
        setEtape("erreur");
      });
    }

    function seDeconnecter() {
      setPrenom("");
      setRole(ROLES.VISITEUR);
      setEjecte(false);
      setEtape("accueil");
    }

    /* Confirmation de l'éjection : on déconnecte et on revient à l'accueil. */
    function validerEjection() {
      setEjecte(false);
      seDeconnecter();
    }

    if (etape === "erreur") return React.createElement(EcranErreur, { details: erreur });
    if (etape === "demarrage") return React.createElement(EcranChargement, { message: "Connexion sécurisée…" });
    if (etape === "connexion") return React.createElement(EcranChargement, { message: "Enregistrement…" });
    if (etape === "accueil") return React.createElement(EcranAccueil, { onEntrer: entrerDansApp });

    /* Écran principal + popup d'éjection si nécessaire. */
    return React.createElement(
      React.Fragment,
      null,
      React.createElement(EcranPrincipal, {
        prenom: prenom,
        role: role,
        onDeconnexion: seDeconnecter
      }),
      /* Popup bloquante d'éjection : superposée à tout, validation
         obligatoire pour revenir à l'accueil. */
      ejecte
        ? React.createElement(
            "div",
            { className: "fixed inset-0 bg-black/90 flex items-center justify-center p-4 z-[100]" },
            React.createElement(
              "div",
              { className: "bg-neutral-900 rounded-2xl w-full max-w-sm p-6 border border-red-900 text-center" },
              React.createElement("h3", { className: "text-xl font-bold text-red-400 mb-3" },
                "Vous avez été éjecté"),
              React.createElement("p", { className: "text-sm text-neutral-300 mb-5" },
                "Un administrateur a retiré votre compte de la session. " +
                "Vous allez être ramené à l'écran d'accueil."),
              React.createElement(
                "button",
                {
                  onClick: validerEjection,
                  className: "w-full py-3 bg-red-700 hover:bg-red-600 text-white rounded-lg font-medium"
                },
                "OK"
              )
            )
          )
        : null
    );
  }

  /* =========================================================================
     DÉMARRAGE
  ========================================================================= */
  ReactDOM.createRoot(document.getElementById("root")).render(
    React.createElement(Application)
  );
  </script>
</body>
